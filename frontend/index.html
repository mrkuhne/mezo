<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1 + user-scalable=no: disable all browser zoom app-wide.
         Primary effect: kills iOS Safari's auto-zoom when focusing sub-16px inputs (the app's
         compact UI uses 12–13px fields). viewport-fit=cover kept for notch/safe-area insets. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#FBF6EF" />
    <title>Mezo</title>
    <script>
      (function () {
        var t = null
        try { t = localStorage.getItem('mezo-theme') } catch (e) {}
        /* Napív: light is the CSS base (no attribute). Only an explicit stored 'dark'
           adds data-theme="dark". Invalid/missing values fall through to light. */
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
