<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1 + user-scalable=no: disable all browser zoom app-wide.
         Primary effect: kills iOS Safari's auto-zoom when focusing sub-16px inputs (the app's
         compact UI uses 12–13px fields). viewport-fit=cover kept for notch/safe-area insets. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0A0F14" />
    <title>Mezo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mezo-theme')
          if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
