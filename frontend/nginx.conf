server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: any unknown path falls back to index.html so client-side
    # routing works on refresh/deep-links. /api/* never reaches here — the
    # Traefik Ingress routes those to the backend before the frontend pod.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the service worker or the HTML shell (so new deploys are picked up).
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
