services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mezo
      POSTGRES_USER: mezo
      POSTGRES_PASSWORD: mezo
    # Custom host port — standard 5432 is taken by other local projects.
    ports: ["15432:5432"]
    volumes:
      - mezo_pg:/var/lib/postgresql/data
      # Creates the fixed integration-test database (mezo_test) on FIRST volume init.
      # If the volume predates this script: docker compose down -v && docker compose up -d
      - ./initdb:/docker-entrypoint-initdb.d:ro
volumes:
  mezo_pg:
