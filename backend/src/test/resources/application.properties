# Local integration tests run against the FIXED compose database (mezo_test) —
# company pattern: tables are inspectable 1:1 in a real Postgres while/after tests run.
# Requires: docker compose up -d (see backend/compose.yaml).
#
# CI / machines without the compose stack: pass -Dmezo.test.use-testcontainers=true
# to spin up a throwaway Testcontainers Postgres instead (its @ServiceConnection
# overrides this datasource URL automatically).
#
# (.properties on the test classpath deliberately AUGMENTS the main application.yml
# instead of shadowing it — only the keys below are overridden.)
spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT:15432}/mezo_test
mezo.test.use-testcontainers=false

# Cap the per-context Hikari pool for tests. The Spring TestContext cache keeps every
# distinct ApplicationContext (each with its own pool) alive simultaneously; with Hikari's
# default pool of 10 the growing set of contexts exhausts Postgres max_connections (100)
# and unrelated contexts fail to boot ("FATAL: sorry, too many clients already"). ITs run
# sequentially and need only a couple of connections per context, so a small cap is safe.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
