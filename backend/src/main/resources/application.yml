server:
  port: ${MEZO_PORT:8090}        # custom port — 8080 is taken by other local projects
spring:
  application:
    name: mezo
  mvc:
    async:
      # SSE chat turns (companion V0.4): Gemini streams can exceed the container's ~30s
      # async default; only the streaming endpoint is async, everything else is unaffected.
      request-timeout: 120s
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:15432}/mezo
    username: ${DB_USER:mezo}
    password: ${DB_PASSWORD:mezo}
    hikari:
      # pgvector 0.8+: HNSW scans keep searching until LIMIT is satisfied instead of stopping at
      # the ef_search frontier (default 40) — without this, a filtered ANN query (kind/is_deleted
      # in memory_embedding.findNearest) silently returns fewer than k rows once the table outgrows
      # the frontier. Session-level GUC on every pooled connection; a placeholder no-op until the
      # vector extension is loaded, exact result ordering preserved (strict_order).
      connection-init-sql: SET hnsw.iterative_scan = strict_order
  jpa:
    hibernate:
      ddl-auto: validate          # Liquibase owns the schema, never Hibernate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  ai:
    google:
      genai:
        # Gemini API key (Google AI Studio) — ADR 0008. Real value comes from the environment
        # (local shell / k3s mezo-app secret); the dummy default keeps every context bootable
        # key-less (tests, CI, k3s before rollout) since the starter builds its ChatModel bean
        # regardless of the mezo.feature.companion switch. Real calls fail without a real key.
        api-key: ${GEMINI_API_KEY:dummy-key-set-GEMINI_API_KEY}
mezo:
  auth:
    jwt-secret: ${MEZO_JWT_SECRET:dev-only-change-me-32-bytes-minimum-secret}
    owner-email: ${MEZO_OWNER_EMAIL:owner@mezo.local}
    owner-password: ${MEZO_OWNER_PASSWORD:owner}
    owner-name: ${MEZO_OWNER_NAME:Owner}
  cors:
    # Browser origins allowed to call the API. The Vite dev server (:5180) is the default;
    # add the deployed frontend origin per environment. Server-to-server callers send no Origin
    # and bypass CORS entirely.
    allowed-origins:
      - http://localhost:5180
  goal:
    # G5 goal-engine tunables (grounded research). Binds onto GoalEngineProperties; the engine
    # services (Tasks 5–8) read these so no magic numbers / @Value live downstream.
    # PAL multipliers (BMR -> TDEE); moderate is the engine default when activity level is unknown.
    pal:
      sedentary: 1.2
      light: 1.375
      moderate: 1.55
      very: 1.725
      extra: 1.9
    kcal-per-kg: 7700               # band 6000–7700
    protein:
      g-per-kg-bw-default: 2.0
      g-per-kg-bw-floor: 1.6
      g-per-kg-bw-ceil: 2.2
      g-per-kg-lbm-low: 2.3
      g-per-kg-lbm-high: 3.1
      g-per-kg-bw-cap: 2.6
    rate:
      target-pct-per-week: 0.7
      cap-pct-per-week: 1.0
      band-low: 0.5
      band-high: 1.0
    volume:
      maintenance-sets: 8
      warn-below: 6
    strength:
      e1rm-breach-pct: -5.0
    ewma:
      half-life-days: 10           # band 10–14
    met:                           # per-session kcal deltas, 84 kg basis
      hypertrophy-kcal: 325
      interval-run-kcal: 500
      volleyball-rec-kcal: 500
      volleyball-comp-kcal: 1150
    thermogenesis-haircut-kcal-per-day: 0   # default off; optional band 100–200
    bootstrap-uncertainty-kcal: 300
  nutrition:
    # Owner-wide daily macro targets feeding the Fuel-day MacroHero (targets vs consumed).
    # Binds onto NutritionTargetsProperties; replaces the hardcoded mock 2500/3100 floor.
    kcal: 3100
    p: 220
    c: 380
    f: 95
    water: 4000
  pantry-import:
    # OpenFoodFacts lookup client (Fuel P6, mezo-bka) — deterministic HTTP, not AI.
    # Binds onto PantryImportProperties; base-url is overridden to WireMock in ITs.
    base-url: https://world.openfoodfacts.org
    # Connect + read timeout for OFF calls (ms)
    timeout-ms: 5000
    # OFF etiquette: identify the app + a contact in the User-Agent
    user-agent: mezo/0.1 (${MEZO_OWNER_EMAIL:owner@mezo.local})
    # Max results per text search (and per lookup response)
    search-page-size: 8
    # How many recent import-feed rows PantryResponse.imports carries
    feed-size: 5
  pantry-suggestion:
    # Deterministic Kamra swap heuristics (Fuel P6) — binds onto PantrySuggestionProperties
    # Max suggestions surfaced on the Kamra
    max-items: 3
    # Cheapest same-category item must cost <= this fraction of the priciest (0.8 = 20% cheaper)
    cheaper-ratio: 0.8
  feature:
    # Gamified progression engine (post-workout level-up + XP). No matchIfMissing — declared explicitly.
    progression:
      enabled: true
    # Fuel P6 pantry import — gates the OpenFoodFacts lookup/import endpoints (off -> 404);
    # the import feed + suggestions in GET /api/pantry stay on regardless.
    pantry-import:
      enabled: true
    # Phase-3 companion (LLM chat + AI memory, ADR 0008). Gates every CompanionLlm bean;
    # no user-facing surface until V0.4, so 'on' only exposes the port to future slices.
    companion:
      enabled: true
    # Proactive layer (mezo-h4wp) — generated briefing (B1.1+). Presupposes the companion
    # switch: proactive beans condition on BOTH (they call the CompanionLlm port).
    proactive:
      enabled: true
  techcore:
    cron:
      # V2.2 nightly daily-summary generator (schedule itself: mezo.companion.summary.cron);
      # off = the DailySummaryJob bean does not exist
      daily-summary-job:
        enabled: true
      # V3.1 nightly statistical pattern detection (schedule: mezo.companion.patterns.cron);
      # off = the PatternDetectionJob bean does not exist
      pattern-detection-job:
        enabled: true
      # V3.2 weekly hypothesis pipeline (schedule: mezo.companion.hypotheses.cron);
      # off = the HypothesisJob bean does not exist
      hypothesis-job:
        enabled: true
      # B1.2 dawn briefing pre-generation (schedule: mezo.proactive.briefing.cron);
      # off = the BriefingJob bean does not exist
      briefing-job:
        enabled: true
      # W1 Monday weekly-suggestion pre-generation (schedule: mezo.proactive.weekly.cron);
      # off = the WeeklySuggestionJob bean does not exist
      weekly-suggestion-job:
        enabled: true
      # W2 Sunday memoir generation (schedule: mezo.proactive.memoir.cron);
      # off = the MemoirJob bean does not exist
      memoir-job:
        enabled: true
      # H1 heartbeat window crons (schedules: mezo.proactive.heartbeat.*);
      # off = the HeartbeatJob bean does not exist (the lazy GET still serves)
      heartbeat-job:
        enabled: true
      # P1 weekly generation + daily validation (schedules: mezo.proactive.prediction.*);
      # off = the PredictionJob bean does not exist (the lazy GET still serves)
      prediction-job:
        enabled: true
      # P2 weekly proposal + daily outcome evaluation (schedules: mezo.proactive.experiment.*);
      # off = the ExperimentJob bean does not exist (the lazy propose on GET still serves)
      experiment-job:
        enabled: true
      # Workout challenges daily outcome backstop (schedule: mezo.proactive.challenge.outcome-cron);
      # off = the ChallengeJob bean does not exist (the write-path still serves)
      challenge-job:
        enabled: true
  companion:
    # Companion LLM model tiers (ADR 0008) — config, never code. Binds onto CompanionProperties.
    llm:
      chat-model: gemini-2.5-flash   # cheap/fast tier: every conversational turn
      smart-model: gemini-2.5-pro    # smart tier: heavy pipelines (V3.2 critique); unused until then
    chat:
      # How many prior messages (user+assistant rows) are windowed into the system prompt (20 = ~10 turns)
      history-window: 20
      # Auto-title = first user message truncated to this many characters (DB column caps at 120)
      title-max-chars: 80
    snapshot:
      # How many days back the context-snapshot train digest looks (including today)
      digest-days: 7
      # The latest check-in note is included verbatim, truncated to this many characters
      checkin-note-max-chars: 200
    tools:
      # V0.5 tool calling — per-turn call budget + result-window clamps (spec §5 discipline)
      max-calls-per-turn: 6
      max-window-days: 30
      max-trend-weeks: 26
      max-refs-per-turn: 10
    facts:
      # V1.1 knowledge facts — how many confirmed facts (by reinforcement count, then newest)
      # are injected into every chat turn's system prompt
      top-n: 10
      # V3.3: pattern-facts promoted within this many days get an in-chat acknowledgment
      # block ("ezt megtanultam rólad"); 0 = off
      pattern-ack-days: 3
    extraction:
      # V1.2 post-turn fact extraction — async candidate capture after every chat turn;
      # off = the AFTER_COMMIT listener bean does not exist (no extraction LLM call ever)
      enabled: true
      # Max learned_fact candidates persisted per chat turn (dedupe against confirmed facts
      # + pending candidates runs first)
      max-candidates-per-turn: 3
    embedding:
      # V2.1 memory vectors (L1 episodic recall) — embedding model behind the EmbeddingPort.
      # The 768 dimension is structural (memory_embedding vector(768) + EmbeddingPort.DIMENSIONS), not config.
      model: gemini-embedding-001
      # V2.2: embed each completed chat turn (user+assistant as ONE unit) after commit;
      # off = the TurnEmbeddingListener bean does not exist (no post-turn embedding call ever)
      embed-chat-turns: true
      # Upper cap on embedded content length (chars) per narrative unit (turn / summary)
      embed-max-chars: 2000
    recall:
      # V2.3 find_similar_past_days — episodic recall ranking: similarity × exp(-age/decay-days)
      # τ: how fast an old day's relevance fades (days)
      decay-days: 90
      # Upper clamp for the tool's k arg (days recalled per call)
      max-k: 5
      # Raw cosine-similarity floor — below it a match is noise, not a memory
      min-similarity: 0.25
      # ANN candidates fetched before decay re-ranking
      candidate-pool: 20
      # Per-memory render cap in the tool result (chars) — gist over full re-quote
      render-max-chars: 300
    summary:
      # V2.2 nightly daily-summary job (the app's first @Scheduled) — cron in server zone,
      # 02:20 so "yesterday" is truly finished; the job switch lives under mezo.techcore.cron
      cron: "0 20 2 * * *"
      # Finished days back the job checks and self-heals (idempotent catch-up doubles as backfill)
      catch-up-days: 7
    hypotheses:
      # V3.2 weekly hypothesis loop (smart tier) — Sunday 03:00, after the nightly jobs
      cron: "0 0 3 * * SUN"
      # Max hypotheses judged per run
      max-per-run: 3
      # Weighted-critique keep threshold (arch §4.7)
      keep-threshold: 0.75
      # Borderline band floor — one revise + re-critique pass (arch §4.7)
      revise-threshold: 0.50
    patterns:
      # V3.1 nightly Pearson correlation over the pair catalog — 02:40, after the summary job
      cron: "0 40 2 * * *"
      # Correlation window (finished days)
      lookback-days: 60
      # Minimum aligned days before a pair may surface (honest small-n gate)
      min-n: 8
      # A confirmed pattern reinforces its promoted fact at most once per this many days
      # (the nightly window slides one day - re-counting the same evidence would inflate ranks)
      reinforce-cooldown-days: 7
      # The metric-pair catalog: key is the pattern's stable identity (never rename a live key);
      # metric-b is read lag-days AFTER metric-a's day (0 = same day)
      pairs:
        - key: sleep-quality~next-day-training-rpe
          category: physiology
          label: Fiziológia
          title: "Alvásminőség ↔ másnapi edzés-RPE"
          metric-a: sleep-quality
          metric-b: training-rpe
          lag-days: 1
        - key: sleep-duration~next-day-training-rpe
          category: physiology
          label: Fiziológia
          title: "Alváshossz ↔ másnapi edzés-RPE"
          metric-a: sleep-duration-h
          metric-b: training-rpe
          lag-days: 1
        - key: late-meal~next-sleep-quality
          category: trigger
          label: Trigger
          title: "Késői étkezés ↔ rákövetkező alvásminőség"
          metric-a: late-meal-hour
          metric-b: sleep-quality
          lag-days: 1
        - key: reta-cycle-day~daily-kcal
          category: physiology
          label: Fiziológia
          title: "Reta-ciklusnap ↔ napi kalória"
          metric-a: reta-cycle-day
          metric-b: daily-kcal
          lag-days: 0
        - key: sport-load~next-day-gym-volume
          category: response
          label: Response
          title: "Sportterhelés ↔ másnapi gym-volumen"
          metric-a: sport-load-min
          metric-b: gym-volume-kg
          lag-days: 1
        - key: daily-kcal~next-morning-weight-delta
          category: response
          label: Response
          title: "Napi kalória ↔ másnap reggeli súlyváltozás"
          metric-a: daily-kcal
          metric-b: weight-delta-kg
          lag-days: 1
        - key: checkin-stress~sleep-quality
          category: trigger
          label: Trigger
          title: "Stressz-szint ↔ aznapi alvásminőség"
          metric-a: checkin-stress
          metric-b: sleep-quality
          lag-days: 0
        - key: daily-water~checkin-energy
          category: physiology
          label: Fiziológia
          title: "Vízbevitel ↔ energia-szint"
          metric-a: daily-water-ml
          metric-b: checkin-energy
          lag-days: 0
    advisors:
      # V1.3 post-response advisor chain — deterministic clinical Rx-dose guard + one cheap-tier
      # LLM verdict (never-ask-twice redundancy + grounding-lite); reject -> one corrective
      # re-prompt -> degraded flag. Off = the chain beans do not exist (V1.2 behavior).
      enabled: true
      # Corrective re-prompts before an answer ships degraded (0 = check-only flagging)
      max-retries: 1
      # Prescription-med terms the clinical check guards (accent-folded match; dose-CHANGE verbs only)
      rx-terms: [retatrutid, reta, tirzepatid, mounjaro, szemaglutid, ozempic, wegovy]
  proactive:
    briefing:
      # How many finished days of narrative memory (daily_summary) the briefing gather reads;
      # doubles as the emptiness gate: zero summaries in the window -> no briefing (honest 404)
      past-days: 7
      # Dawn pre-generation schedule (server zone) — before the typical wake (B1.2)
      cron: "0 45 5 * * *"
      # Max staleness regenerations per user+day (a late sleep-log triggers at most this many)
      regen-cap-per-day: 2
    weekly:
      # W1 Monday-dawn plan-suggestion schedule (server zone); gathered from the finished previous week
      cron: "0 0 6 * * MON"
    memoir:
      # W2 Sunday-evening memoir schedule (old journey 5.8) — the week ending that Sunday
      cron: "0 0 19 * * SUN"
    heartbeat:
      # H1 window crons (server zone) — the lazy GET derives window fire-times from these
      # SAME expressions (CronExpression), so the schedule lives in exactly one place
      midday-cron: "0 30 12 * * *"
      evening-cron: "0 30 20 * * *"
    prediction:
      # P1 Monday-morning generation (after the weekly suggestion) + daily window-close validation
      cron: "0 30 6 * * MON"
      validation-cron: "0 15 6 * * *"
      max-per-week: 3
      # epsilon bands for the deterministic direction verdicts (stable inside ±epsilon)
      weight-epsilon-kg: 0.1
      sleep-epsilon-h: 0.25
    experiment:
      # P2 weekly proposal (Monday, after the prediction batch) + daily outcome evaluation
      propose-cron: "0 45 6 * * MON"
      outcome-cron: "0 20 6 * * *"
      max-open: 3
      min-days: 3
      max-days: 28
    challenge:
      # Daily outcome backstop (after the experiment outcome run)
      outcome-cron: "0 25 6 * * *"
      max-per-workout: 3
  fuel:
    protocol:
      # Deterministic-era protocol confidence (the Stack page 'conf' badge). P8 replaces this
      # with a computed value; until then it is config, never hardcoded in code.
      default-confidence: 0.86
    scoring:
      # Deterministic meal-score v0 (mezo-yta, ADR 0006) — 4-dimension weighted model.
      # Binds onto MealScoringProperties; formulas in specs/2026-07-05-fuel-p7-meal-scoring-design.md §3.
      weights:                    # must sum to 1.0 (validated at startup)
        macro: 0.30
        micro: 0.25
        nova: 0.25
        context: 0.20
      nova:                       # quality score per NOVA class (1 unprocessed .. 4 ultra-processed)
        group1: 1.0
        group2: 0.85
        group3: 0.55
        group4: 0.20
      # Macro dim: score = max(0, 1 - totalVariation(P/C/F kcal-shares vs mezo.nutrition targets) * slope)
      macro-deviation-slope: 2.0
      micro:                      # daily references; per-meal allotment scales by the meal's kcal-share
        fiber-g: 38               # fiber TARGET (g/day) — more is better up to the allotment
        sugar-limit-g: 78         # sugar LIMIT (g/day, ~10% of 3100 kcal)
        salt-limit-g: 6           # salt LIMIT (g/day)
        saturated-fat-limit-g: 34 # saturated-fat LIMIT (g/day, ~10% of kcal)
      slot-shares:                # expected kcal-share of the day per meal slot
        breakfast: 0.25
        lunch: 0.35
        dinner: 0.30
        snack: 0.10
      slot-windows:               # local-hour windows for the timing fit (snack always fits)
        breakfast-from: 5
        breakfast-to: 10
        lunch-from: 11
        lunch-to: 15
        dinner-from: 17
        dinner-to: 22
      # Relative tolerance around the slot share within which the kcal-fit is perfect
      slot-share-tolerance: 0.4
  progression:
    # Level threshold curve: xpThreshold(n) = round(base * (n-1)^exp); Lv2=100, Lv3≈303, Lv5≈919.
    curve:
      base: 100
      exp: 1.6
    # Streak robustness — family-agnostic (gym/run/sport all feed the training-week streak).
    robustness:
      per-week-xp: 25         # robustness XP per consecutive training week (streak-only v1)
    # Gym-path XP weights (display-only economy in v1; tune freely without touching code).
    gym:
      volume-unit: 100          # kg·reps that equal one volume XP unit
      volume-xp-per-unit: 10    # muscle XP per volume unit (per the day's logged muscles)
      e1rm-xp-per-kg: 2         # max_strength XP per kg of best Epley e1RM
      pr-bonus-xp: 40           # one-off bonus when the session's best e1RM beats the prior best
      strength-endurance-xp-per-set: 8  # per logged work set (non-skipped, reps present)
      bodyweight-xp-per-rep: 1  # flat XP per rep for weightless sets (no e1RM/volume)
    # Run-path XP weights.
    run:
      sprint-xp-per-round: 25     # sprint_speed per completed sprint round
      anaerobic-xp-per-round: 15  # anaerobic_capacity per completed sprint round
      steady-xp-per-min: 4        # strength_endurance per steady minute
      aerobic-xp-per-min: 5       # aerobic_capacity per steady minute
      rpe-xp-per-point: 6         # explosiveness / effort proxy per RPE point
      hr-recovery-bonus-xp: 30    # one-off aerobic bonus when HR-recovery is logged
    # Sport-path XP weights (athletic only; per-kind skill mapping in applySport).
    sport:
      xp-per-set: 12              # volleyball volume → vertical_jump/agility/coordination
      xp-per-round: 14            # cross/TRX volume → anaerobic_capacity/strength_endurance/core_stability
      xp-per-min: 4               # duration → aerobic_capacity (volleyball) / mobility (TRX)
      rpe-xp-per-point: 6         # RPE → explosiveness / effort skills
    # Radar aggregation (fixed axis grouping in v1; only the Erő muscle blend is tunable).
    radar:
      strength-muscle-blend: 0.5   # Erő = max_strength*(1-w) + muscle-level-mean*w
management:
  endpoints:
    web:
      exposure:
        include: health
