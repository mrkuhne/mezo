server:
  port: ${MEZO_PORT:8090}        # custom port — 8080 is taken by other local projects
spring:
  application:
    name: mezo
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:15432}/mezo
    username: ${DB_USER:mezo}
    password: ${DB_PASSWORD:mezo}
  jpa:
    hibernate:
      ddl-auto: validate          # Liquibase owns the schema, never Hibernate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  ai:
    google:
      genai:
        # Gemini API key (Google AI Studio) — ADR 0008. Real value comes from the environment
        # (local shell / k3s mezo-app secret); the dummy default keeps every context bootable
        # key-less (tests, CI, k3s before rollout) since the starter builds its ChatModel bean
        # regardless of the mezo.feature.companion switch. Real calls fail without a real key.
        api-key: ${GEMINI_API_KEY:dummy-key-set-GEMINI_API_KEY}
mezo:
  auth:
    jwt-secret: ${MEZO_JWT_SECRET:dev-only-change-me-32-bytes-minimum-secret}
    owner-email: ${MEZO_OWNER_EMAIL:owner@mezo.local}
    owner-password: ${MEZO_OWNER_PASSWORD:owner}
    owner-name: ${MEZO_OWNER_NAME:Owner}
  cors:
    # Browser origins allowed to call the API. The Vite dev server (:5180) is the default;
    # add the deployed frontend origin per environment. Server-to-server callers send no Origin
    # and bypass CORS entirely.
    allowed-origins:
      - http://localhost:5180
  goal:
    # G5 goal-engine tunables (grounded research). Binds onto GoalEngineProperties; the engine
    # services (Tasks 5–8) read these so no magic numbers / @Value live downstream.
    # PAL multipliers (BMR -> TDEE); moderate is the engine default when activity level is unknown.
    pal:
      sedentary: 1.2
      light: 1.375
      moderate: 1.55
      very: 1.725
      extra: 1.9
    kcal-per-kg: 7700               # band 6000–7700
    protein:
      g-per-kg-bw-default: 2.0
      g-per-kg-bw-floor: 1.6
      g-per-kg-bw-ceil: 2.2
      g-per-kg-lbm-low: 2.3
      g-per-kg-lbm-high: 3.1
      g-per-kg-bw-cap: 2.6
    rate:
      target-pct-per-week: 0.7
      cap-pct-per-week: 1.0
      band-low: 0.5
      band-high: 1.0
    volume:
      maintenance-sets: 8
      warn-below: 6
    strength:
      e1rm-breach-pct: -5.0
    ewma:
      half-life-days: 10           # band 10–14
    met:                           # per-session kcal deltas, 84 kg basis
      hypertrophy-kcal: 325
      interval-run-kcal: 500
      volleyball-rec-kcal: 500
      volleyball-comp-kcal: 1150
    thermogenesis-haircut-kcal-per-day: 0   # default off; optional band 100–200
    bootstrap-uncertainty-kcal: 300
  nutrition:
    # Owner-wide daily macro targets feeding the Fuel-day MacroHero (targets vs consumed).
    # Binds onto NutritionTargetsProperties; replaces the hardcoded mock 2500/3100 floor.
    kcal: 3100
    p: 220
    c: 380
    f: 95
    water: 4000
  feature:
    # Gamified progression engine (post-workout level-up + XP). No matchIfMissing — declared explicitly.
    progression:
      enabled: true
    # Phase-3 companion (LLM chat + AI memory, ADR 0008). Gates every CompanionLlm bean;
    # no user-facing surface until V0.4, so 'on' only exposes the port to future slices.
    companion:
      enabled: true
  companion:
    # Companion LLM model tiers (ADR 0008) — config, never code. Binds onto CompanionProperties.
    llm:
      chat-model: gemini-2.5-flash   # cheap/fast tier: every conversational turn
      smart-model: gemini-2.5-pro    # smart tier: heavy pipelines (V3.2 critique); unused until then
    chat:
      # How many prior messages (user+assistant rows) are windowed into the system prompt (20 = ~10 turns)
      history-window: 20
      # Auto-title = first user message truncated to this many characters (DB column caps at 120)
      title-max-chars: 80
    snapshot:
      # How many days back the context-snapshot train digest looks (including today)
      digest-days: 7
      # The latest check-in note is included verbatim, truncated to this many characters
      checkin-note-max-chars: 200
  fuel:
    protocol:
      # Deterministic-era protocol confidence (the Stack page 'conf' badge). P8 replaces this
      # with a computed value; until then it is config, never hardcoded in code.
      default-confidence: 0.86
  progression:
    # Level threshold curve: xpThreshold(n) = round(base * (n-1)^exp); Lv2=100, Lv3≈303, Lv5≈919.
    curve:
      base: 100
      exp: 1.6
    # Streak robustness — family-agnostic (gym/run/sport all feed the training-week streak).
    robustness:
      per-week-xp: 25         # robustness XP per consecutive training week (streak-only v1)
    # Gym-path XP weights (display-only economy in v1; tune freely without touching code).
    gym:
      volume-unit: 100          # kg·reps that equal one volume XP unit
      volume-xp-per-unit: 10    # muscle XP per volume unit (per the day's logged muscles)
      e1rm-xp-per-kg: 2         # max_strength XP per kg of best Epley e1RM
      pr-bonus-xp: 40           # one-off bonus when the session's best e1RM beats the prior best
      strength-endurance-xp-per-set: 8  # per logged work set (non-skipped, reps present)
      bodyweight-xp-per-rep: 1  # flat XP per rep for weightless sets (no e1RM/volume)
    # Run-path XP weights.
    run:
      sprint-xp-per-round: 25     # sprint_speed per completed sprint round
      anaerobic-xp-per-round: 15  # anaerobic_capacity per completed sprint round
      steady-xp-per-min: 4        # strength_endurance per steady minute
      aerobic-xp-per-min: 5       # aerobic_capacity per steady minute
      rpe-xp-per-point: 6         # explosiveness / effort proxy per RPE point
      hr-recovery-bonus-xp: 30    # one-off aerobic bonus when HR-recovery is logged
    # Sport-path XP weights (athletic only; per-kind skill mapping in applySport).
    sport:
      xp-per-set: 12              # volleyball volume → vertical_jump/agility/coordination
      xp-per-round: 14            # cross/TRX volume → anaerobic_capacity/strength_endurance/core_stability
      xp-per-min: 4               # duration → aerobic_capacity (volleyball) / mobility (TRX)
      rpe-xp-per-point: 6         # RPE → explosiveness / effort skills
    # Radar aggregation (fixed axis grouping in v1; only the Erő muscle blend is tunable).
    radar:
      strength-muscle-blend: 0.5   # Erő = max_strength*(1-w) + muscle-level-mean*w
management:
  endpoints:
    web:
      exposure:
        include: health
