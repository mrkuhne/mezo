            - neutral
            - mixed
            - negative
        contactCadenceLabel:
          type: string
        notes:
          type: string
        knownFacts:
          type: array
          items:
            type: string
        ties:
          type: array
          items:
            type: string
        affectTrend:
          type: array
          items:
            type: integer
        mentionCount:
          type: integer
          description: 'Count of live mention rows — computed, never seeded'
        mentionsThisWeek:
          type: integer
          description: Mentions in the rolling last 7 days
        lastMentionedAt:
          type: string
          format: date-time
    MentionResponse:
      type: object
