          type: string
          format: uuid
        title:
          type: string
        trajectory:
          type: string
          enum:
            - cut
            - bulk
            - maintain
        guards:
          type: array
          items:
            type: string
            enum:
              - strength
              - muscle
        status:
          type: string
          enum:
            - planned
            - active
            - archived
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date
        startWeightKg:
          type: number
        targetWeightKg:
          type: number
          nullable: true
        rateTargetPctPerWeek:
          type: number
        identityFrame:
          type: string
          nullable: true
        mealsPerDay:
          type: integer
          minimum: 3
          maximum: 6
          description: 'Day-planner: eating occasions per day'
        wakeTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: 'Day-planner wake anchor, HH:mm'
        bedTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: 'Day-planner bed anchor, HH:mm'
        tdeeBootstrap:
          allOf:
            - $ref: '#/components/schemas/TdeeBootstrap'
          nullable: true
        prescription:
          allOf:
            - $ref: '#/components/schemas/GoalPrescription'
          nullable: true
    TdeeBootstrap:
      type: object
      description: Formula-TDEE bootstrap snapshot computed at first evaluation.
      required:
        - bmr
        - tdee
        - pal
        - formula
        - computedAt
      properties:
        bmr:
          type: number
          description: Basal metabolic rate (kcal/day)
        tdee:
          type: number
          description: Total daily energy expenditure (kcal/day)
        pal:
          type: number
          description: Physical-activity-level multiplier
        formula:
          type: string
          enum:
            - MSJ
            - KATCH
          description: 'MSJ = Mifflin-St Jeor, KATCH = Katch-McArdle'
        computedAt:
          type: string
          format: date-time
    GoalPrescription:
      type: object
      description: >-
        Segmented recept produced by the engine — kcal/protein/sleep/rest per
        timeline segment, plus guard + feasibility status.
      required:
        - generatedAt
        - basis
        - segments
        - guardStatus
        - feasibility
      properties:
        generatedAt:
          type: string
          format: date-time
        basis:
          type: string
          enum:
            - formula
            - adaptive
        segments:
          type: array
          items:
            $ref: '#/components/schemas/GoalPrescriptionSegment'
        guardStatus:
          $ref: '#/components/schemas/GoalGuardStatus'
        feasibility:
          $ref: '#/components/schemas/GoalFeasibility'
    GoalPrescriptionSegment:
      type: object
      required:
        - fromWeek
        - toWeek
        - label
        - kcal
        - proteinG
        - sleepTargetH
        - restDays
        - projectedRateKgPerWk
        - rationale
      properties:
        fromWeek:
          type: integer
        toWeek:
          type: integer
        label:
          type: string
        kcal:
          type: integer
        proteinG:
          type: integer
        sleepTargetH:
          type: number
        restDays:
          type: array
          items:
            type: integer
        projectedRateKgPerWk:
          type: number
        rationale:
          type: string
    GoalGuardStatus:
