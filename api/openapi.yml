        - trajectory
        - startDate
        - targetDate
        - startWeightKg
      properties:
        title:
          type: string
          minLength: 1
        trajectory:
          type: string
          pattern: ^(cut|bulk|maintain)$
        guards:
          type: array
          items:
            type: string
            pattern: ^(strength|muscle)$
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date
