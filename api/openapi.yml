openapi: 3.0.3
info:
  title: mezo API
  description: >
    Contract-first API definition for the mezo backend — the single source of
    truth for generated backend DTOs / controller interfaces and frontend types.
    See docs/references/api_contract_conventions.md.
  version: 0.3.0
servers:
  - url: 'http://localhost:8090'
    description: Local dev backend (MEZO_PORT)
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Single-user thin auth (owner login)
  - name: Weight
    description: Weight log (biometrics)
  - name: Sleep
    description: Sleep log (biometrics)
  - name: CheckIn
    description: Daily check-in slots (biometrics)
  - name: Train
    description: Training domain — mesocycles (with volume provenance) and sport sessions
paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      operationId: login
      summary: 'Login with the owner credentials, returns a JWT'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Invalid credentials (AUTH_LOGIN_INVALID_CREDENTIALS)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/biometrics/weight:
    get:
      tags:
        - Weight
      operationId: listWeightLogs
      summary: 'All weight logs of the current user, date ascending'
      responses:
        '200':
          description: 'Weight logs, ordered by date ascending'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WeightLogResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags:
        - Weight
      operationId: logWeight
      summary: Log a weight entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogWeightRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeightLogResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/biometrics/sleep:
    get:
      tags:
        - Sleep
      operationId: listSleepLogs
      summary: 'All sleep logs of the current user, date ascending'
      responses:
        '200':
          description: 'Sleep logs, ordered by date ascending'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SleepLogResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags:
        - Sleep
      operationId: logSleep
      summary: Log a sleep entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogSleepRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SleepLogResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/biometrics/checkin:
    get:
      tags:
        - CheckIn
      operationId: listCheckInsForDay
      summary: Check-ins of the current user for one day
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Check-ins for the given day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CheckInResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags:
        - CheckIn
      operationId: saveCheckIn
      summary: Upsert a check-in slot (find-or-new on date + slotTime)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveCheckInRequest'
      responses:
        '200':
          description: 'Saved (upsert — 200, not 201)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckInResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/mesocycles:
    get:
      tags:
        - Train
      operationId: listMesocycles
      summary: >-
        All mesocycles of the current user with volume provenance and template
        days, start date ascending
      responses:
        '200':
          description: Mesocycles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MesocycleResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/sport-sessions:
    get:
      tags:
        - Train
      operationId: listSportSessions
      summary: 'Sport (volleyball) sessions of the current user, date descending'
      responses:
        '200':
          description: Sport sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SportSessionResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SystemMessage:
      type: object
      description: >
        Error contract returned by GlobalExceptionHandler (see
        error_handling.md). Every non-2xx response body is an array of
        SystemMessage.
      required:
        - code
        - type
      properties:
        level:
          type: string
          enum:
            - ERROR
            - WARNING
            - INFO
        code:
          type: string
          description: Machine-readable error code resolved via messages.properties
          example: VALIDATION_REQUIRED_FIELD
        params:
          type: array
          items:
            type: string
        message:
          type: string
          description: Resolved human-readable message (English)
        fieldName:
          type: string
          description: Offending field for FIELD-type messages
        type:
          type: string
          enum:
            - REQUEST
            - FIELD
        exceptionTraceId:
          type: string
          format: uuid
    SystemMessageList:
      type: array
      items:
        $ref: '#/components/schemas/SystemMessage'
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: owner@mezo.local
        password:
          type: string
          minLength: 1
    TokenResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: HS256-signed JWT bearer token
    LogWeightRequest:
      type: object
      required:
        - date
        - weightKg
      properties:
        date:
          type: string
          format: date
        weightKg:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 999.99
          description: Weight in kilograms (max 3 integer + 2 fraction digits)
        note:
          type: string
    WeightLogResponse:
      type: object
      required:
        - id
        - date
        - value
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        value:
          type: number
          description: Weight in kilograms (frontend field name)
        note:
          type: string
    LogSleepRequest:
      type: object
      required:
        - date
      properties:
        date:
          type: string
          format: date
        bedtime:
          type: string
          description: 'Bedtime as HH:mm'
          example: '23:10'
        wakeup:
          type: string
          description: 'Wake-up time as HH:mm'
          example: '06:45'
        durationH:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 99.99
          description: Sleep duration in hours (max 2 integer + 2 fraction digits)
        quality:
          type: integer
          minimum: 1
          maximum: 10
        awakenings:
          type: integer
          minimum: 0
        note:
          type: string
    SleepLogResponse:
      type: object
      required:
        - id
        - date
        - mealToSleep
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        bedtime:
          type: string
        wakeup:
          type: string
        duration:
          type: number
          description: Sleep duration in hours (frontend field name)
        quality:
          type: integer
        awakenings:
          type: integer
        mealToSleep:
          type: integer
          description: Hours between last meal and sleep — always 0 until Fuel lands
        notes:
          type: string
    SaveCheckInRequest:
      type: object
      required:
        - date
        - slotTime
        - state
      properties:
        date:
          type: string
          format: date
        slotTime:
          type: string
          minLength: 1
          description: 'Slot identifier as shown in the UI (e.g. "08:00")'
        state:
          type: string
          pattern: ^(done|now|skipped|pending)$
        energy:
          type: integer
          minimum: 1
          maximum: 10
        stress:
          type: integer
          minimum: 1
          maximum: 10
        body:
          type: integer
          minimum: 1
          maximum: 10
        mental:
          type: integer
          minimum: 1
          maximum: 10
        note:
          type: string
    CheckInResponse:
      type: object
      required:
        - id
        - date
        - slotTime
        - state
        - savedAt
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        slotTime:
          type: string
        state:
          type: string
        energy:
          type: integer
        stress:
          type: integer
        body:
          type: integer
        mental:
          type: integer
        note:
          type: string
        savedAt:
          type: string
          format: date-time
    MesocycleResponse:
      type: object
      required:
        - id
        - title
        - shortTitle
        - status
        - startDate
        - endDate
        - weeks
        - currentWeek
        - split
        - style
        - phaseCurve
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        shortTitle:
          type: string
        status:
          type: string
          enum:
            - active
            - planned
            - archived
        goal:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        weeks:
          type: integer
        currentWeek:
          type: integer
        split:
          type: string
        style:
          type: string
        phaseCurve:
          type: array
          items:
            type: string
            enum:
              - MEV
              - MAV
              - MRV
              - Deload
        notes:
          type: string
        summary:
          type: string
        volumeRecompute:
          $ref: '#/components/schemas/VolumeRecompute'
        volumePerMuscle:
          type: object
          description: 'Per-muscle volume profile keyed by muscle id (chest, back, ...)'
          additionalProperties:
            $ref: '#/components/schemas/VolumeProfile'
        days:
          type: array
          items:
            $ref: '#/components/schemas/MesoDay'
    VolumeRecompute:
      type: object
      required:
        - lastRun
        - nextRun
        - trigger
        - changes
      properties:
        lastRun:
          type: string
        nextRun:
          type: string
        trigger:
          type: string
        changes:
          type: array
          items:
            $ref: '#/components/schemas/VolumeChange'
    VolumeChange:
      type: object
      required:
        - muscle
        - change
        - reason
      properties:
        muscle:
          type: string
        change:
          type: string
        reason:
          type: string
        warning:
          type: boolean
    VolumeProfile:
      type: object
      required:
        - mev
        - mav
        - mrv
        - current
        - source
      properties:
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
        current:
          type: integer
        source:
          $ref: '#/components/schemas/VolumeSource'
    VolumeSource:
      type: object
      description: Provenance envelope — baseline -> adjustments -> confidence -> override
      required:
        - baseline
        - adjustments
        - confidence
      properties:
        baseline:
          $ref: '#/components/schemas/VolumeBaseline'
        adjustments:
          type: array
          items:
            $ref: '#/components/schemas/VolumeAdjustment'
        confidence:
          type: number
        note:
          type: string
        userOverride:
          $ref: '#/components/schemas/VolumeUserOverride'
    VolumeBaseline:
      type: object
      required:
        - name
        - mev
        - mav
        - mrv
      properties:
        name:
          type: string
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
    VolumeAdjustment:
      type: object
      required:
        - kind
        - label
        - delta
      properties:
        kind:
          type: string
          pattern: ^(pattern|recovery|niggle|sport-cross)$
        label:
          type: string
        delta:
          type: object
          description: Partial mev/mav/mrv deltas
          additionalProperties:
            type: integer
        warning:
          type: boolean
    VolumeUserOverride:
      type: object
      required:
        - mev
        - mav
        - mrv
        - at
      properties:
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
        at:
          type: string
          format: date-time
    MesoDay:
      type: object
      required:
        - day
        - type
        - muscle
        - exerciseCount
        - exercises
      properties:
        day:
          type: string
          description: '''Hét''..''Vas'''
        type:
          type: string
        muscle:
          type: string
        exerciseCount:
          type: integer
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/GymExercise'
        note:
          type: string
        current:
          type: boolean
        muscleAccent:
          type: boolean
    GymExercise:
      type: object
      required:
        - id
        - name
        - muscle
        - sets
        - targetReps
        - targetRIR
        - type
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        muscle:
          type: string
        sets:
          type: integer
        targetReps:
          type: string
        targetRIR:
          type: integer
        type:
          type: string
          enum:
            - compound
            - isolation
        warning:
          type: string
    SportSessionResponse:
      type: object
      required:
        - id
        - sport
        - date
        - time
        - duration
        - setsPlayed
        - intensity
        - rpe
        - shoulderStrain
        - jumpCount
      properties:
        id:
          type: string
          format: uuid
        sport:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
          description: 'HH:mm'
          example: '18:15'
        duration:
          type: integer
          description: minutes
        setsPlayed:
          type: integer
        intensity:
          type: integer
        rpe:
          type: number
        shoulderStrain:
          type: integer
        jumpCount:
          type: integer
        notes:
          type: string
