  '/api/companion/conversation/{conversationId}/message/stream':
    post:
      tags:
        - CompanionStream
      operationId: streamMessage
      summary: >-
        Send a user message and stream the assistant's answer as Server-Sent
        Events (V0.4). Events: 0..n 'delta' (data = StreamDelta JSON), then
        exactly one terminal event — 'done' (data = the persisted assistant
        MessageResponse JSON) or 'error' (data = StreamError JSON; the assistant
        turn is NOT persisted, the user message is). Every data line is JSON.
        Clients should send "Accept: text/event-stream, application/json" so
        pre-stream errors (400/401/404) arrive as normal SystemMessageList JSON.
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: >-
            SSE frames — see the per-event data schemas (StreamDelta /
            MessageResponse / StreamError)
          content:
            text/event-stream:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/StreamDelta'
                  - $ref: '#/components/schemas/MessageResponse'
                  - $ref: '#/components/schemas/StreamError'
        '400':
          description: Validation error (emitted before the stream starts)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Conversation not found (or owned by someone else)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/people:
    get:
      tags:
        - People
      operationId: getPeopleBootstrap
      summary: >-
        Persons (mention-count desc) + recent mentions (ts desc, max 50) of the
        current user
      responses:
        '200':
          description: People bootstrap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeopleResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/people/{personId}/mentions':
    post:
      tags:
        - People
      operationId: logMention
      summary: Log a mention for an owned person (source/ts/flagged are server-stamped)
      parameters:
        - name: personId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogMentionRequest'
      responses:
        '201':
          description: Mention created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentionResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Person missing or foreign (indistinguishable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/proactive/briefing:
    get:
      tags:
        - Proactive
      operationId: getBriefing
      summary: >-
        The generated morning briefing for one day (lazily generated when the
        dawn cron has not produced it yet)
      parameters:
        - name: date
          in: query
          required: false
          description: >-
            The briefed day — the FE sends its LOCAL date (the check-in read
            precedent); defaults to the server's today.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: The persisted (or just-generated) briefing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BriefingResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: >-
            No briefing possible — no narrative memory (daily_summary) in the
            configured past-days window. The FE renders its honest state (B1.2).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/proactive/weekly-suggestion:
    get:
      tags:
        - Proactive
      operationId: getWeeklySuggestion
      summary: >-
        The companion's generated plan suggestion for the week containing the
        given day (lazily generated when the Monday cron has not produced it
        yet)
      parameters:
        - name: date
          in: query
          required: false
          description: >-
            Any day of the wanted week (the FE sends its LOCAL date); defaults
            to the server's today. The week identity is the ISO Monday.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: The persisted (or just-generated) weekly suggestion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklySuggestionResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: >-
            No suggestion possible — no narrative memory (daily_summary) in the
            prior week. The FE keeps its honest placeholder.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/proactive/memoir:
    get:
      tags:
        - Proactive
      operationId: getMemoir
      summary: >-
        The latest weekly memoir (lazily generated for the last completed week
        when none exists yet)
      responses:
        '200':
          description: The latest persisted (or just-generated) memoir
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoirResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: >-
            No memoir possible — no narrative memory in the last completed week.
            The FE renders its honest "készül" state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/proactive/heartbeat:
    get:
      tags:
        - Proactive
      operationId: getHeartbeat
      summary: 'The day''s latest heartbeat note (napközbeni jelenlét, H1)'
      description: >-
        Returns the latest persisted heartbeat note for the given day (evening
        closing beats midday nudge by generation time). For TODAY the latest
        already-elapsed window lazy-generates when missing (the miss-recovery);
        past dates never generate. 404 = honest absence (no elapsed window yet,
        no narrative memory, or generation failed).
      parameters:
        - name: date
          in: query
          required: false
          description: >-
            The noted day — the FE sends its LOCAL date (the briefing
            precedent); defaults to the server's today.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: The day's latest heartbeat note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeartbeatNoteResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: >-
            No note for the day (honest absence). The Today card simply stays
            absent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/proactive/prediction:
    get:
      tags:
        - Proactive
      operationId: getPredictions
      summary: Pattern-grounded weekly predictions with validation state (P1)
      description: >-
        All live predictions, newest window first. Lazily generates the CURRENT
        week's batch when that week has no rows yet (needs CONFIRMED patterns —
        the grounding gate). An empty array is the honest empty state (never
        fabricated forecasts).
      responses:
        '200':
          description: All live predictions (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PredictionResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/proactive/experiment:
    get:
      tags:
        - Proactive
      operationId: getExperiments
      summary: 'All live N=1 experiments (proposed/active/completed), newest first (P2)'
      description: >-
        Returns the user's live experiments (dismissed excluded). An empty array
        is the honest empty state (never a 404). Lazily proposes when the user
        has none and has confirmed patterns.
      responses:
        '200':
          description: All live experiments (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExperimentResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/proactive/experiment/propose:
    post:
      tags:
        - Proactive
      operationId: proposeExperiments
      summary: On-demand experiment proposal ("+ Új kísérlet javasol Mezo") (P2)
      description: >-
        Generates up to the open-cap of experiment proposals from confirmed
        patterns. A no-op (empty array) when the cap is already met or there are
        no confirmed patterns.
      responses:
        '200':
          description: The freshly proposed experiments (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExperimentResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/proactive/experiment/{id}/decision':
    post:
      tags:
        - Proactive
      operationId: decideExperiment
      summary: L2 accept/dismiss a proposed experiment (P2)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExperimentDecisionRequest'
      responses:
        '200':
          description: The experiment with its new status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Experiment not found (or owned by someone else)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '409':
          description: The experiment is not in the proposed state (already decided)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/proactive/challenge:
    get:
      tags:
        - Proactive
      operationId: getChallenges
      summary: >-
        Live workout challenges for a planned session on a day
        (proposed/accepted/hit/miss/inconclusive) (Challenges)
      description: >-
        Returns the session/day's live challenges (dismissed excluded). Lazily
        generates when none exist and date == today; lazily evaluates accepted
        ones once the instance is done. An empty array is the honest empty state
        (never a 404).
      parameters:
        - name: templateSessionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: The session/day's live challenges (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChallengeResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/proactive/challenge/{id}/decision':
    post:
      tags:
        - Proactive
      operationId: decideChallenge
      summary: L2 accept/dismiss a proposed workout challenge (Challenges)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChallengeDecisionRequest'
      responses:
        '200':
          description: The challenge with its new status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Challenge not found (or owned by someone else)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '409':
          description: The challenge is not in the proposed state (already decided)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/quest/day/{date}':
    get:
      tags:
        - Quest
      operationId: getQuestDay
      summary: >-
        The day's daily quests (lazy-generates for today; evaluates derived
        completion) (Quests)
      description: >-
        Returns the day's quests (rerolled rows excluded). Lazily generates when
        none exist and date == today; lazily evaluates offered derived quests
        (completing them awards XP through progression — completions surface in
        levelUps); offered quests of past days expire quietly. An empty quests
        array is the honest empty state (never a 404).
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: The day's quests + any level-up payloads produced by this evaluation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestDayResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/quest/{id}/reroll':
    post:
      tags:
        - Quest
      operationId: rerollQuest
      summary: >-
        Replace one of today's offered quests with the next eligible catalog
        candidate (Quests)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The replacement quest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Quest not found (or owned by someone else)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '409':
          description: >-
            Quest not offered / not today / daily reroll cap reached / no
            alternative left
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SystemMessage:
      type: object
      description: >
        Error contract returned by GlobalExceptionHandler (see
        error_handling.md). Every non-2xx response body is an array of
        SystemMessage.
      required:
        - code
        - type
      properties:
        level:
          type: string
          enum:
            - ERROR
            - WARNING
            - INFO
        code:
          type: string
          description: Machine-readable error code resolved via messages.properties
          example: VALIDATION_REQUIRED_FIELD
        params:
          type: array
          items:
            type: string
        message:
          type: string
          description: Resolved human-readable message (English)
        fieldName:
          type: string
          description: Offending field for FIELD-type messages
        type:
          type: string
          enum:
            - REQUEST
            - FIELD
        exceptionTraceId:
          type: string
          format: uuid
    SystemMessageList:
      type: array
      items:
        $ref: '#/components/schemas/SystemMessage'
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: owner@mezo.local
        password:
          type: string
          minLength: 1
    TokenResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: HS256-signed JWT bearer token
    LogWeightRequest:
      type: object
      required:
        - date
        - weightKg
      properties:
        date:
          type: string
          format: date
        weightKg:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 999.99
          description: Weight in kilograms (max 3 integer + 2 fraction digits)
        note:
          type: string
    WeightLogResponse:
      type: object
      required:
        - id
        - date
        - value
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        value:
          type: number
          description: Weight in kilograms (frontend field name)
        note:
          type: string
    WeightTrendPoint:
      type: object
      required:
        - date
        - trendKg
      properties:
        date:
          type: string
          format: date
        trendKg:
          type: number
          description: EWMA-smoothed weight (kg) at this date
    WeightTrendResponse:
      type: object
      required:
        - ewmaSeries
        - latestTrendKg
        - weeklyRateKgPerWeek
        - weeklyRatePctPerWeek
        - last4wRateKgPerWeek
        - dataSufficiency
      properties:
        ewmaSeries:
          type: array
          items:
            $ref: '#/components/schemas/WeightTrendPoint'
        latestTrendKg:
          type: number
          description: Latest EWMA trend value (kg)
        weeklyRateKgPerWeek:
          type: number
          description: Current weekly rate of change (kg/week) from the EWMA trend
        weeklyRatePctPerWeek:
          type: number
          description: Current weekly rate as percent of body weight per week
        last4wRateKgPerWeek:
          type: number
          description: Weekly rate (kg/week) averaged over the last 4 weeks
        dataSufficiency:
          type: string
          enum:
            - none
            - provisional
            - full
          description: How much logged weight data backs the trend
    LogSleepRequest:
      type: object
      required:
        - date
      properties:
        date:
          type: string
          format: date
        bedtime:
          type: string
          description: 'Bedtime as HH:mm'
          example: '23:10'
        wakeup:
          type: string
          description: 'Wake-up time as HH:mm'
          example: '06:45'
        durationH:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 99.99
          description: Sleep duration in hours (max 2 integer + 2 fraction digits)
        quality:
          type: integer
          minimum: 1
          maximum: 10
        awakenings:
          type: integer
          minimum: 0
        note:
          type: string
    SleepLogResponse:
      type: object
      required:
        - id
        - date
        - mealToSleep
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        bedtime:
          type: string
        wakeup:
          type: string
        duration:
          type: number
          description: Sleep duration in hours (frontend field name)
        quality:
          type: integer
        awakenings:
          type: integer
        mealToSleep:
          type: integer
          description: Hours between last meal and sleep — always 0 until Fuel lands
        notes:
          type: string
    SaveCheckInRequest:
      type: object
      required:
        - date
        - slotTime
        - state
      properties:
        date:
          type: string
          format: date
        slotTime:
          type: string
          minLength: 1
          description: 'Slot identifier as shown in the UI (e.g. "08:00")'
        state:
          type: string
          pattern: ^(done|now|skipped|pending)$
        energy:
          type: integer
          minimum: 1
          maximum: 10
        stress:
          type: integer
          minimum: 1
          maximum: 10
        body:
          type: integer
          minimum: 1
          maximum: 10
        mental:
          type: integer
          minimum: 1
          maximum: 10
        note:
          type: string
    CheckInResponse:
      type: object
      required:
        - id
        - date
        - slotTime
        - state
        - savedAt
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        slotTime:
          type: string
        state:
          type: string
        energy:
          type: integer
        stress:
          type: integer
        body:
          type: integer
        mental:
          type: integer
        note:
          type: string
        savedAt:
          type: string
          format: date-time
    MesocycleResponse:
      type: object
      required:
        - id
        - title
        - shortTitle
        - status
        - startDate
        - endDate
        - weeks
        - currentWeek
        - split
        - style
        - phaseCurve
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        shortTitle:
          type: string
        status:
          type: string
          enum:
            - active
            - planned
            - archived
        goal:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        weeks:
          type: integer
        currentWeek:
          type: integer
        split:
          type: string
        style:
          type: string
        phaseCurve:
          type: array
          items:
            type: string
            enum:
              - MEV
              - MAV
              - MRV
              - Deload
        notes:
          type: string
        summary:
          type: string
        volumeRecompute:
          $ref: '#/components/schemas/VolumeRecompute'
        volumePerMuscle:
          type: object
          description: 'Per-muscle volume profile keyed by muscle id (chest, back, ...)'
          additionalProperties:
            $ref: '#/components/schemas/VolumeProfile'
        days:
          type: array
          items:
            $ref: '#/components/schemas/MesoDay'
    VolumeRecompute:
      type: object
      required:
        - lastRun
        - nextRun
        - trigger
        - changes
      properties:
        lastRun:
          type: string
        nextRun:
          type: string
        trigger:
          type: string
        changes:
          type: array
          items:
            $ref: '#/components/schemas/VolumeChange'
    VolumeChange:
      type: object
      required:
        - muscle
        - change
        - reason
      properties:
        muscle:
          type: string
        change:
          type: string
        reason:
          type: string
        warning:
          type: boolean
    VolumeProfile:
      type: object
      required:
        - mev
        - mav
        - mrv
        - current
        - source
      properties:
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
        current:
          type: integer
        source:
          $ref: '#/components/schemas/VolumeSource'
    VolumeSource:
      type: object
      description: Provenance envelope — baseline -> adjustments -> confidence -> override
      required:
        - baseline
        - adjustments
        - confidence
      properties:
        baseline:
          $ref: '#/components/schemas/VolumeBaseline'
        adjustments:
          type: array
          items:
            $ref: '#/components/schemas/VolumeAdjustment'
        confidence:
          type: number
        note:
          type: string
        userOverride:
          $ref: '#/components/schemas/VolumeUserOverride'
    VolumeBaseline:
      type: object
      required:
        - name
        - mev
        - mav
        - mrv
      properties:
        name:
          type: string
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
    VolumeAdjustment:
      type: object
      required:
        - kind
        - label
        - delta
      properties:
        kind:
          type: string
          pattern: ^(pattern|recovery|niggle|sport-cross)$
        label:
          type: string
        delta:
          type: object
          description: Partial mev/mav/mrv deltas
          additionalProperties:
            type: integer
        warning:
          type: boolean
    VolumeUserOverride:
      type: object
      required:
        - mev
        - mav
        - mrv
        - at
      properties:
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
        at:
          type: string
          format: date-time
    MesoDay:
      type: object
      required:
        - day
        - type
        - muscle
        - exerciseCount
        - exercises
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The underlying template-day (workout_session) row — addresses
            day-level writes
        day:
          type: string
          description: '''Hét''..''Vas'''
        type:
          type: string
        muscle:
          type: string
        exerciseCount:
          type: integer
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/GymExercise'
        note:
          type: string
