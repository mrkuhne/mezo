      properties:
        code:
          type: string
          description: Stream failure code — 'COMPANION_STREAM_FAILED'.
    PatternResponse:
      type: object
      required:
        - id
        - kind
        - category
        - categoryLabel
        - title
        - evidence
        - status
        - lastDetectedAt
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          pattern: ^(statistical|ai_hypothesis)$
          description: >-
            statistical = nightly Pearson job (V3.1); ai_hypothesis = weekly LLM
            loop (V3.2).
        category:
          type: string
          pattern: ^(physiology|trigger|response)$
          description: The FE PatternCategory — assigned by the metric-pair catalog.
        categoryLabel:
          type: string
          description: Hungarian category chip label.
        title:
          type: string
        mechanism:
          type: string
          nullable: true
          description: >-
            Deterministic HU description for statistical rows; LLM mechanism for
            V3.2 hypotheses.
        evidence:
          type: array
          items:
            type: string
          description: 'Deterministic evidence chips (r=…, n=… nap, p=…, window).'
        confidence:
          type: number
          format: double
          nullable: true
          description: >-
            NULL for statistical rows (honest small-n — the FE renders
            "tanulom"); the 4-factor critique score for V3.2 hypotheses.
        critique:
          $ref: '#/components/schemas/PatternCritique'
        status:
          type: string
          pattern: ^(proposed|monitoring|confirmed|rejected)$
        lastDetectedAt:
          type: string
          format: date-time
          description: When the nightly job last computed/refreshed the stats.
        thinking:
          type: string
          nullable: true
          description: >-
            The V3.2 critic's prose reasoning — the card's 'AI gondolatmenete';
            null on statistical rows.
    PatternCritique:
      type: object
      nullable: true
      description: >-
        The V3.2 4-factor critique (0..1 each) — null until the hypothesis loop
        lands.
      properties:
        statistical:
          type: number
          format: double
        confounders:
          type: number
          format: double
        l3align:
          type: number
          format: double
        actionability:
          type: number
          format: double
    PatternDecisionRequest:
      type: object
      required:
        - decision
      properties:
        decision:
          type: string
          pattern: ^(confirm|monitor|reject)$
    LogMentionRequest:
      type: object
      required:
        - tone
      properties:
        tone:
          type: string
          pattern: ^(positive|neutral|mixed|negative)$
        text:
          type: string
          maxLength: 500
    PeopleResponse:
      type: object
      required:
        - persons
        - mentions
      properties:
        persons:
          type: array
          items:
            $ref: '#/components/schemas/PersonResponse'
        mentions:
