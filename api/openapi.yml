          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: 'Day-planner wake anchor, HH:mm'
        bedTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: 'Day-planner bed anchor, HH:mm'
    FeasibilityPreviewRequest:
      type: object
      description: >-
        A draft goal window — feeds the stateless realism preview (no
        persistence, no ownership).
      required:
        - trajectory
        - startWeightKg
        - startDate
        - targetDate
      properties:
        trajectory:
          type: string
          pattern: ^(cut|bulk|maintain)$
        startWeightKg:
          type: number
          minimum: 0
        targetWeightKg:
          type: number
          nullable: true
          minimum: 0
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date
    FeasibilityPreviewResponse:
      type: object
      description: >-
        The server-derived weekly rate + realism verdict for a draft window;
        suggestedTargetDate is set only when the draft is over the rate cap.
      required:
        - derivedRatePctPerWeek
        - withinSafeBand
        - verdict
      properties:
        derivedRatePctPerWeek:
          type: number
          description: >-
            Unsigned weekly rate magnitude (%BW/wk) derived from |startW −
            targetW| / startW / weeks.
        withinSafeBand:
          type: boolean
          description: true when derivedRate ≤ the rate cap (mezo.goal.rate.capPctPerWeek).
        verdict:
          type: string
          enum:
            - feasible
            - feasible-with-warnings
            - aggressive
        suggestedTargetDate:
          type: string
          format: date
          nullable: true
          description: >-
            The earliest cap-paced target date; present ONLY when derivedRate is
            over the cap.
