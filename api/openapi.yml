components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SystemMessage:
      type: object
      description: >
        Error contract returned by GlobalExceptionHandler (see
        error_handling.md). Every non-2xx response body is an array of
        SystemMessage.
      required:
        - code
        - type
      properties:
        level:
          type: string
          enum:
            - ERROR
            - WARNING
            - INFO
        code:
          type: string
          description: Machine-readable error code resolved via messages.properties
          example: VALIDATION_REQUIRED_FIELD
        params:
          type: array
          items:
            type: string
        message:
          type: string
          description: Resolved human-readable message (English)
        fieldName:
          type: string
          description: Offending field for FIELD-type messages
        type:
          type: string
          enum:
            - REQUEST
            - FIELD
        exceptionTraceId:
          type: string
          format: uuid
    SystemMessageList:
      type: array
      items:
        $ref: '#/components/schemas/SystemMessage'
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: owner@mezo.local
        password:
          type: string
          minLength: 1
    TokenResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: HS256-signed JWT bearer token
    LogWeightRequest:
      type: object
      required:
        - date
        - weightKg
      properties:
        date:
          type: string
          format: date
        weightKg:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 999.99
          description: Weight in kilograms (max 3 integer + 2 fraction digits)
        note:
          type: string
    WeightLogResponse:
      type: object
      required:
        - id
        - date
        - value
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        value:
          type: number
          description: Weight in kilograms (frontend field name)
        note:
          type: string
    WeightTrendPoint:
      type: object
      required:
        - date
        - trendKg
      properties:
        date:
          type: string
          format: date
        trendKg:
          type: number
          description: EWMA-smoothed weight (kg) at this date
    WeightTrendResponse:
      type: object
      required:
        - ewmaSeries
        - latestTrendKg
        - weeklyRateKgPerWeek
        - weeklyRatePctPerWeek
        - last4wRateKgPerWeek
        - dataSufficiency
      properties:
        ewmaSeries:
          type: array
          items:
            $ref: '#/components/schemas/WeightTrendPoint'
        latestTrendKg:
          type: number
          description: Latest EWMA trend value (kg)
        weeklyRateKgPerWeek:
          type: number
          description: Current weekly rate of change (kg/week) from the EWMA trend
        weeklyRatePctPerWeek:
          type: number
          description: Current weekly rate as percent of body weight per week
        last4wRateKgPerWeek:
          type: number
          description: Weekly rate (kg/week) averaged over the last 4 weeks
        dataSufficiency:
          type: string
          enum:
            - none
            - provisional
            - full
          description: How much logged weight data backs the trend
    LogSleepRequest:
      type: object
      required:
        - date
      properties:
        date:
          type: string
          format: date
        bedtime:
          type: string
          description: 'Bedtime as HH:mm'
          example: '23:10'
        wakeup:
          type: string
          description: 'Wake-up time as HH:mm'
          example: '06:45'
        durationH:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 99.99
          description: Sleep duration in hours (max 2 integer + 2 fraction digits)
        quality:
          type: integer
          minimum: 1
          maximum: 10
        awakenings:
          type: integer
          minimum: 0
        note:
          type: string
    SleepLogResponse:
      type: object
      required:
        - id
        - date
        - mealToSleep
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        bedtime:
          type: string
        wakeup:
          type: string
        duration:
          type: number
          description: Sleep duration in hours (frontend field name)
        quality:
          type: integer
        awakenings:
          type: integer
        mealToSleep:
          type: integer
          description: Hours between last meal and sleep — always 0 until Fuel lands
        notes:
          type: string
    SaveCheckInRequest:
      type: object
      required:
        - date
        - slotTime
        - state
      properties:
        date:
          type: string
          format: date
        slotTime:
          type: string
          minLength: 1
          description: 'Slot identifier as shown in the UI (e.g. "08:00")'
        state:
          type: string
          pattern: ^(done|now|skipped|pending)$
        energy:
          type: integer
          minimum: 1
          maximum: 10
        stress:
          type: integer
          minimum: 1
          maximum: 10
        body:
          type: integer
          minimum: 1
          maximum: 10
        mental:
          type: integer
          minimum: 1
          maximum: 10
        note:
          type: string
    CheckInResponse:
      type: object
      required:
        - id
        - date
        - slotTime
        - state
        - savedAt
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        slotTime:
          type: string
        state:
          type: string
        energy:
          type: integer
        stress:
          type: integer
        body:
          type: integer
        mental:
          type: integer
        note:
          type: string
        savedAt:
          type: string
          format: date-time
    MesocycleResponse:
      type: object
      required:
        - id
        - title
        - shortTitle
        - status
        - startDate
        - endDate
        - weeks
        - currentWeek
        - split
        - style
        - phaseCurve
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        shortTitle:
          type: string
        status:
          type: string
          enum:
            - active
            - planned
            - archived
        goal:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        weeks:
          type: integer
        currentWeek:
          type: integer
        split:
          type: string
        style:
          type: string
        phaseCurve:
          type: array
          items:
            type: string
            enum:
              - MEV
              - MAV
              - MRV
              - Deload
        notes:
          type: string
        summary:
          type: string
        volumeRecompute:
          $ref: '#/components/schemas/VolumeRecompute'
        volumePerMuscle:
          type: object
          description: 'Per-muscle volume profile keyed by muscle id (chest, back, ...)'
          additionalProperties:
            $ref: '#/components/schemas/VolumeProfile'
        days:
          type: array
          items:
            $ref: '#/components/schemas/MesoDay'
    VolumeRecompute:
      type: object
      required:
        - lastRun
        - nextRun
        - trigger
        - changes
      properties:
        lastRun:
          type: string
        nextRun:
          type: string
        trigger:
          type: string
        changes:
          type: array
          items:
            $ref: '#/components/schemas/VolumeChange'
    VolumeChange:
      type: object
      required:
        - muscle
        - change
        - reason
      properties:
        muscle:
          type: string
        change:
          type: string
        reason:
          type: string
        warning:
          type: boolean
    VolumeProfile:
      type: object
      required:
        - mev
        - mav
        - mrv
        - current
        - source
      properties:
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
        current:
          type: integer
        source:
          $ref: '#/components/schemas/VolumeSource'
    VolumeSource:
      type: object
      description: Provenance envelope — baseline -> adjustments -> confidence -> override
      required:
        - baseline
        - adjustments
        - confidence
      properties:
        baseline:
          $ref: '#/components/schemas/VolumeBaseline'
        adjustments:
          type: array
          items:
            $ref: '#/components/schemas/VolumeAdjustment'
        confidence:
          type: number
        note:
          type: string
        userOverride:
          $ref: '#/components/schemas/VolumeUserOverride'
    VolumeBaseline:
      type: object
      required:
        - name
        - mev
        - mav
        - mrv
      properties:
        name:
          type: string
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
    VolumeAdjustment:
      type: object
      required:
        - kind
        - label
        - delta
      properties:
        kind:
          type: string
          pattern: ^(pattern|recovery|niggle|sport-cross)$
        label:
          type: string
        delta:
          type: object
          description: Partial mev/mav/mrv deltas
          additionalProperties:
            type: integer
        warning:
          type: boolean
    VolumeUserOverride:
      type: object
      required:
        - mev
        - mav
        - mrv
        - at
      properties:
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
        at:
          type: string
          format: date-time
    MesoDay:
      type: object
      required:
        - day
        - type
        - muscle
        - exerciseCount
        - exercises
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The underlying template-day (workout_session) row — addresses
            day-level writes
        day:
