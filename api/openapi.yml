            application/json:
              schema:
                $ref: '#/components/schemas/MedicationDayResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/medication/{id}':
    put:
      tags:
        - Medication
      operationId: updateMedication
      summary: Edit an owned medication's definition and cycle config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedicationRequest'
      responses:
        '200':
