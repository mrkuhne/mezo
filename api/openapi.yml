          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicationResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/medication/{id}/dose':
    post:
      tags:
        - Medication
      operationId: logDose
      summary: Log an actual injection against an owned medication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedicationDoseRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicationDoseResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/medication/{id}/dose/{doseId}':
    delete:
      tags:
        - Medication
      operationId: deleteDose
      summary: Soft-delete a mis-entered dose
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: doseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/progression/profile:
    get:
      operationId: getProfile
      tags:
        - Progression
      summary: >-
        Athletic + muscle progression profile (radar, athlete-level, streak,
        highlights).
      responses:
        '200':
          description: The progression profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressionProfileResponse'
        '401':
          description: Unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/fuel/protocol:
    get:
      tags:
        - Fuel
      operationId: getProtocol
      summary: >-
        The active protocol + version history (active absent when none exists —
        honest-empty)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtocolViewResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags:
        - Fuel
      operationId: activateProtocol
      summary: >-
        Activate a new protocol version from the current selection (previous
        active superseded)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProtocolActivateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtocolViewResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/fuel/intake/{date}':
    get:
      tags:
        - Fuel
      operationId: listIntakes
      summary: >-
        The day's supplement intakes (feeds taken-state; the P5 timeline reuses
        this read)
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntakeListResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/fuel/intake:
    post:
      tags:
        - Fuel
      operationId: logIntake
      summary: >-
        Log one supplement/stim intake (dose snapshotted from the pantry item
        when omitted)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntakeRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntakeResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Pantry item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/fuel/intake/entry/{id}':
    delete:
      tags:
        - Fuel
      operationId: deleteIntake
      summary: Soft-delete an intake entry (undo a mis-tap)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SystemMessage:
      type: object
      description: >
        Error contract returned by GlobalExceptionHandler (see
        error_handling.md). Every non-2xx response body is an array of
        SystemMessage.
      required:
        - code
        - type
      properties:
        level:
          type: string
          enum:
            - ERROR
            - WARNING
            - INFO
        code:
          type: string
          description: Machine-readable error code resolved via messages.properties
          example: VALIDATION_REQUIRED_FIELD
        params:
          type: array
          items:
            type: string
        message:
          type: string
          description: Resolved human-readable message (English)
        fieldName:
          type: string
          description: Offending field for FIELD-type messages
        type:
          type: string
          enum:
            - REQUEST
            - FIELD
        exceptionTraceId:
          type: string
          format: uuid
    SystemMessageList:
      type: array
      items:
        $ref: '#/components/schemas/SystemMessage'
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: owner@mezo.local
        password:
          type: string
          minLength: 1
    TokenResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: HS256-signed JWT bearer token
    LogWeightRequest:
      type: object
      required:
        - date
        - weightKg
      properties:
        date:
          type: string
          format: date
        weightKg:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 999.99
          description: Weight in kilograms (max 3 integer + 2 fraction digits)
        note:
          type: string
    WeightLogResponse:
      type: object
      required:
        - id
        - date
        - value
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        value:
          type: number
          description: Weight in kilograms (frontend field name)
        note:
          type: string
    WeightTrendPoint:
      type: object
      required:
        - date
        - trendKg
      properties:
        date:
          type: string
          format: date
        trendKg:
          type: number
          description: EWMA-smoothed weight (kg) at this date
    WeightTrendResponse:
      type: object
      required:
        - ewmaSeries
        - latestTrendKg
        - weeklyRateKgPerWeek
        - weeklyRatePctPerWeek
        - last4wRateKgPerWeek
        - dataSufficiency
      properties:
        ewmaSeries:
          type: array
          items:
            $ref: '#/components/schemas/WeightTrendPoint'
        latestTrendKg:
          type: number
          description: Latest EWMA trend value (kg)
        weeklyRateKgPerWeek:
          type: number
          description: Current weekly rate of change (kg/week) from the EWMA trend
        weeklyRatePctPerWeek:
          type: number
          description: Current weekly rate as percent of body weight per week
        last4wRateKgPerWeek:
          type: number
          description: Weekly rate (kg/week) averaged over the last 4 weeks
        dataSufficiency:
          type: string
          enum:
            - none
            - provisional
            - full
          description: How much logged weight data backs the trend
    LogSleepRequest:
      type: object
      required:
        - date
      properties:
        date:
          type: string
          format: date
        bedtime:
          type: string
          description: 'Bedtime as HH:mm'
          example: '23:10'
        wakeup:
          type: string
          description: 'Wake-up time as HH:mm'
          example: '06:45'
        durationH:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 99.99
          description: Sleep duration in hours (max 2 integer + 2 fraction digits)
        quality:
          type: integer
          minimum: 1
          maximum: 10
        awakenings:
          type: integer
          minimum: 0
        note:
          type: string
    SleepLogResponse:
      type: object
      required:
        - id
        - date
        - mealToSleep
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        bedtime:
          type: string
        wakeup:
          type: string
        duration:
          type: number
          description: Sleep duration in hours (frontend field name)
        quality:
          type: integer
        awakenings:
          type: integer
        mealToSleep:
          type: integer
          description: Hours between last meal and sleep — always 0 until Fuel lands
        notes:
          type: string
    SaveCheckInRequest:
      type: object
      required:
        - date
        - slotTime
        - state
      properties:
        date:
          type: string
          format: date
        slotTime:
          type: string
          minLength: 1
          description: 'Slot identifier as shown in the UI (e.g. "08:00")'
        state:
          type: string
          pattern: ^(done|now|skipped|pending)$
        energy:
          type: integer
          minimum: 1
          maximum: 10
        stress:
          type: integer
          minimum: 1
          maximum: 10
        body:
          type: integer
          minimum: 1
          maximum: 10
        mental:
          type: integer
          minimum: 1
          maximum: 10
        note:
          type: string
    CheckInResponse:
      type: object
      required:
        - id
        - date
        - slotTime
        - state
        - savedAt
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        slotTime:
          type: string
        state:
          type: string
        energy:
          type: integer
        stress:
          type: integer
        body:
          type: integer
        mental:
          type: integer
        note:
          type: string
        savedAt:
          type: string
          format: date-time
    MesocycleResponse:
      type: object
      required:
        - id
        - title
        - shortTitle
        - status
        - startDate
        - endDate
        - weeks
        - currentWeek
        - split
        - style
        - phaseCurve
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        shortTitle:
          type: string
        status:
          type: string
          enum:
            - active
            - planned
            - archived
        goal:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        weeks:
          type: integer
        currentWeek:
          type: integer
        split:
          type: string
        style:
          type: string
        phaseCurve:
          type: array
          items:
            type: string
            enum:
              - MEV
              - MAV
              - MRV
              - Deload
        notes:
          type: string
        summary:
          type: string
        volumeRecompute:
          $ref: '#/components/schemas/VolumeRecompute'
        volumePerMuscle:
          type: object
          description: 'Per-muscle volume profile keyed by muscle id (chest, back, ...)'
          additionalProperties:
            $ref: '#/components/schemas/VolumeProfile'
        days:
          type: array
          items:
            $ref: '#/components/schemas/MesoDay'
    VolumeRecompute:
      type: object
      required:
        - lastRun
        - nextRun
        - trigger
        - changes
      properties:
        lastRun:
          type: string
        nextRun:
          type: string
        trigger:
          type: string
        changes:
          type: array
          items:
            $ref: '#/components/schemas/VolumeChange'
    VolumeChange:
      type: object
      required:
        - muscle
        - change
        - reason
      properties:
        muscle:
          type: string
        change:
          type: string
        reason:
          type: string
        warning:
          type: boolean
    VolumeProfile:
      type: object
      required:
        - mev
        - mav
        - mrv
        - current
        - source
      properties:
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
        current:
          type: integer
        source:
          $ref: '#/components/schemas/VolumeSource'
    VolumeSource:
      type: object
      description: Provenance envelope — baseline -> adjustments -> confidence -> override
      required:
        - baseline
        - adjustments
        - confidence
      properties:
        baseline:
          $ref: '#/components/schemas/VolumeBaseline'
        adjustments:
          type: array
          items:
            $ref: '#/components/schemas/VolumeAdjustment'
        confidence:
          type: number
        note:
          type: string
        userOverride:
          $ref: '#/components/schemas/VolumeUserOverride'
    VolumeBaseline:
      type: object
      required:
        - name
        - mev
        - mav
        - mrv
      properties:
        name:
          type: string
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
    VolumeAdjustment:
      type: object
      required:
        - kind
        - label
        - delta
      properties:
        kind:
          type: string
          pattern: ^(pattern|recovery|niggle|sport-cross)$
        label:
          type: string
        delta:
          type: object
          description: Partial mev/mav/mrv deltas
          additionalProperties:
            type: integer
        warning:
          type: boolean
    VolumeUserOverride:
      type: object
      required:
        - mev
        - mav
        - mrv
        - at
      properties:
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
        at:
          type: string
          format: date-time
    MesoDay:
      type: object
      required:
        - day
        - type
        - muscle
        - exerciseCount
        - exercises
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The underlying template-day (workout_session) row — addresses
            day-level writes
        day:
          type: string
          description: '''Hét''..''Vas'''
        type:
          type: string
        muscle:
          type: string
        exerciseCount:
          type: integer
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/GymExercise'
        note:
          type: string
        current:
          type: boolean
        muscleAccent:
          type: boolean
    GymExercise:
      type: object
      required:
        - id
        - name
        - muscle
        - sets
        - targetReps
        - targetRIR
        - type
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        muscle:
          type: string
        sets:
          type: integer
        targetReps:
          type: string
        targetRIR:
          type: integer
        type:
          type: string
          enum:
            - compound
            - isolation
            - plyo
        warning:
          type: string
        catalogId:
          type: string
          format: uuid
          description: >-
            Optional reference to the exercise_catalog row this exercise was
            picked from
    MesocycleCreateRequest:
      type: object
      required:
        - title
        - status
        - startDate
        - weeks
        - split
        - style
        - phaseCurve
      properties:
        title:
          type: string
          minLength: 1
        shortTitle:
          type: string
        status:
          type: string
          enum:
            - active
            - planned
        goal:
          type: string
        startDate:
          type: string
          format: date
        weeks:
          type: integer
          minimum: 1
          maximum: 16
        split:
          type: string
          minLength: 1
        style:
          type: string
          minLength: 1
        phaseCurve:
          type: array
          minItems: 1
          items:
            type: string
            enum:
              - MEV
              - MAV
              - MRV
              - Deload
        notes:
          type: string
        days:
          type: array
          items:
            $ref: '#/components/schemas/MesoDayInput'
    MesoDayInput:
      type: object
      required:
        - day
        - type
      properties:
        day:
          type: string
          minLength: 1
          description: '''Hét''..''Vas'''
        type:
          type: string
          minLength: 1
        muscle:
          type: string
        muscleAccent:
          type: boolean
        note:
          type: string
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/GymExerciseInput'
    GymExerciseInput:
      type: object
      required:
        - name
        - sets
        - targetReps
        - targetRIR
        - type
      properties:
        name:
          type: string
          minLength: 1
        muscle:
          type: string
        sets:
          type: integer
          minimum: 1
          maximum: 20
        targetReps:
          type: string
          minLength: 1
        targetRIR:
          type: integer
          minimum: 0
          maximum: 5
        type:
          type: string
          enum:
            - compound
            - isolation
            - plyo
        warning:
          type: string
        catalogId:
          type: string
          format: uuid
    ExerciseCatalogItem:
      type: object
      required:
        - id
        - slug
        - name
        - muscle
        - type
        - stim
        - fatigue
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        muscle:
          type: string
        type:
          type: string
          enum:
            - compound
            - isolation
            - plyo
        stim:
          type: number
          minimum: 0
          maximum: 1
        fatigue:
          type: number
          minimum: 0
          maximum: 1
    RecordSetRef:
      type: object
      description: One logged set as a record reference; weightKg absent on bodyweight sets
      required:
        - reps
        - date
      properties:
        weightKg:
          type: number
        reps:
          type: integer
        date:
          type: string
          format: date
    E1rmRecord:
      type: object
      required:
        - value
        - set
      properties:
        value:
          type: number
          description: 'Epley estimate weight×(1+reps/30), 1 decimal'
        set:
          $ref: '#/components/schemas/RecordSetRef'
    SessionVolumeRecord:
      type: object
      required:
        - volumeKg
        - date
      properties:
        volumeKg:
          type: number
        date:
          type: string
          format: date
    ExerciseRecordResponse:
      type: object
      required:
        - name
        - muscle
        - type
        - totalVolume
        - totalSets
        - totalReps
        - sessionCount
        - repRecords
        - recentTopSets
      properties:
        catalogId:
          type: string
          format: uuid
          description: >-
            Identity when the exercise is catalog-linked; absent for
            name-grouped legacy rows
        name:
          type: string
        muscle:
          type: string
        type:
          type: string
          enum:
            - compound
            - isolation
            - plyo
        bestSet:
          $ref: '#/components/schemas/RecordSetRef'
        bestE1rm:
          $ref: '#/components/schemas/E1rmRecord'
        bestSessionVolume:
          $ref: '#/components/schemas/SessionVolumeRecord'
        totalVolume:
          type: number
          description: 'Σ weight×reps all-time, whole kg (0 for bodyweight-only exercises)'
        totalSets:
          type: integer
        totalReps:
          type: integer
        sessionCount:
          type: integer
        repRecords:
          type: array
          description: 'Max reps at the top 3 distinct weights, weight descending'
          items:
            $ref: '#/components/schemas/RecordSetRef'
        recentTopSets:
          type: array
          description: >-
            Top set of the last 5 sessions, oldest first (sparkline order), max
            5
          items:
            $ref: '#/components/schemas/RecordSetRef'
    WorkoutTodayResponse:
      type: object
      description: >-
        templateSessionId/exercises/openWorkout are absent when there is no
        active meso or today is a rest day; weekDoneDates is always present
        (possibly empty).
      properties:
        templateSessionId:
          type: string
          format: uuid
        dayLabel:
          type: string
          description: '''Hét''..''Vas'''
        title:
          type: string
          description: 'The day type, e.g. ''Pull Day'''
        durationEst:
          type: integer
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/TodayExercise'
        openWorkout:
          $ref: '#/components/schemas/WorkoutInstanceResponse'
        weekDoneDates:
          type: array
          description: >-
            ISO dates within the current Mon–Sun week that have a gym workout
            instance with >=1 logged set. Drives the Mai gym done-state (today)
            and the weekly-row done chips (past days). Present even on rest days
            and when today is not a gym day.
          items:
            type: string
            format: date
    TodayExercise:
      type: object
      required:
        - id
        - name
        - muscle
        - sets
        - targetReps
        - targetRIR
        - type
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        muscle:
          type: string
        sets:
          type: integer
        targetReps:
          type: string
        targetRIR:
          type: integer
        type:
          type: string
          enum:
            - compound
            - isolation
            - plyo
        warning:
          type: string
        note:
          type: string
          maxLength: 500
          nullable: true
          description: durable per-exercise note
        lastWeek:
          $ref: '#/components/schemas/LastWeekRef'
    LastWeekRef:
      type: object
      description: Top set of the previous completed instance of the same template day
      required:
        - weightKg
        - reps
        - rir
      properties:
        weightKg:
          type: number
        reps:
          type: integer
        rir:
          type: integer
    WorkoutInstanceResponse:
      type: object
      required:
        - id
        - templateSessionId
        - date
        - status
        - sets
