openapi: 3.0.3
info:
  title: mezo API
  description: >
    Contract-first API definition for the mezo backend — the single source of
    truth for generated backend DTOs / controller interfaces and frontend types.
    See docs/references/api_contract_conventions.md.
  version: 0.3.0
servers:
  - url: 'http://localhost:8090'
    description: Local dev backend (MEZO_PORT)
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Single-user thin auth (owner login)
  - name: Weight
    description: Weight log (biometrics)
  - name: Sleep
    description: Sleep log (biometrics)
  - name: CheckIn
    description: Daily check-in slots (biometrics)
  - name: Train
    description: Training domain — mesocycles (with volume provenance) and sport sessions
  - name: Goal
    description: Goal domain — goal-rooted timeline (trajectory + quality guards + window)
  - name: BiometricProfile
    description: Body-composition profile — the TDEE bootstrap inputs (one per owner)
  - name: Pantry
    description: >-
      Pantry (Kamra) — food + supplement inventory (single pantry_item table,
      kind-projected)
  - name: Recipe
    description: >-
      Recipes (Receptek) — owned recipe + recipe_ingredient aggregate; lines
      reference pantry_item by id with a per-basis macro snapshot
  - name: Meal
    description: >-
      Meal logging (Étkezés-logolás) — owned meal + meal_item aggregate;
      polymorphic items reference a recipe or a pantry_item by id with a
      per-basis macro snapshot. GET /api/fuel/day/{date} aggregates the day for
      the Fuel screen.
  - name: Medication
    description: >-
      Medication (Gyógyszer) — owned medication definition + a dose event-log;
      the 7-day cycle (retaDay + phase) is derived from the logged doses. GET
      /api/medication feeds the whole Fuel "Gyógyszer" tab in one round-trip.
  - name: Progression
  - name: Fuel
    description: >
      Fuel-owned protocol + supplement-intake endpoints. The protocol persists
      ONLY the selected pantry-item ids + version metadata (ADR/spec 2026-07-02)
      — timing slots are recomputed by the FE buildProtocol. supplement_intake
      is an append-only taken-ledger FK-ing pantry_item (ADR 0005).
paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      operationId: login
      summary: 'Login with the owner credentials, returns a JWT'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Invalid credentials (AUTH_LOGIN_INVALID_CREDENTIALS)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/biometrics/weight:
    get:
      tags:
        - Weight
      operationId: listWeightLogs
      summary: 'All weight logs of the current user, date ascending'
      responses:
        '200':
          description: 'Weight logs, ordered by date ascending'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WeightLogResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags:
        - Weight
      operationId: logWeight
      summary: Log a weight entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogWeightRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeightLogResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/biometrics/weight/trend:
    get:
      tags:
        - Weight
      operationId: getWeightTrend
      summary: EWMA weight trend (ground-truth scale spine for the goal engine)
      responses:
        '200':
          description: Weight trend
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeightTrendResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/biometrics/sleep:
    get:
      tags:
        - Sleep
      operationId: listSleepLogs
      summary: 'All sleep logs of the current user, date ascending'
      responses:
        '200':
          description: 'Sleep logs, ordered by date ascending'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SleepLogResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags:
        - Sleep
      operationId: logSleep
      summary: Log a sleep entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogSleepRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SleepLogResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/biometrics/checkin:
    get:
      tags:
        - CheckIn
      operationId: listCheckInsForDay
      summary: Check-ins of the current user for one day
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Check-ins for the given day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CheckInResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags:
        - CheckIn
      operationId: saveCheckIn
      summary: Upsert a check-in slot (find-or-new on date + slotTime)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveCheckInRequest'
      responses:
        '200':
          description: 'Saved (upsert — 200, not 201)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckInResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/mesocycles:
    get:
      tags:
        - Train
      operationId: listMesocycles
      summary: >-
        All mesocycles of the current user with volume provenance and template
        days, start date ascending
      responses:
        '200':
          description: Mesocycles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MesocycleResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags:
        - Train
      operationId: createMesocycle
      summary: Create a mesocycle (wizard) with nested template days and exercises
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MesocycleCreateRequest'
      responses:
        '201':
          description: Created mesocycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MesocycleResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/train/mesocycles/{id}/activate':
    post:
      tags:
        - Train
      operationId: activateMesocycle
      summary: Activate a mesocycle — archives any other active one (idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Activated mesocycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MesocycleResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Mesocycle not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/train/mesocycles/{id}/close':
    post:
      tags:
        - Train
      operationId: closeMesocycle
      summary: Close (archive) a mesocycle (idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Archived mesocycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MesocycleResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Mesocycle not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/train/mesocycles/{id}/days/{dayId}/exercises':
    put:
      tags:
        - Train
      operationId: replaceDayExercises
      summary: >-
        Replace the exercise list of one template day (full-list, order = array
        order)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: dayId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/GymExerciseInput'
      responses:
        '200':
          description: Updated template day
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MesoDay'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Mesocycle/day not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/exercises:
    get:
      tags:
        - Train
      operationId: getExerciseCatalog
      summary: 'Curated exercise catalog (master data), muscle then name ascending'
      responses:
        '200':
          description: Catalog items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExerciseCatalogItem'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/exercise-records:
    get:
      tags:
        - Train
      operationId: getExerciseRecords
      summary: >-
        Per-exercise all-time records aggregated from logged sets, sessionCount
        desc then name
      responses:
        '200':
          description: Exercise records (empty array when nothing is logged yet)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExerciseRecordResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/sport-sessions:
    get:
      tags:
        - Train
      operationId: listSportSessions
      summary: 'Sport (volleyball) sessions of the current user, date descending'
      responses:
        '200':
          description: Sport sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SportSessionResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags:
        - Train
      operationId: logSportSession
      summary: >-
        Log a sport session (SportLogSheet) — date/time default to now
        server-side
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SportSessionCreateRequest'
      responses:
        '201':
          description: Created sport session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SportSessionResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/sport-schedule:
    get:
      tags:
        - Train
      operationId: getSportSchedule
      summary: >-
        The recurring weekly sport schedule slots, day-of-week then time
        ascending
      responses:
        '200':
          description: Weekly schedule slots (empty array when none set)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SportScheduleSlotResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    put:
      tags:
        - Train
      operationId: replaceSportSchedule
      summary: >-
        Full-replace of the weekly schedule (idempotent; soft-deletes the
        previous slots)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SportScheduleSlotInput'
      responses:
        '200':
          description: The saved weekly slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SportScheduleSlotResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/gym-schedule:
    get:
      tags:
        - Train
      operationId: getGymSchedule
      summary: 'The recurring weekly gym time slots, day-of-week then time ascending'
      responses:
        '200':
          description: Weekly gym time slots (empty array when none set)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GymScheduleSlotResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    put:
      tags:
        - Train
      operationId: putGymSchedule
      summary: >-
        Full-replace of the weekly gym times (idempotent; soft-deletes the
        previous slots)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/GymScheduleSlotInput'
      responses:
        '200':
          description: The saved weekly gym time slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GymScheduleSlotResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts/today:
    get:
      tags:
        - Train
      operationId: getTodayWorkout
      summary: >-
        Today's workout — active meso's template day, exercises with last-week
        refs, open instance
      responses:
        '200':
          description: >-
            Today's workout context (empty object when no active meso or rest
            day)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutTodayResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts:
    post:
      tags:
        - Train
      operationId: startWorkout
      summary: >-
        Start (or resume) a workout instance for a template day — an open
        instance is returned, never duplicated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutStartRequest'
      responses:
        '201':
          description: 'The active instance (created, or the resumed open one)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutInstanceResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Template day not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/train/workouts/{id}/sets':
    post:
      tags:
        - Train
      operationId: logWorkoutSet
      summary: Log one set into an active workout instance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetLogRequest'
      responses:
        '201':
          description: Logged set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseSetResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Workout/exercise not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '409':
          description: Workout already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/train/workouts/{id}/feedback':
    post:
      tags:
        - Train
      operationId: saveWorkoutFeedback
      summary: Persist RP debrief rows for the instance (upsert per exercise)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/WorkoutFeedbackInput'
      responses:
        '204':
          description: Feedback stored
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Workout/exercise not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/train/workouts/{id}/skip':
    post:
      tags:
        - Train
      operationId: skipWorkoutExercise
      summary: Skip a whole exercise in an active workout instance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutSkipRequest'
      responses:
        '204':
          description: Skip recorded
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Workout/exercise not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '409':
          description: Workout already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/train/exercises/{exerciseId}/note':
    put:
      tags:
        - Train
      operationId: saveExerciseNote
      summary: Set the durable note on an exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExerciseNoteRequest'
      responses:
        '204':
          description: Note saved
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Exercise not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/train/workouts/{id}/finish':
    post:
      tags:
        - Train
      operationId: finishWorkout
      summary: Complete a workout instance (idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The completed instance with its logged sets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutInstanceResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Workout not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/running-blocks:
    get:
      tags:
        - Train
      operationId: listRunningBlocks
      summary: >-
        All running blocks of the current user (any status), start date
        ascending
      responses:
        '200':
          description: Running blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunningBlockResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags:
        - Train
      operationId: createRunningBlock
      summary: Create a running block (Builder save)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunningBlockUpsertRequest'
      responses:
        '201':
          description: Created running block
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunningBlockResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  '/api/train/running-blocks/{id}':
    put:
      tags:
        - Train
      operationId: updateRunningBlock
      summary: Full-replace a running block incl. structure
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunningBlockUpsertRequest'
      responses:
        '200':
          description: Updated running block
          content:
            application/json:
