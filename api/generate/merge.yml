# openapi-merge-cli config — first input is the base (its info/servers/security win).
# Every new feature fragment MUST be appended here.
inputs:
  - inputFile: ../base.yml
  - inputFile: ../common/common-schemas.yml
  - inputFile: ../feature/auth/auth.yml
  - inputFile: ../feature/weight/weight.yml
  - inputFile: ../feature/sleep/sleep.yml
  - inputFile: ../feature/checkin/checkin.yml
  - inputFile: ../feature/train/train.yml
  - inputFile: ../feature/goal/goal.yml
  - inputFile: ../feature/biometrics-profile/biometrics-profile.yml
  - inputFile: ../feature/pantry/pantry.yml
  - inputFile: ../feature/recipe/recipe.yml
  - inputFile: ../feature/meal/meal.yml
  - inputFile: ../feature/medication/medication.yml
output: ../openapi.yml
