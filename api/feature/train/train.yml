openapi: 3.0.3
info:
  title: ''
  version: ''
tags:
  - name: Train
    description: Training domain — mesocycles (with volume provenance) and sport sessions
paths:
  /api/train/mesocycles:
    get:
      tags: [Train]
      operationId: listMesocycles
      summary: All mesocycles of the current user with volume provenance and template days, start date ascending
      responses:
        '200':
          description: Mesocycles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MesocycleResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags: [Train]
      operationId: createMesocycle
      summary: Create a mesocycle (wizard) with nested template days and exercises
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MesocycleCreateRequest'
      responses:
        '201':
          description: Created mesocycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MesocycleResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/mesocycles/{id}/activate:
    post:
      tags: [Train]
      operationId: activateMesocycle
      summary: Activate a mesocycle — archives any other active one (idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Activated mesocycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MesocycleResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Mesocycle not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/mesocycles/{id}/close:
    post:
      tags: [Train]
      operationId: closeMesocycle
      summary: Close (archive) a mesocycle (idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Archived mesocycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MesocycleResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Mesocycle not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/mesocycles/{id}/days/{dayId}/exercises:
    put:
      tags: [Train]
      operationId: replaceDayExercises
      summary: Replace the exercise list of one template day (full-list, order = array order)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: dayId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/GymExerciseInput'
      responses:
        '200':
          description: Updated template day
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MesoDay'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Mesocycle/day not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/custom-workouts:
    get:
      tags: [Train]
      operationId: listCustomWorkouts
      summary: The owner's saved custom (saját) workout templates, oldest first
      responses:
        '200':
          description: Custom workout templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomWorkoutResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags: [Train]
      operationId: createCustomWorkout
      summary: Create a custom workout template (name + full recipe exercise list)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomWorkoutUpsertRequest'
      responses:
        '201':
          description: The created template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomWorkoutResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/custom-workouts/{id}:
    put:
      tags: [Train]
      operationId: updateCustomWorkout
      summary: Rename + full exercise-list replace of a custom workout template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomWorkoutUpsertRequest'
      responses:
        '200':
          description: The updated template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomWorkoutResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Foreign/missing/non-custom row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    delete:
      tags: [Train]
      operationId: deleteCustomWorkout
      summary: Soft-delete a custom workout template (instance history survives)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Foreign/missing/non-custom row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/exercises:
    get:
      tags: [Train]
      operationId: getExerciseCatalog
      summary: Curated exercise catalog (master data), muscle then name ascending
      responses:
        '200':
          description: Catalog items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExerciseCatalogItem'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags: [Train]
      operationId: createExercise
      summary: Create a user-authored catalog exercise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogExerciseCreateRequest'
      responses:
        '201':
          description: Created exercise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseCatalogItem'
        '400':
          description: Validation error
          content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } }
        '401':
          description: Missing/invalid token
          content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } }
  /api/train/exercises/{id}:
    put:
      tags: [Train]
      operationId: updateExercise
      summary: Update a user-authored exercise (master rows → 409)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogExerciseCreateRequest'
      responses:
        '200':
          description: Updated exercise
          content: { application/json: { schema: { $ref: '#/components/schemas/ExerciseCatalogItem' } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '409': { description: Master row is read-only, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
    delete:
      tags: [Train]
      operationId: deleteExercise
      summary: Soft-delete a user-authored exercise (master rows → 409)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Deleted }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '409': { description: Master row is read-only, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/train/exercises/{id}/video:
    put:
      tags: [Train]
      operationId: setExerciseVideo
      summary: Set/clear the demo video on any catalog exercise (master or user)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogVideoRequest'
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/ExerciseCatalogItem' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/train/exercise-records:
    get:
      tags: [Train]
      operationId: getExerciseRecords
      summary: Per-exercise all-time records aggregated from logged sets, sessionCount desc then name
      responses:
        '200':
          description: Exercise records (empty array when nothing is logged yet)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExerciseRecordResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/sport-sessions:
    get:
      tags: [Train]
      operationId: listSportSessions
      summary: Sport (volleyball) sessions of the current user, date descending
      responses:
        '200':
          description: Sport sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SportSessionResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags: [Train]
      operationId: logSportSession
      summary: Log a sport session (SportLogSheet) — date/time default to now server-side
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SportSessionCreateRequest'
      responses:
        '201':
          description: Created sport session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SportSessionResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/sport-schedule:
    get:
      tags: [Train]
      operationId: getSportSchedule
      summary: The recurring weekly sport schedule slots, day-of-week then time ascending
      responses:
        '200':
          description: Weekly schedule slots (empty array when none set)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SportScheduleSlotResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    put:
      tags: [Train]
      operationId: replaceSportSchedule
      summary: Full-replace of the weekly schedule (idempotent; soft-deletes the previous slots)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SportScheduleSlotInput'
      responses:
        '200':
          description: The saved weekly slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SportScheduleSlotResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/gym-schedule:
    get:
      tags: [Train]
      operationId: getGymSchedule
      summary: The recurring weekly gym time slots, day-of-week then time ascending
      responses:
        '200':
          description: Weekly gym time slots (empty array when none set)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GymScheduleSlotResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    put:
      tags: [Train]
      operationId: putGymSchedule
      summary: Full-replace of the weekly gym times (idempotent; soft-deletes the previous slots)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/GymScheduleSlotInput'
      responses:
        '200':
          description: The saved weekly gym time slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GymScheduleSlotResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts/today:
    get:
      tags: [Train]
      operationId: getTodayWorkout
      summary: Workout context for a template day — day resolution is open instance > templateSessionId param > today's weekday label
      description: >-
        Cross-day start (mezo-p7rp): the resolved day is (1) the template day of the user's open
        (active) instance when one exists — the open workout always wins, even over the param —
        else (2) the template day named by the optional templateSessionId query param (owned
        template row, else 404), else (3) the active meso's template day matching today's HU
        weekday label. completedWorkout is the resolved day's most recent COMPLETED instance of
        the current Mon–Sun week (any date) — a day already done this week reviews instead of
        restarting.
      parameters:
        - name: templateSessionId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workout context for the resolved day (empty object when no active meso or rest day)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutTodayResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts:
    get:
      tags: [Train]
      operationId: listWorkouts
      summary: Completed workout instances in the inclusive date range — same "done = explicitly finished" semantics as weekDoneDates
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Date-ascending workout summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutSummaryResponse'
        '400':
          description: Invalid range (from > to)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags: [Train]
      operationId: startWorkout
      summary: Start (or resume) a workout instance for a template day — an open instance is returned, never duplicated; any-day start within the current week
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutStartRequest'
      responses:
        '201':
          description: The active instance (created, or the resumed open one)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutInstanceResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Template day not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '409':
          description: Another workout is open (TRAIN_WORKOUT_OPEN_ELSEWHERE) or this template day was already completed this week (TRAIN_DAY_DONE_THIS_WEEK)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts/{id}:
    get:
      tags: [Train]
      operationId: getWorkoutDetail
      summary: One workout instance with its logged sets joined onto the template day's exercises — the done-day review source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The workout detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutDetailResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Not found, not owned, or a template row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts/{id}/sets:
    post:
      tags: [Train]
      operationId: logWorkoutSet
      summary: Log one set into an active workout instance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetLogRequest'
      responses:
        '201':
          description: Logged set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseSetResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Workout/exercise not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '409':
          description: Workout already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts/{id}/feedback:
    post:
      tags: [Train]
      operationId: saveWorkoutFeedback
      summary: Persist RP debrief rows for the instance (upsert per exercise)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/WorkoutFeedbackInput'
      responses:
        '204':
          description: Feedback stored
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Workout/exercise not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts/{id}/skip:
    post:
      tags: [Train]
      operationId: skipWorkoutExercise
      summary: Skip a whole exercise in an active workout instance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutSkipRequest'
      responses:
        '204':
          description: Skip recorded
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Workout/exercise not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '409':
          description: Workout already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/exercises/{exerciseId}/note:
    put:
      tags: [Train]
      operationId: saveExerciseNote
      summary: Set the durable note on an exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExerciseNoteRequest'
      responses:
        '204':
          description: Note saved
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Exercise not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts/{id}/finish:
    post:
      tags: [Train]
      operationId: finishWorkout
      summary: Complete a workout instance (idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The completed instance with its logged sets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutInstanceResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Workout not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/running-blocks:
    get:
      tags: [Train]
      operationId: listRunningBlocks
      summary: All running blocks of the current user (any status), start date ascending
      responses:
        '200':
          description: Running blocks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RunningBlockResponse' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
    post:
      tags: [Train]
      operationId: createRunningBlock
      summary: Create a running block (Builder save)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunningBlockUpsertRequest' }
      responses:
        '201':
          description: Created running block
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunningBlockResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/train/running-blocks/{id}:
    put:
      tags: [Train]
      operationId: updateRunningBlock
      summary: Full-replace a running block incl. structure
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunningBlockUpsertRequest' }
      responses:
        '200':
          description: Updated running block
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunningBlockResponse' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
    delete:
      tags: [Train]
      operationId: deleteRunningBlock
      summary: Soft-delete a running block
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Deleted }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/train/running-blocks/{id}/activate:
    post:
      tags: [Train]
      operationId: activateRunningBlock
      summary: Activate a running block — archives any other active one (idempotent)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Activated running block
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunningBlockResponse' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/train/running-blocks/{id}/close:
    post:
      tags: [Train]
      operationId: closeRunningBlock
      summary: Close (archive) a running block
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Archived running block
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunningBlockResponse' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/train/run-sessions:
    get:
      tags: [Train]
      operationId: listRunSessions
      summary: Logged run-session actuals of the current user, newest first
      responses:
        '200':
          description: Run sessions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RunSessionLogResponse' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
    post:
      tags: [Train]
      operationId: logRunSession
      summary: Log run-session actuals against a prescribed session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunSessionLogRequest' }
      responses:
        '201':
          description: Logged run session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunSessionLogResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
components:
  schemas:
    MesocycleResponse:
      type: object
      required:
        - id
        - title
        - shortTitle
        - status
        - startDate
        - endDate
        - weeks
        - currentWeek
        - split
        - style
        - phaseCurve
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        shortTitle:
          type: string
        status:
          type: string
          enum: [active, planned, archived]
        goal:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        weeks:
          type: integer
        currentWeek:
          type: integer
        split:
          type: string
        style:
          type: string
        phaseCurve:
          type: array
          items:
            type: string
            enum: [MEV, MAV, MRV, Deload]
        notes:
          type: string
        summary:
          type: string
        volumeRecompute:
          $ref: '#/components/schemas/VolumeRecompute'
        volumePerMuscle:
          type: object
          description: Per-muscle volume profile keyed by muscle id (chest, back, ...)
          additionalProperties:
            $ref: '#/components/schemas/VolumeProfile'
        days:
          type: array
          items:
            $ref: '#/components/schemas/MesoDay'
    VolumeRecompute:
      type: object
      required:
        - lastRun
        - nextRun
        - trigger
        - changes
      properties:
        lastRun:
          type: string
        nextRun:
          type: string
        trigger:
          type: string
        changes:
          type: array
          items:
            $ref: '#/components/schemas/VolumeChange'
    VolumeChange:
      type: object
      required:
        - muscle
        - change
        - reason
      properties:
        muscle:
          type: string
        change:
          type: string
        reason:
          type: string
        warning:
          type: boolean
    VolumeProfile:
      type: object
      required:
        - mev
        - mav
        - mrv
        - current
        - source
      properties:
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
        current:
          type: integer
        source:
          $ref: '#/components/schemas/VolumeSource'
    VolumeSource:
      type: object
      description: Provenance envelope — baseline -> adjustments -> confidence -> override
      required:
        - baseline
        - adjustments
        - confidence
      properties:
        baseline:
          $ref: '#/components/schemas/VolumeBaseline'
        adjustments:
          type: array
          items:
            $ref: '#/components/schemas/VolumeAdjustment'
        confidence:
          type: number
        note:
          type: string
        userOverride:
          $ref: '#/components/schemas/VolumeUserOverride'
    VolumeBaseline:
      type: object
      required:
        - name
        - mev
        - mav
        - mrv
      properties:
        name:
          type: string
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
    VolumeAdjustment:
      type: object
      required:
        - kind
        - label
        - delta
      properties:
        kind:
          type: string
          pattern: '^(pattern|recovery|niggle|sport-cross)$'
        label:
          type: string
        delta:
          type: object
          description: Partial mev/mav/mrv deltas
          additionalProperties:
            type: integer
        warning:
          type: boolean
    VolumeUserOverride:
      type: object
      required:
        - mev
        - mav
        - mrv
        - at
      properties:
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
        at:
          type: string
          format: date-time
    MesoDay:
      type: object
      required:
        - day
        - type
        - muscle
        - exerciseCount
        - exercises
      properties:
        id:
          type: string
          format: uuid
          description: The underlying template-day (workout_session) row — addresses day-level writes
        day:
          type: string
          description: "'Hét'..'Vas'"
        type:
          type: string
        muscle:
          type: string
        exerciseCount:
          type: integer
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/GymExercise'
        note:
          type: string
        current:
          type: boolean
        muscleAccent:
          type: boolean
    GymExercise:
      type: object
      required:
        - id
        - name
        - muscle
        - warmupSets
        - workingSets
        - repMin
        - repMax
        - targetRIR
        - type
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        muscle:
          type: string
        warmupSets:
          type: integer
        workingSets:
          type: integer
        repMin:
          type: integer
        repMax:
          type: integer
        targetRIR:
          type: integer
        anchorWeightKg:
          type: number
          nullable: true
        type:
          type: string
          enum: [compound, isolation, plyo]
        warning:
          type: string
        catalogId:
          type: string
          format: uuid
        videoUrl:
          type: string
          nullable: true
          description: Effective YouTube demo URL resolved from the linked catalog row (null when none)
    MesocycleCreateRequest:
      type: object
      required:
        - title
        - status
        - startDate
        - weeks
        - split
        - style
        - phaseCurve
      properties:
        title:
          type: string
          minLength: 1
        shortTitle:
          type: string
        status:
          type: string
          enum: [active, planned]
        goal:
          type: string
        startDate:
          type: string
          format: date
        weeks:
          type: integer
          minimum: 1
          maximum: 16
        split:
          type: string
          minLength: 1
        style:
          type: string
          minLength: 1
        phaseCurve:
          type: array
          minItems: 1
          items:
            type: string
            enum: [MEV, MAV, MRV, Deload]
        notes:
          type: string
        days:
          type: array
          items:
            $ref: '#/components/schemas/MesoDayInput'
    MesoDayInput:
      type: object
      required:
        - day
        - type
      properties:
        day:
          type: string
          minLength: 1
          description: "'Hét'..'Vas'"
        type:
          type: string
          minLength: 1
        muscle:
          type: string
        muscleAccent:
          type: boolean
        note:
          type: string
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/GymExerciseInput'
    GymExerciseInput:
      type: object
      required:
        - name
        - warmupSets
        - workingSets
        - repMin
        - repMax
        - targetRIR
        - type
      properties:
        name:
          type: string
          minLength: 1
        muscle:
          type: string
        warmupSets:
          type: integer
          minimum: 0
          maximum: 10
        workingSets:
          type: integer
          minimum: 1
          maximum: 10
        repMin:
          type: integer
          minimum: 1
          maximum: 100
        repMax:
          type: integer
          minimum: 1
          maximum: 100
        targetRIR:
          type: integer
          minimum: 0
          maximum: 5
        anchorWeightKg:
          type: number
          minimum: 0
          maximum: 999
          nullable: true
        type:
          type: string
          enum: [compound, isolation, plyo]
        warning:
          type: string
        catalogId:
          type: string
          format: uuid
    CustomWorkoutResponse:
      type: object
      required:
        - id
        - name
        - exercises
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/GymExercise'
    CustomWorkoutUpsertRequest:
      type: object
      required:
        - name
        - exercises
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/GymExerciseInput'
    ExerciseCatalogItem:
      type: object
      required:
        - id
        - slug
        - name
        - muscle
        - type
        - stim
        - fatigue
        - editable
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        muscle:
          type: string
        type:
          type: string
          enum: [compound, isolation, plyo]
        stim:
          type: number
          minimum: 0
          maximum: 1
        fatigue:
          type: number
          minimum: 0
          maximum: 1
        videoUrl:
          type: string
          nullable: true
        editable:
          type: boolean
          description: true when created_by == the current user (user-authored row)
    CatalogExerciseCreateRequest:
      type: object
      required:
        - name
        - muscle
        - type
        - stim
        - fatigue
      properties:
        name:
          type: string
          minLength: 1
        muscle:
          type: string
          enum: [back-mid, lats, chest, shoulder, rear-delt, biceps, triceps, quad, ham, glute, calf, core, traps]
        type:
          type: string
          enum: [compound, isolation, plyo]
        stim:
          type: number
          minimum: 0
          maximum: 1
        fatigue:
          type: number
          minimum: 0
          maximum: 1
        videoUrl:
          type: string
          nullable: true
          pattern: '^https?://(www\.|m\.)?(youtube(-nocookie)?\.com/(watch\?v=|shorts/|embed/|live/)|youtu\.be/)[A-Za-z0-9_-]{11}([&?/#].*)?$'
    CatalogVideoRequest:
      type: object
      properties:
        videoUrl:
          type: string
          nullable: true
          description: A YouTube watch/short URL, or null to clear the demo
          pattern: '^https?://(www\.|m\.)?(youtube(-nocookie)?\.com/(watch\?v=|shorts/|embed/|live/)|youtu\.be/)[A-Za-z0-9_-]{11}([&?/#].*)?$'
    RecordSetRef:
      type: object
      description: One logged set as a record reference; weightKg absent on bodyweight sets
      required:
        - reps
        - date
      properties:
        weightKg:
          type: number
        reps:
          type: integer
        date:
          type: string
          format: date
    E1rmRecord:
      type: object
      required:
        - value
        - set
      properties:
        value:
          type: number
          description: Epley estimate weight×(1+reps/30), 1 decimal
        set:
          $ref: '#/components/schemas/RecordSetRef'
    SessionVolumeRecord:
      type: object
      required:
        - volumeKg
        - date
      properties:
        volumeKg:
          type: number
        date:
          type: string
          format: date
    ExerciseRecordResponse:
      type: object
      required:
        - name
        - muscle
        - type
        - totalVolume
        - totalSets
        - totalReps
        - sessionCount
        - repRecords
        - recentTopSets
      properties:
        catalogId:
          type: string
          format: uuid
          description: Identity when the exercise is catalog-linked; absent for name-grouped legacy rows
        name:
          type: string
        muscle:
          type: string
        type:
          type: string
          enum: [compound, isolation, plyo]
        bestSet:
          $ref: '#/components/schemas/RecordSetRef'
        bestE1rm:
          $ref: '#/components/schemas/E1rmRecord'
        bestSessionVolume:
          $ref: '#/components/schemas/SessionVolumeRecord'
        totalVolume:
          type: number
          description: Σ weight×reps all-time, whole kg (0 for bodyweight-only exercises)
        totalSets:
          type: integer
        totalReps:
          type: integer
        sessionCount:
          type: integer
        repRecords:
          type: array
          description: Max reps at the top 3 distinct weights, weight descending
          items:
            $ref: '#/components/schemas/RecordSetRef'
        recentTopSets:
          type: array
          description: Top set of the last 5 sessions, oldest first (sparkline order), max 5
          items:
            $ref: '#/components/schemas/RecordSetRef'
    WorkoutTodayResponse:
      type: object
      description: >-
        templateSessionId/exercises/openWorkout are absent when there is no active
        meso or today is a rest day; weekDoneDates is always present (possibly empty).
      properties:
        templateSessionId:
          type: string
          format: uuid
        dayLabel:
          type: string
          description: "'Hét'..'Vas'"
        title:
          type: string
          description: The day type, e.g. 'Pull Day'
        durationEst:
          type: integer
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/TodayExercise'
        openWorkout:
          $ref: '#/components/schemas/WorkoutInstanceResponse'
        completedWorkout:
          allOf:
            - $ref: '#/components/schemas/WorkoutInstanceResponse'
          description: >-
            Today's most recent COMPLETED instance of today's template day (null when none) —
            drives the Mai hero "Kész + Megnézem" state and the session-route review redirect.
        weekDoneDates:
          type: array
          description: >-
            ISO dates within the current Mon–Sun week that have a COMPLETED gym
            workout instance (explicit finish). Drives the Mai gym done-state
            (today) and the weekly-row done chips (past days). Present even on
            rest days and when today is not a gym day.
          items:
            type: string
            format: date
    TodayExercise:
      type: object
      required:
        - id
        - name
        - muscle
        - warmupSets
        - workingSets
        - repMin
        - repMax
        - targetRIR
        - type
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        muscle:
          type: string
        warmupSets:
          type: integer
        workingSets:
          type: integer
        repMin:
          type: integer
        repMax:
          type: integer
        targetRIR:
          type: integer
        anchorWeightKg:
          type: number
          nullable: true
        type:
          type: string
          enum: [compound, isolation, plyo]
        warning:
          type: string
        videoUrl:
          type: string
          nullable: true
          description: Effective YouTube demo URL resolved from the linked catalog row (null when none)
        note:
          type: string
          maxLength: 500
          nullable: true
          description: durable per-exercise note
        lastWeek:
          $ref: '#/components/schemas/LastWeekRef'
        prescribedSets:
          type: array
          nullable: true
          description: >-
            Per-set targets computed by the Hypertrophy Drive engine; null when the
            mezo.feature.hypertrophy-drive switch is off.
          items:
            $ref: '#/components/schemas/PrescribedSet'
        rationale:
          type: string
          nullable: true
          description: Short HU explanation of the recommendation (e.g. "Múlt hét 8 × 77.5 kg → +2.5 kg")
    PrescribedSet:
      type: object
      required:
        - kind
        - targetReps
      properties:
        kind:
          type: string
          enum: [warmup, working]
        targetWeightKg:
          type: number
          nullable: true
        targetReps:
          type: integer
        targetRIR:
          type: integer
          nullable: true
    LastWeekRef:
      type: object
      description: Top set of the previous completed instance of the same template day
      required:
        - weightKg
        - reps
        - rir
      properties:
        weightKg:
          type: number
        reps:
          type: integer
        rir:
          type: integer
    WorkoutInstanceResponse:
      type: object
      required:
        - id
        - templateSessionId
        - date
        - status
        - sets
      properties:
        id:
          type: string
          format: uuid
        templateSessionId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        status:
          type: string
          enum: [active, completed]
        sets:
          type: array
          items:
            $ref: '#/components/schemas/ExerciseSetResponse'
        levelUp:
          $ref: '#/components/schemas/LevelUpResult'
    WorkoutSummaryResponse:
      type: object
      required: [id, date, status, origin, title]
      properties:
        id:
          type: string
          format: uuid
        templateSessionId:
          type: string
          format: uuid
          description: The instance's template day — maps "template day → completed instance this week" (cross-day start, mezo-p7rp)
        date:
          type: string
          format: date
        status:
          type: string
          enum: [planned, active, completed, skipped]
        origin:
          type: string
          enum: [meso, custom]
          description: Mesocycle-plan instance vs custom (saját) workout instance (mezo-ws2x)
        title:
          type: string
          description: The workout title — the template day's title / the custom workout's name
    WorkoutDetailResponse:
      type: object
      required: [id, templateSessionId, date, status, title, dayLabel, exercises]
      properties:
        id: { type: string, format: uuid }
        templateSessionId: { type: string, format: uuid }
        date: { type: string, format: date }
        status: { type: string, enum: [active, completed, skipped] }
        title: { type: string, description: "The day type, e.g. 'Pull Day'" }
        dayLabel: { type: string, description: "'Hét'..'Vas'" }
        durationEst: { type: integer }
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/WorkoutDetailExercise'
    WorkoutDetailExercise:
      type: object
      required: [exerciseId, name, muscle, type, warmupSets, workingSets, repMin, repMax, targetRIR, skipped, sets]
      properties:
        exerciseId: { type: string, format: uuid }
        name: { type: string }
        muscle: { type: string }
        type: { type: string, enum: [compound, isolation, plyo] }
        warmupSets: { type: integer }
        workingSets: { type: integer }
        repMin: { type: integer }
        repMax: { type: integer }
        targetRIR: { type: integer }
        skipped: { type: boolean, description: A skip-marker set exists for this exercise in this instance }
        sets:
          type: array
          description: Non-skipped logged sets, setIndex ascending
          items:
            $ref: '#/components/schemas/ExerciseSetResponse'
    LevelUpResult:
      type: object
      required: [source, totalXp, gains, levelUps, perks, robustness]
      properties:
        source: { type: string, enum: [GYM, SPORT, RUN, QUEST, ACTIVITY, HABIT] }
        workoutLabel: { type: string }
        durationMin: { type: integer }
        rpe: { type: integer }
        totalXp: { type: integer, format: int64 }
        gains:
          type: array
          items: { $ref: '#/components/schemas/LevelUpGain' }
        levelUps:
          type: array
          items: { type: string }
        perks:
          type: array
          items: { $ref: '#/components/schemas/LevelUpPerk' }
        robustness: { $ref: '#/components/schemas/LevelUpRobustness' }
    LevelUpGain:
      type: object
      required: [skillKey, kind, name, xpGained, levelBefore, levelAfter, progressFromPct, progressToPct]
      properties:
        skillKey: { type: string }
        kind: { type: string, enum: [ATHLETIC, MUSCLE, LIFE] }
        name: { type: string }
        icon: { type: string }
        xpGained: { type: integer, format: int64 }
        levelBefore: { type: integer }
        levelAfter: { type: integer }
        progressFromPct: { type: number }
        progressToPct: { type: number }
    LevelUpPerk:
      type: object
      required: [skillKey, perkKey, name, effectCopy, milestoneLevel]
      properties:
        skillKey: { type: string }
        perkKey: { type: string }
        name: { type: string }
        effectCopy: { type: string }
        milestoneLevel: { type: integer }
    LevelUpRobustness:
      type: object
      required: [xpGained, streakWeeks]
      properties:
        xpGained: { type: integer, format: int64 }
        streakWeeks: { type: integer }
    ExerciseSetResponse:
      type: object
      required:
        - id
        - exerciseId
        - setIndex
      properties:
        id:
          type: string
          format: uuid
        exerciseId:
          type: string
          format: uuid
        setIndex:
          type: integer
        weightKg:
          type: number
        reps:
          type: integer
        rir:
          type: integer
        side:
          type: string
          description: L|B|R
        note:
          type: string
        skipped:
          type: boolean
          default: false
          description: true for a whole-exercise skip marker row (no perf data)
        kind:
          type: string
          enum: [warmup, working]
    WorkoutStartRequest:
