openapi: 3.0.3
info:
  title: ''
  version: ''
tags:
  - name: Train
    description: Training domain — mesocycles (with volume provenance) and sport sessions
paths:
  /api/train/mesocycles:
    get:
      tags: [Train]
      operationId: listMesocycles
      summary: All mesocycles of the current user with volume provenance and template days, start date ascending
      responses:
        '200':
          description: Mesocycles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MesocycleResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags: [Train]
      operationId: createMesocycle
      summary: Create a mesocycle (wizard) with nested template days and exercises
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MesocycleCreateRequest'
      responses:
        '201':
          description: Created mesocycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MesocycleResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/mesocycles/{id}/activate:
    post:
      tags: [Train]
      operationId: activateMesocycle
      summary: Activate a mesocycle — archives any other active one (idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Activated mesocycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MesocycleResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Mesocycle not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/mesocycles/{id}/close:
    post:
      tags: [Train]
      operationId: closeMesocycle
      summary: Close (archive) a mesocycle (idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Archived mesocycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MesocycleResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Mesocycle not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/mesocycles/{id}/days/{dayId}/exercises:
    put:
      tags: [Train]
      operationId: replaceDayExercises
      summary: Replace the exercise list of one template day (full-list, order = array order)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: dayId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/GymExerciseInput'
      responses:
        '200':
          description: Updated template day
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MesoDay'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Mesocycle/day not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/exercises:
    get:
      tags: [Train]
      operationId: getExerciseCatalog
      summary: Curated exercise catalog (master data), muscle then name ascending
      responses:
        '200':
          description: Catalog items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExerciseCatalogItem'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/exercise-records:
    get:
      tags: [Train]
      operationId: getExerciseRecords
      summary: Per-exercise all-time records aggregated from logged sets, sessionCount desc then name
      responses:
        '200':
          description: Exercise records (empty array when nothing is logged yet)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExerciseRecordResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/sport-sessions:
    get:
      tags: [Train]
      operationId: listSportSessions
      summary: Sport (volleyball) sessions of the current user, date descending
      responses:
        '200':
          description: Sport sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SportSessionResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    post:
      tags: [Train]
      operationId: logSportSession
      summary: Log a sport session (SportLogSheet) — date/time default to now server-side
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SportSessionCreateRequest'
      responses:
        '201':
          description: Created sport session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SportSessionResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/sport-schedule:
    get:
      tags: [Train]
      operationId: getSportSchedule
      summary: The recurring weekly sport schedule slots, day-of-week then time ascending
      responses:
        '200':
          description: Weekly schedule slots (empty array when none set)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SportScheduleSlotResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    put:
      tags: [Train]
      operationId: replaceSportSchedule
      summary: Full-replace of the weekly schedule (idempotent; soft-deletes the previous slots)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SportScheduleSlotInput'
      responses:
        '200':
          description: The saved weekly slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SportScheduleSlotResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/gym-schedule:
    get:
      tags: [Train]
      operationId: getGymSchedule
      summary: The recurring weekly gym time slots, day-of-week then time ascending
      responses:
        '200':
          description: Weekly gym time slots (empty array when none set)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GymScheduleSlotResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
    put:
      tags: [Train]
      operationId: putGymSchedule
      summary: Full-replace of the weekly gym times (idempotent; soft-deletes the previous slots)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/GymScheduleSlotInput'
      responses:
        '200':
          description: The saved weekly gym time slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GymScheduleSlotResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts/today:
    get:
      tags: [Train]
      operationId: getTodayWorkout
      summary: Today's workout — active meso's template day, exercises with last-week refs, open instance
      responses:
        '200':
          description: Today's workout context (empty object when no active meso or rest day)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutTodayResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts:
    post:
      tags: [Train]
      operationId: startWorkout
      summary: Start (or resume) a workout instance for a template day — an open instance is returned, never duplicated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutStartRequest'
      responses:
        '201':
          description: The active instance (created, or the resumed open one)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutInstanceResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Template day not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts/{id}/sets:
    post:
      tags: [Train]
      operationId: logWorkoutSet
      summary: Log one set into an active workout instance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetLogRequest'
      responses:
        '201':
          description: Logged set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseSetResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Workout/exercise not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '409':
          description: Workout already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts/{id}/feedback:
    post:
      tags: [Train]
      operationId: saveWorkoutFeedback
      summary: Persist RP debrief rows for the instance (upsert per exercise)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/WorkoutFeedbackInput'
      responses:
        '204':
          description: Feedback stored
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Workout/exercise not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/workouts/{id}/finish:
    post:
      tags: [Train]
      operationId: finishWorkout
      summary: Complete a workout instance (idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The completed instance with its logged sets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutInstanceResponse'
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
        '404':
          description: Workout not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMessageList'
  /api/train/running-blocks:
    get:
      tags: [Train]
      operationId: listRunningBlocks
      summary: All running blocks of the current user (any status), start date ascending
      responses:
        '200':
          description: Running blocks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RunningBlockResponse' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
    post:
      tags: [Train]
      operationId: createRunningBlock
      summary: Create a running block (Builder save)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunningBlockUpsertRequest' }
      responses:
        '201':
          description: Created running block
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunningBlockResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/train/running-blocks/{id}:
    put:
      tags: [Train]
      operationId: updateRunningBlock
      summary: Full-replace a running block incl. structure
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunningBlockUpsertRequest' }
      responses:
        '200':
          description: Updated running block
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunningBlockResponse' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
    delete:
      tags: [Train]
      operationId: deleteRunningBlock
      summary: Soft-delete a running block
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Deleted }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/train/running-blocks/{id}/activate:
    post:
      tags: [Train]
      operationId: activateRunningBlock
      summary: Activate a running block — archives any other active one (idempotent)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Activated running block
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunningBlockResponse' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/train/running-blocks/{id}/close:
    post:
      tags: [Train]
      operationId: closeRunningBlock
      summary: Close (archive) a running block
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Archived running block
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunningBlockResponse' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/train/run-sessions:
    get:
      tags: [Train]
      operationId: listRunSessions
      summary: Logged run-session actuals of the current user, newest first
      responses:
        '200':
          description: Run sessions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RunSessionLogResponse' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
    post:
      tags: [Train]
      operationId: logRunSession
      summary: Log run-session actuals against a prescribed session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunSessionLogRequest' }
      responses:
        '201':
          description: Logged run session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunSessionLogResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing/invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
components:
  schemas:
    MesocycleResponse:
      type: object
      required:
        - id
        - title
        - shortTitle
        - status
        - startDate
        - endDate
        - weeks
        - currentWeek
        - split
        - style
        - phaseCurve
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        shortTitle:
          type: string
        status:
          type: string
          enum: [active, planned, archived]
        goal:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        weeks:
          type: integer
        currentWeek:
          type: integer
        split:
          type: string
        style:
          type: string
        phaseCurve:
          type: array
          items:
            type: string
            enum: [MEV, MAV, MRV, Deload]
        notes:
          type: string
        summary:
          type: string
        volumeRecompute:
          $ref: '#/components/schemas/VolumeRecompute'
        volumePerMuscle:
          type: object
          description: Per-muscle volume profile keyed by muscle id (chest, back, ...)
          additionalProperties:
            $ref: '#/components/schemas/VolumeProfile'
        days:
          type: array
          items:
            $ref: '#/components/schemas/MesoDay'
    VolumeRecompute:
      type: object
      required:
        - lastRun
        - nextRun
        - trigger
        - changes
      properties:
        lastRun:
          type: string
        nextRun:
          type: string
        trigger:
          type: string
        changes:
          type: array
          items:
            $ref: '#/components/schemas/VolumeChange'
    VolumeChange:
      type: object
      required:
        - muscle
        - change
        - reason
      properties:
        muscle:
          type: string
        change:
          type: string
        reason:
          type: string
        warning:
          type: boolean
    VolumeProfile:
      type: object
      required:
        - mev
        - mav
        - mrv
        - current
        - source
      properties:
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
        current:
          type: integer
        source:
          $ref: '#/components/schemas/VolumeSource'
    VolumeSource:
      type: object
      description: Provenance envelope — baseline -> adjustments -> confidence -> override
      required:
        - baseline
        - adjustments
        - confidence
      properties:
        baseline:
          $ref: '#/components/schemas/VolumeBaseline'
        adjustments:
          type: array
          items:
            $ref: '#/components/schemas/VolumeAdjustment'
        confidence:
          type: number
        note:
          type: string
        userOverride:
          $ref: '#/components/schemas/VolumeUserOverride'
    VolumeBaseline:
      type: object
      required:
        - name
        - mev
        - mav
        - mrv
      properties:
        name:
          type: string
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
    VolumeAdjustment:
      type: object
      required:
        - kind
        - label
        - delta
      properties:
        kind:
          type: string
          pattern: '^(pattern|recovery|niggle|sport-cross)$'
        label:
          type: string
        delta:
          type: object
          description: Partial mev/mav/mrv deltas
          additionalProperties:
            type: integer
        warning:
          type: boolean
    VolumeUserOverride:
      type: object
      required:
        - mev
        - mav
        - mrv
        - at
      properties:
        mev:
          type: integer
        mav:
          type: integer
        mrv:
          type: integer
        at:
          type: string
          format: date-time
    MesoDay:
      type: object
      required:
        - day
        - type
        - muscle
        - exerciseCount
        - exercises
      properties:
        id:
          type: string
          format: uuid
          description: The underlying template-day (workout_session) row — addresses day-level writes
        day:
          type: string
          description: "'Hét'..'Vas'"
        type:
          type: string
        muscle:
          type: string
        exerciseCount:
          type: integer
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/GymExercise'
        note:
          type: string
        current:
          type: boolean
        muscleAccent:
          type: boolean
    GymExercise:
      type: object
      required:
        - id
        - name
        - muscle
        - sets
        - targetReps
        - targetRIR
        - type
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        muscle:
          type: string
        sets:
          type: integer
        targetReps:
          type: string
        targetRIR:
          type: integer
        type:
          type: string
          enum: [compound, isolation, plyo]
        warning:
          type: string
        catalogId:
          type: string
          format: uuid
          description: Optional reference to the exercise_catalog row this exercise was picked from
    MesocycleCreateRequest:
      type: object
      required:
        - title
        - status
        - startDate
        - weeks
        - split
        - style
        - phaseCurve
      properties:
        title:
          type: string
          minLength: 1
        shortTitle:
          type: string
        status:
          type: string
          enum: [active, planned]
        goal:
          type: string
        startDate:
          type: string
          format: date
        weeks:
          type: integer
          minimum: 1
          maximum: 16
        split:
          type: string
          minLength: 1
        style:
          type: string
          minLength: 1
        phaseCurve:
          type: array
          minItems: 1
          items:
            type: string
            enum: [MEV, MAV, MRV, Deload]
        notes:
          type: string
        days:
          type: array
          items:
            $ref: '#/components/schemas/MesoDayInput'
    MesoDayInput:
      type: object
      required:
        - day
        - type
      properties:
        day:
          type: string
          minLength: 1
          description: "'Hét'..'Vas'"
        type:
          type: string
          minLength: 1
        muscle:
          type: string
        muscleAccent:
          type: boolean
        note:
          type: string
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/GymExerciseInput'
    GymExerciseInput:
      type: object
      required:
        - name
        - sets
        - targetReps
        - targetRIR
        - type
      properties:
        name:
          type: string
