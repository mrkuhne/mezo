openapi: 3.0.3
info:
  title: Progression API
  version: 1.0.0
tags:
  - name: Progression
paths:
  /api/progression/profile:
    get:
      operationId: getProfile
      tags: [Progression]
      summary: Athletic + muscle progression profile (radar, athlete-level, streak, highlights).
      responses:
        '200':
          description: The progression profile.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProgressionProfileResponse' }
        '401':
          description: Unauthenticated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/progression/growth-week/{date}:
    get:
      tags: [Progression]
      operationId: getGrowthWeek
      summary: Weekly growth aggregate — quests, LIFE XP, activities, savings (Progression)
      description: >-
        Aggregates the ISO week (Monday-keyed) containing the given date: closed daily-quest
        counts, LIFE XP earned (level_up_event gains), activity-log entry count and the week's
        savings sum. Honest zeros when nothing happened — never a 404.
      parameters:
        - name: date
          in: path
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: The week's growth aggregate
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GrowthWeekResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
components:
  schemas:
    ProgressionProfileResponse:
      type: object
      required: [streakWeeks, athletic, muscle, radarAxes, highlights, life, traits]
      properties:
        athleteLevel:
          type: number
          nullable: true
          description: Mean of the 11 non-robustness athletic levels (1-decimal); null = ghost (no XP yet).
        savingsHuf30d:
          type: integer
          format: int64
          nullable: true
          description: Sum of AI-extracted amountHuf on financial activity entries, trailing 30 days; null when the activity feature is off
        streakWeeks:
          type: integer
        athletic:
          type: array
          items: { $ref: '#/components/schemas/SkillLevel' }
        muscle:
          type: array
          items: { $ref: '#/components/schemas/SkillLevel' }
        radarAxes:
          type: array
          items: { $ref: '#/components/schemas/RadarAxis' }
        highlights:
          $ref: '#/components/schemas/ProfileHighlights'
        life:
          type: array
          description: All 8 LIFE skills in taxonomy order (missing row → level 1, 0 XP)
          items: { $ref: '#/components/schemas/SkillLevel' }
        traits:
          $ref: '#/components/schemas/ProfileTraits'
    ProfileTraits:
      type: object
      description: Computed behavior traits (ADR 0010 — never self-claimed)
      required: [consistencyWeeks]
      properties:
        disciplinePct:
          type: integer
          nullable: true
          description: 28-day commitment completion ratio 0–100 (planned sessions done + quests completed, blended); null when no commitments in the window
        consistencyWeeks:
          type: integer
          description: Current streak of consecutive weeks with >= 4 active days (any XP-earning action)
    GrowthWeekResponse:
      type: object
      required: [weekStart, questCompleted, questClosed, lifeXp, activities, savingsHuf]
      properties:
        weekStart: { type: string, format: date, description: ISO Monday of the aggregated week }
        questCompleted: { type: integer, format: int32 }
        questClosed: { type: integer, format: int32, description: completed + expired (rerolled/offered excluded) }
        lifeXp: { type: integer, format: int64, description: Sum of LIFE-kind gains in the week's level-up events }
        activities: { type: integer, format: int32, description: Activity-log entries dated in the week }
        savingsHuf: { type: integer, format: int64, description: Sum of financial amountHuf dated in the week }
    SkillLevel:
      type: object
      required: [skillKey, kind, level, cumulativeXp, progressPct]
      properties:
        skillKey: { type: string }
        kind: { type: string, description: 'ATHLETIC|MUSCLE|LIFE' }
        level: { type: integer }
        cumulativeXp: { type: integer, format: int64 }
        progressPct: { type: number, description: 'within-level fill 0..100' }
    RadarAxis:
      type: object
      required: [axis, value]
      properties:
        axis: { type: string, description: 'HU axis label (Erő, Robbanékonyság, …)' }
        value: { type: number, description: 'aggregated level, 1-decimal' }
    ProfileHighlights:
      type: object
      properties:
        bestAthletic: { $ref: '#/components/schemas/SkillRef' }
        bestMuscle: { $ref: '#/components/schemas/SkillRef' }
    SkillRef:
      type: object
      required: [skillKey, level]
      properties:
        skillKey: { type: string }
        level: { type: integer }
