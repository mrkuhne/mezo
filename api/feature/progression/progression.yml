openapi: 3.0.3
info:
  title: Progression API
  version: 1.0.0
tags:
  - name: Progression
paths:
  /api/progression/profile:
    get:
      operationId: getProfile
      tags: [Progression]
      summary: Athletic + muscle progression profile (radar, athlete-level, streak, highlights).
      responses:
        '200':
          description: The progression profile.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProgressionProfileResponse' }
        '401':
          description: Unauthenticated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
components:
  schemas:
    ProgressionProfileResponse:
      type: object
      required: [streakWeeks, athletic, muscle, radarAxes, highlights, life, traits]
      properties:
        athleteLevel:
          type: number
          nullable: true
          description: Mean of the 11 non-robustness athletic levels (1-decimal); null = ghost (no XP yet).
        streakWeeks:
          type: integer
        athletic:
          type: array
          items: { $ref: '#/components/schemas/SkillLevel' }
        muscle:
          type: array
          items: { $ref: '#/components/schemas/SkillLevel' }
        radarAxes:
          type: array
          items: { $ref: '#/components/schemas/RadarAxis' }
        highlights:
          $ref: '#/components/schemas/ProfileHighlights'
        life:
          type: array
          description: All 8 LIFE skills in taxonomy order (missing row → level 1, 0 XP)
          items: { $ref: '#/components/schemas/SkillLevel' }
        traits:
          $ref: '#/components/schemas/ProfileTraits'
    ProfileTraits:
      type: object
      description: Computed behavior traits (ADR 0010 — never self-claimed)
      required: [consistencyWeeks]
      properties:
        disciplinePct:
          type: integer
          nullable: true
          description: 28-day commitment completion ratio 0–100 (planned sessions done + quests completed, blended); null when no commitments in the window
        consistencyWeeks:
          type: integer
          description: Current streak of consecutive weeks with >= 4 active days (any XP-earning action)
    SkillLevel:
      type: object
      required: [skillKey, kind, level, cumulativeXp, progressPct]
      properties:
        skillKey: { type: string }
        kind: { type: string, description: 'ATHLETIC|MUSCLE|LIFE' }
        level: { type: integer }
        cumulativeXp: { type: integer, format: int64 }
        progressPct: { type: number, description: 'within-level fill 0..100' }
    RadarAxis:
      type: object
      required: [axis, value]
      properties:
        axis: { type: string, description: 'HU axis label (Erő, Robbanékonyság, …)' }
        value: { type: number, description: 'aggregated level, 1-decimal' }
    ProfileHighlights:
      type: object
      properties:
        bestAthletic: { $ref: '#/components/schemas/SkillRef' }
        bestMuscle: { $ref: '#/components/schemas/SkillRef' }
    SkillRef:
      type: object
      required: [skillKey, level]
      properties:
        skillKey: { type: string }
        level: { type: integer }
