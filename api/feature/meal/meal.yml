openapi: 3.0.3
info: { title: '', version: '' }
tags:
  - name: Meal
    description: Meal logging (Étkezés-logolás) — owned meal + meal_item aggregate; polymorphic items reference a recipe or a pantry_item by id with a per-basis macro snapshot. GET /api/fuel/day/{date} aggregates the day for the Fuel screen.
paths:
  /api/fuel/day/{date}:
    get:
      tags: [Meal]
      operationId: getFuelDay
      summary: The owner's nutrition day — targets, consumed rollup, and the day's meals
      parameters: [ { name: date, in: path, required: true, schema: { type: string, format: date } } ]
      responses:
        '200': { description: Fuel day, content: { application/json: { schema: { $ref: '#/components/schemas/FuelDayResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/fuel/week/{start}:
    get:
      tags: [Meal]
      operationId: getFuelWeek
      summary: Seven-day nutrition rollup from {start} — per-day targets + consumed, no meal bodies (Terv weekly stats / Insights weekly read-model)
      parameters: [ { name: start, in: path, required: true, schema: { type: string, format: date } } ]
      responses:
        '200': { description: 'Fuel week (7 rollups, start..start+6)', content: { application/json: { schema: { $ref: '#/components/schemas/FuelWeekResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/meal:
    post:
      tags: [Meal]
      operationId: createMeal
      summary: Log a meal with its items (recipe/pantry snapshots captured server-side)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/MealRequest' } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/MealResponse' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/meal/{id}:
    put:
      tags: [Meal]
      operationId: updateMeal
      summary: Full-replace an owned meal aggregate (all fields + all items, snapshots re-captured)
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/MealRequest' } } }
      responses:
        '204': { description: Updated }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
    delete:
      tags: [Meal]
      operationId: deleteMeal
      summary: Soft-delete an owned meal (and its items)
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '204': { description: Deleted }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/meal/ai-draft:
    post:
      tags: [MealAiLog]
      operationId: draftMealFromAi
      summary: Parse + match a meal draft from free text and/or a photo (stateless, nothing persisted)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [date]
              properties:
                date:
                  type: string
                  format: date
                text:
                  type: string
                  maxLength: 2000
                photo:
                  type: string
                  format: binary
      responses:
        '200':
          description: Editable draft (empty items = nothing recognized, honest empty)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealAiDraftResponse'
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '502': { description: Photo/LLM extraction failed, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '503': { description: LLM port unavailable (companion off), content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/recipe/{id}/logs:
    get:
      tags: [Meal]
      operationId: recipeLogs
      summary: Recent meal logs that included this owned recipe (recipe detail RecipeLogsList; data lives in meal_item, so the op is Meal-owned — resolves the meal↔recipe slice cycle, mezo-ah18.16)
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: Recent logs, content: { application/json: { schema: { $ref: '#/components/schemas/RecipeLogListResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/water-log:
    post:
      tags: [Meal]
      operationId: logWater
      summary: Log a discrete water intake entry (day rollup feeds FuelDayResponse.consumed.water)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/WaterLogRequest' } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/WaterLogResponse' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/water-log/{id}:
    delete:
      tags: [Meal]
      operationId: deleteWaterLog
      summary: Soft-delete a water entry (undo)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Deleted }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
components:
  schemas:
    Macros:
      type: object
      required: [kcal, p, c, f]
      properties:
        kcal: { type: number }
        p: { type: number }
        c: { type: number }
        f: { type: number }
    MacroSet:
      type: object
      required: [kcal, p, c, f, water]
      properties:
        kcal: { type: number }
        p: { type: number }
        c: { type: number }
        f: { type: number }
        water: { type: number }
    MealScore:
      type: object
      properties:
        value: { type: number, nullable: true }
        breakdown: { allOf: [ { $ref: '#/components/schemas/MealBreakdown' } ], nullable: true }
    MealBreakdown:
      type: object
      description: Typed 4-dimension score envelope (deterministic v0, mezo-yta / ADR 0006). summary/improve are P8 prose — null/empty until then.
      required: [value, confidence, dimensions, improve, tools]
      properties:
        value: { type: number, description: 'Weighted total 0..1 — duplicates meal.score by design (ADR 0006)' }
        confidence: { type: number, description: 'Coverage-weighted numeric confidence 0..1' }
        summary: { type: string, nullable: true }
        dimensions: { type: array, items: { $ref: '#/components/schemas/MealScoreDimension' } }
        improve: { type: array, items: { $ref: '#/components/schemas/MealImproveRow' } }
        tools: { type: array, items: { $ref: '#/components/schemas/MealToolRow' } }
    MealScoreDimension:
      type: object
      description: One weighted dimension; exactly one of macro/micros/nova/context is populated, matching id.
      required: [id, label, weight, score, detail]
      properties:
        id: { type: string, pattern: '^(macro|micro|nova|context)$' }
        label: { type: string }
        weight: { type: number, description: '0 when the dimension degraded (no input coverage) — total renormalizes' }
        score: { type: number }
        detail: { type: string }
        macro: { allOf: [ { $ref: '#/components/schemas/MealMacroDetail' } ], nullable: true }
        micros: { type: array, nullable: true, items: { $ref: '#/components/schemas/MealMicroRow' } }
        nova: { allOf: [ { $ref: '#/components/schemas/MealNovaDetail' } ], nullable: true }
        context: { type: array, nullable: true, items: { $ref: '#/components/schemas/MealContextRow' } }
    MealMacroDetail:
      type: object
      required: [ratioP, ratioC, ratioF, targetP, targetC, targetF, kcalShareOfDay]
      properties:
        ratioP: { type: number, description: 'Protein kcal-share of the meal, %' }
        ratioC: { type: number }
        ratioF: { type: number }
        targetP: { type: string, description: 'Display string of the config target share' }
        targetC: { type: string }
        targetF: { type: string }
        kcalShareOfDay: { type: number }
        notes: { type: string, nullable: true, description: 'P8 prose — null in v0' }
    MealMicroRow:
      type: object
      required: [name, value, pct, status]
      properties:
        name: { type: string }
        value: { type: string, description: 'Display value, e.g. "9.5 g"' }
        pct: { type: integer, description: 'Fiber: % of the per-meal allotment reached; limits: % of the allotment used' }
        status: { type: string, pattern: '^(good|ok|low)$' }
    MealNovaDetail:
      type: object
      required: [dominant, stack, items]
      properties:
        dominant: { type: integer, description: 'NOVA group 1..4 with the largest kcal share' }
        stack: { type: array, items: { $ref: '#/components/schemas/MealNovaStackRow' } }
        items: { type: array, items: { $ref: '#/components/schemas/MealNovaItemRow' } }
    MealNovaStackRow:
      type: object
      required: [nova, pct, label]
      properties:
        nova: { type: integer }
        pct: { type: integer, description: 'kcal share of this NOVA group, %' }
        label: { type: string, description: 'Item names of the group joined, or "—" at 0%' }
    MealNovaItemRow:
      type: object
      required: [name, nova, warning]
      properties:
        name: { type: string }
        nova: { type: integer }
        warning: { type: boolean, description: 'true for NOVA 4 (ultra-processed) lines' }
    MealContextRow:
      type: object
      required: [label, value]
      properties:
        label: { type: string }
        value: { type: string }
    MealImproveRow:
      type: object
      required: [text, impact]
      properties:
        text: { type: string }
        impact: { type: string }
    MealToolRow:
      type: object
      required: [type, name]
      properties:
        type: { type: string, pattern: '^(read|compute|write)$' }
        name: { type: string }
    MealItemRequest:
      type: object
      required: [source, amount, unit]
      properties:
        source: { type: string, pattern: '^(recipe|pantry|estimate)$' }
        recipeId: { type: string, format: uuid, nullable: true }
        pantryItemId: { type: string, format: uuid, nullable: true }
        amount: { type: number, exclusiveMinimum: 0 }
        unit: { type: string, minLength: 1 }
        # estimate arm (AI meal logging, mezo-78rn): free-form line with its own macro snapshot,
        # referencing neither a recipe nor a pantry item — all nullable, ignored by recipe/pantry sources
        name: { type: string, nullable: true }
        per: { type: number, nullable: true }
        basisUnit: { type: string, nullable: true }
        kcal: { type: number, nullable: true }
        proteinG: { type: number, nullable: true }
        carbsG: { type: number, nullable: true }
        fatG: { type: number, nullable: true }
        nova: { type: integer, minimum: 1, maximum: 4, nullable: true }
    MealItemResponse:
      type: object
      required: [source, amount, unit, lineOrder, name, contribution]
      properties:
        source: { type: string }
        recipeId: { type: string, format: uuid, nullable: true }
        pantryItemId: { type: string, format: uuid, nullable: true }
        amount: { type: number }
        unit: { type: string }
        lineOrder: { type: integer }
        name: { type: string }
        nova: { type: integer, nullable: true }
        contribution: { $ref: '#/components/schemas/Macros' }
    MealRequest:
      type: object
      required: [slot, items]
      properties:
        slot: { type: string, pattern: '^(breakfast|lunch|dinner|snack)$' }
        loggedAt: { type: string, format: date-time, nullable: true }
        title: { type: string, nullable: true }
        items:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/MealItemRequest' }
        provenance:
          nullable: true
          allOf: [ { $ref: '#/components/schemas/MealProvenance' } ]
    MealResponse:
      type: object
      required: [id, slot, loggedAt, mealDate, macros, score, items]
      properties:
        id: { type: string, format: uuid }
        slot: { type: string }
        loggedAt: { type: string, format: date-time }
        mealDate: { type: string, format: date }
        title: { type: string, nullable: true }
        macros: { $ref: '#/components/schemas/Macros' }
        score: { $ref: '#/components/schemas/MealScore' }
        items: { type: array, items: { $ref: '#/components/schemas/MealItemResponse' } }
    MealAiDraftResponse:
      type: object
      required: [slot, items]
      properties:
        slot:
          type: string
          pattern: '^(breakfast|lunch|dinner|snack)$'
        title:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/MealAiDraftItem'
    MealAiDraftItem:
      type: object
      required: [source, name, amount, unit, per, basisUnit, kcal, proteinG, carbsG, fatG, confidence, needsReview]
      properties:
        source:
          type: string
          pattern: '^(recipe|pantry|estimate)$'
        pantryItemId:
          type: string
          format: uuid
          nullable: true
        recipeId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        amount:
          type: number
        unit:
          type: string
        per:
          type: number
        basisUnit:
          type: string
        kcal:
          type: number
        proteinG:
          type: number
        carbsG:
          type: number
        fatG:
          type: number
        nova:
          type: integer
          minimum: 1
          maximum: 4
          nullable: true
        confidence:
          type: number
          minimum: 0
          maximum: 1
        needsReview:
          type: boolean
    MealProvenance:
      type: object
      required: [origin]
      properties:
        origin:
          type: string
          pattern: '^(manual|ai-text|ai-photo)$'
        model:
          type: string
          nullable: true
        confidence:
          type: number
          nullable: true
        rawText:
          type: string
          nullable: true
    FuelDayResponse:
      type: object
      required: [date, targets, consumed, meals]
      properties:
        date: { type: string, format: date }
        targets: { $ref: '#/components/schemas/MacroSet' }
        consumed: { $ref: '#/components/schemas/MacroSet' }
        meals: { type: array, items: { $ref: '#/components/schemas/MealResponse' } }
    FuelDayRollup:
      type: object
      required: [date, targets, consumed]
      properties:
        date: { type: string, format: date }
        targets: { $ref: '#/components/schemas/MacroSet' }
        consumed: { $ref: '#/components/schemas/MacroSet' }
    FuelWeekResponse:
      type: object
      required: [start, days]
      properties:
        start: { type: string, format: date }
        days: { type: array, items: { $ref: '#/components/schemas/FuelDayRollup' } }
    RecipeLogResponse:
      type: object
      required: [mealId, slot, loggedAt, kcal, p, c, f]
      properties:
        mealId: { type: string, format: uuid }
        slot: { type: string }
        loggedAt: { type: string, format: date-time }
        kcal: { type: number }
        p: { type: number }
        c: { type: number }
        f: { type: number }
        score: { type: number, nullable: true, description: 'The logged meal''s deterministic score 0..1 (mezo-yta); null for pre-scoring rows' }
    RecipeLogListResponse:
      type: object
      required: [recentLogs]
      properties:
        recentLogs: { type: array, items: { $ref: '#/components/schemas/RecipeLogResponse' } }
    WaterLogRequest:
      type: object
      required: [amountMl]
      properties:
        date: { type: string, format: date, description: 'Day key; defaults to the server''s today when omitted' }
        amountMl: { type: integer, minimum: 1 }
    WaterLogResponse:
      type: object
      required: [id, date, amountMl]
      properties:
        id: { type: string, format: uuid }
        date: { type: string, format: date }
        amountMl: { type: integer }
