openapi: 3.0.3
info: { title: '', version: '' }
tags:
  - name: Companion
    description: Phase-3 companion chat — conversations + messages (mezo-fnnq)
  - name: CompanionStream
    description: >-
      Phase-3 companion chat — SSE streaming turn (mezo-fnnq.4). PRECEDENT: this tag's generated
      interface (CompanionStreamApi) is deliberately NOT implemented — SSE (Flux<ServerSentEvent>)
      is outside the generator's vocabulary, so the endpoint is hand-written
      (CompanionStreamController) while the contract stays the single source of truth.
      See docs/features/_platform-api-backend.md §9.
paths:
  /api/companion/conversation:
    get:
      tags: [Companion]
      operationId: listConversations
      summary: List the owner's conversations, most recently active first
      responses:
        '200':
          description: Conversations ordered by last activity (newest first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ConversationResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
    post:
      tags: [Companion]
      operationId: createConversation
      summary: Start a new, empty conversation (title is set by the first message)
      responses:
        '201':
          description: The created conversation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/companion/conversation/{conversationId}/messages:
    get:
      tags: [Companion]
      operationId: listMessages
      summary: Full message history of one conversation, oldest first
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Messages in chronological order
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MessageResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: Conversation not found (or owned by someone else)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/companion/conversation/{conversationId}/message:
    post:
      tags: [Companion]
      operationId: sendMessage
      summary: Send a user message and get the assistant's answer (sync JSON; streaming sibling at .../message/stream)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendMessageRequest' }
      responses:
        '200':
          description: The persisted assistant message
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: Conversation not found (or owned by someone else)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/companion/conversation/{conversationId}/message/stream:
    post:
      tags: [CompanionStream]
      operationId: streamMessage
      summary: >-
        Send a user message and stream the assistant's answer as Server-Sent Events (V0.4).
        Events: 0..n 'delta' (data = StreamDelta JSON), then exactly one terminal event —
        'done' (data = the persisted assistant MessageResponse JSON) or 'error'
        (data = StreamError JSON; the assistant turn is NOT persisted, the user message is).
        Every data line is JSON. Clients should send "Accept: text/event-stream, application/json"
        so pre-stream errors (400/401/404) arrive as normal SystemMessageList JSON.
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendMessageRequest' }
      responses:
        '200':
          description: SSE frames — see the per-event data schemas (StreamDelta / MessageResponse / StreamError)
          content:
            text/event-stream:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/StreamDelta'
                  - $ref: '#/components/schemas/MessageResponse'
                  - $ref: '#/components/schemas/StreamError'
        '400':
          description: Validation error (emitted before the stream starts)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: Conversation not found (or owned by someone else)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
components:
  schemas:
    ConversationResponse:
      type: object
      required: [id, startedAt]
      properties:
        id: { type: string, format: uuid }
        title: { type: string, nullable: true, maxLength: 120, description: 'Null until the first user message; then that message truncated.' }
        startedAt: { type: string, format: date-time }
        lastMessageAt: { type: string, format: date-time, nullable: true }
    MessageResponse:
      type: object
      required: [id, role, content, createdAt, tools, refs]
      properties:
        id: { type: string, format: uuid }
        role: { type: string, description: "'user' | 'assistant'" }
        content: { type: string }
        createdAt: { type: string, format: date-time }
        tools:
          type: array
          description: >-
            Tool calls behind this answer (V0.5): read-tool invocations of this turn, name carries
            the args, e.g. "get_weight_trend(weeks=2)". Empty when the turn used no tools.
          items: { $ref: '#/components/schemas/MessageTool' }
        refs:
          type: array
          description: >-
            Data references backing this answer (V0.5): entity refs contributed by the executed
            tools (deduped, capped). Empty when the turn used no tools.
          items: { $ref: '#/components/schemas/MessageRef' }
    MessageTool:
      type: object
      required: [type, name]
      properties:
        type: { type: string, description: "'read' | 'compute' (mirrors the FE ToolType) — V0.5 emits only 'read'" }
        name: { type: string }
    MessageRef:
      type: object
      required: [kind, id]
      properties:
        kind: { type: string }
        id: { type: string }
    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1, maxLength: 4000 }
    StreamDelta:
      type: object
      required: [text]
      properties:
        text: { type: string, description: 'One streamed answer chunk (token/segment delta).' }
    StreamError:
      type: object
      required: [code]
      properties:
        code: { type: string, description: "Stream failure code — 'COMPANION_STREAM_FAILED'." }
