openapi: 3.0.3
info: { title: '', version: '' }
tags:
  - name: Companion
    description: Phase-3 companion chat — conversations + messages (mezo-fnnq)
  - name: CompanionStream
    description: >-
      Phase-3 companion chat — SSE streaming turn (mezo-fnnq.4). PRECEDENT: this tag's generated
      interface (CompanionStreamApi) is deliberately NOT implemented — SSE (Flux<ServerSentEvent>)
      is outside the generator's vocabulary, so the endpoint is hand-written
      (CompanionStreamController) while the contract stays the single source of truth.
      See docs/features/_platform-api-backend.md §9.
paths:
  /api/companion/conversation:
    get:
      tags: [Companion]
      operationId: listConversations
      summary: List the owner's conversations, most recently active first
      responses:
        '200':
          description: Conversations ordered by last activity (newest first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ConversationResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
    post:
      tags: [Companion]
      operationId: createConversation
      summary: Start a new, empty conversation (title is set by the first message)
      responses:
        '201':
          description: The created conversation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/companion/conversation/{conversationId}/messages:
    get:
      tags: [Companion]
      operationId: listMessages
      summary: Full message history of one conversation, oldest first
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Messages in chronological order
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MessageResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: Conversation not found (or owned by someone else)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/companion/conversation/{conversationId}/message:
    post:
      tags: [Companion]
      operationId: sendMessage
      summary: Send a user message and get the assistant's answer (sync JSON; streaming sibling at .../message/stream)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendMessageRequest' }
      responses:
        '200':
          description: The persisted assistant message
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: Conversation not found (or owned by someone else)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/companion/fact:
    get:
      tags: [Companion]
      operationId: listFacts
      summary: List the owner's confirmed knowledge facts, strongest reinforcement first (V1.1)
      responses:
        '200':
          description: Facts ordered by reinforcement count (desc), then newest first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/KnowledgeFactResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
    post:
      tags: [Companion]
      operationId: createFact
      summary: Manually add a confirmed knowledge fact (source = manual)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateFactRequest' }
      responses:
        '201':
          description: The created fact (include_in_prompt defaults to true)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KnowledgeFactResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/companion/fact/{factId}:
    patch:
      tags: [Companion]
      operationId: updateFact
      summary: Partially update a fact — edit its text/category or toggle include_in_prompt
      parameters:
        - name: factId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateFactRequest' }
      responses:
        '200':
          description: The updated fact
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KnowledgeFactResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: Fact not found (or owned by someone else)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/companion/fact/candidate:
    get:
      tags: [Companion]
      operationId: listFactCandidates
      summary: Pending (undecided) extraction candidates, newest first (V1.2)
      responses:
        '200':
          description: Pending candidates awaiting an explicit L2 decision
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FactCandidateResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/companion/fact/candidate/{candidateId}/decision:
    post:
      tags: [Companion]
      operationId: decideFactCandidate
      summary: >-
        Decide a candidate (V1.2) — accept/refine promote it into a knowledge fact (source=chat),
        reject archives it. One decision per candidate; confirm is an explicit L2 action, never silent.
      parameters:
        - name: candidateId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FactDecisionRequest' }
      responses:
        '200':
          description: The decided candidate (promotedFactId set on accept/refine)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FactCandidateResponse' }
        '400':
          description: Validation error / candidate already decided
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: Candidate not found (or owned by someone else)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/companion/pattern:
    get:
      tags: [Companion]
      operationId: listPatterns
      summary: The pattern inbox (V3.1) — detected correlations, strongest/newest first
      responses:
        '200':
          description: All live patterns (proposed + monitoring + confirmed + rejected)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PatternResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/companion/pattern/{patternId}/decision:
    post:
      tags: [Companion]
      operationId: decidePattern
      summary: >-
        Judge a pattern (V3.1, L2 surface) — confirm/monitor/reject. Unlike fact candidates a
        pattern is a standing judgement: transitions between the three user states are repeatable.
      parameters:
        - name: patternId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PatternDecisionRequest' }
      responses:
        '200':
          description: The pattern with its new status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PatternResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: Pattern not found (or owned by someone else)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/companion/conversation/{conversationId}/message/stream:
    post:
      tags: [CompanionStream]
      operationId: streamMessage
      summary: >-
        Send a user message and stream the assistant's answer as Server-Sent Events (V0.4).
        Events: 0..n 'delta' (data = StreamDelta JSON), then exactly one terminal event —
        'done' (data = the persisted assistant MessageResponse JSON) or 'error'
        (data = StreamError JSON; the assistant turn is NOT persisted, the user message is).
        Every data line is JSON. Clients should send "Accept: text/event-stream, application/json"
        so pre-stream errors (400/401/404) arrive as normal SystemMessageList JSON.
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendMessageRequest' }
      responses:
        '200':
          description: SSE frames — see the per-event data schemas (StreamDelta / MessageResponse / StreamError)
          content:
            text/event-stream:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/StreamDelta'
                  - $ref: '#/components/schemas/MessageResponse'
                  - $ref: '#/components/schemas/StreamError'
        '400':
          description: Validation error (emitted before the stream starts)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: Conversation not found (or owned by someone else)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
components:
  schemas:
    ConversationResponse:
      type: object
      required: [id, startedAt]
      properties:
        id: { type: string, format: uuid }
        title: { type: string, nullable: true, maxLength: 120, description: 'Null until the first user message; then that message truncated.' }
        startedAt: { type: string, format: date-time }
        lastMessageAt: { type: string, format: date-time, nullable: true }
    MessageResponse:
      type: object
      required: [id, role, content, createdAt, tools, refs, degraded]
      properties:
        id: { type: string, format: uuid }
        role: { type: string, description: "'user' | 'assistant'" }
        content: { type: string }
        createdAt: { type: string, format: date-time }
        degraded:
          type: boolean
          description: >-
            True when the answer failed the V1.3 advisor self-check (redundancy / grounding /
            clinical) even after the corrective retry — render it flagged, honest (old docs §4.5
            [degraded] semantics). Always false on user rows.
        tools:
          type: array
          description: >-
            Tool calls behind this answer (V0.5): read-tool invocations of this turn, name carries
            the args, e.g. "get_weight_trend(weeks=2)". Empty when the turn used no tools.
          items: { $ref: '#/components/schemas/MessageTool' }
        refs:
          type: array
          description: >-
            Data references backing this answer (V0.5): entity refs contributed by the executed
            tools (deduped, capped). Empty when the turn used no tools.
          items: { $ref: '#/components/schemas/MessageRef' }
    MessageTool:
      type: object
      required: [type, name]
      properties:
        type: { type: string, description: "'read' | 'compute' (mirrors the FE ToolType) — V0.5 emits only 'read'" }
        name: { type: string }
    MessageRef:
      type: object
      required: [kind, id]
      properties:
        kind: { type: string }
        id: { type: string }
    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1, maxLength: 4000 }
    KnowledgeFactResponse:
      type: object
      required: [id, factText, category, source, reinforcementCount, includeInPrompt, createdAt]
      properties:
        id: { type: string, format: uuid }
        factText: { type: string }
        category: { type: string, description: "'train' | 'fuel' | 'health' | 'life'" }
        source: { type: string, description: "'chat' | 'pattern' | 'manual' — V1.1 creates only 'manual'; 'chat' arrives with V1.2 extraction, 'pattern' with V3.3 promotion" }
        reinforcementCount: { type: integer, description: 'How many times the fact was re-confirmed/re-detected (V1.3+/V3.3 increment it).' }
        includeInPrompt: { type: boolean, description: 'Whether the fact competes for the top-N system-prompt injection slots.' }
        lastReinforcedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
    CreateFactRequest:
      type: object
      required: [factText, category]
      properties:
        factText: { type: string, minLength: 1, maxLength: 500 }
        category: { type: string, pattern: '^(train|fuel|health|life)$' }
    UpdateFactRequest:
      type: object
      description: Partial update — only the provided fields are applied.
      properties:
        factText: { type: string, minLength: 1, maxLength: 500, nullable: true }
        category: { type: string, pattern: '^(train|fuel|health|life)$', nullable: true }
        includeInPrompt: { type: boolean, nullable: true }
    FactCandidateResponse:
      type: object
      required: [id, candidateText, category, createdAt]
      properties:
        id: { type: string, format: uuid }
        candidateText: { type: string }
        category: { type: string, description: "'train' | 'fuel' | 'health' | 'life' — classified by the extractor at capture time" }
        userDecision: { type: string, nullable: true, description: "'accept' | 'reject' | 'refine' — null while pending" }
        refinedText: { type: string, nullable: true, description: 'The user-edited wording when the decision was refine.' }
        promotedFactId: { type: string, format: uuid, nullable: true, description: 'The knowledge fact this candidate was promoted into (accept/refine).' }
        createdAt: { type: string, format: date-time }
    FactDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision: { type: string, pattern: '^(accept|reject|refine)$' }
        refinedText: { type: string, minLength: 1, maxLength: 500, nullable: true, description: 'Required when decision is refine — the corrected fact wording.' }
    StreamDelta:
      type: object
      required: [text]
      properties:
        text: { type: string, description: 'One streamed answer chunk (token/segment delta).' }
    StreamError:
      type: object
      required: [code]
      properties:
        code: { type: string, description: "Stream failure code — 'COMPANION_STREAM_FAILED'." }
    PatternResponse:
      type: object
      required: [id, kind, category, categoryLabel, title, evidence, status, lastDetectedAt]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, pattern: '^(statistical|ai_hypothesis)$', description: 'statistical = nightly Pearson job (V3.1); ai_hypothesis = weekly LLM loop (V3.2).' }
        category: { type: string, pattern: '^(physiology|trigger|response)$', description: 'The FE PatternCategory — assigned by the metric-pair catalog.' }
        categoryLabel: { type: string, description: 'Hungarian category chip label.' }
        title: { type: string }
        mechanism: { type: string, nullable: true, description: 'Deterministic HU description for statistical rows; LLM mechanism for V3.2 hypotheses.' }
        evidence:
          type: array
          items: { type: string }
          description: 'Deterministic evidence chips (r=…, n=… nap, p=…, window).'
        confidence: { type: number, format: double, nullable: true, description: 'NULL for statistical rows (honest small-n — the FE renders "tanulom"); the 4-factor critique score for V3.2 hypotheses.' }
        critique: { $ref: '#/components/schemas/PatternCritique' }
        status: { type: string, pattern: '^(proposed|monitoring|confirmed|rejected)$' }
        lastDetectedAt: { type: string, format: date-time, description: 'When the nightly job last computed/refreshed the stats.' }
        thinking: { type: string, nullable: true, description: "The V3.2 critic's prose reasoning — the card's 'AI gondolatmenete'; null on statistical rows." }
    PatternCritique:
      type: object
      nullable: true
      description: The V3.2 4-factor critique (0..1 each) — null until the hypothesis loop lands.
      properties:
        statistical: { type: number, format: double }
        confounders: { type: number, format: double }
        l3align: { type: number, format: double }
        actionability: { type: number, format: double }
    PatternDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision: { type: string, pattern: '^(confirm|monitor|reject)$' }
