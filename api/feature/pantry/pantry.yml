openapi: 3.0.3
info: { title: '', version: '' }
tags:
  - name: Pantry
    description: Pantry (Kamra) — food + supplement inventory (single pantry_item table, kind-projected)
  - name: PantryImport
    description: Pantry import — OpenFoodFacts lookup + confirmed-draft import (separate tag so the whole feature is bean-gated via mezo.feature.pantry-import.enabled)
paths:
  /api/pantry:
    get:
      tags: [Pantry]
      operationId: getPantry
      summary: The owner's pantry, projected by kind into ingredients + stash
      responses:
        '200': { description: Pantry, content: { application/json: { schema: { $ref: '#/components/schemas/PantryResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
    post:
      tags: [Pantry]
      operationId: createPantryItem
      summary: Add a pantry item (food or supplement/stim/med)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/PantryItemRequest' } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/PantryItemResponse' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/pantry/{id}:
    put:
      tags: [Pantry]
      operationId: updatePantryItem
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/PantryItemRequest' } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/PantryItemResponse' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
    delete:
      tags: [Pantry]
      operationId: deletePantryItem
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '204': { description: Deleted }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  # Import paths live OUTSIDE /api/pantry/* on purpose: a static segment under /api/pantry would
  # fall into the PUT/DELETE /api/pantry/{id} pattern when the import switch is off (405, not 404)
  # — the same collision the fuel intake 'entry' segment avoids.
  /api/pantry-import/lookup:
    get:
      tags: [PantryImport]
      operationId: lookupPantryItem
      summary: OpenFoodFacts lookup — all-digit q (>=8 chars) is a barcode fetch, else text search
      parameters:
        - { name: q, in: query, required: true, schema: { type: string, minLength: 2, maxLength: 120 } }
      responses:
        '200': { description: Lookup results (empty array when nothing matches), content: { application/json: { schema: { $ref: '#/components/schemas/PantryLookupResponse' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '502': { description: OpenFoodFacts unreachable / upstream error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/pantry-import:
    post:
      tags: [PantryImport]
      operationId: importPantryItem
      summary: Persist a confirmed lookup draft — creates the pantry_item (kind food, source openfoodfacts) + a pantry_import feed row
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/PantryImportRequest' } } }
      responses:
        '201': { description: Imported, content: { application/json: { schema: { $ref: '#/components/schemas/PantryItemResponse' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
components:
  schemas:
    PantryResponse:
      type: object
      required: [ingredients, stash, imports, suggestions]
      properties:
        ingredients: { type: array, items: { $ref: '#/components/schemas/IngredientResponse' } }
        stash: { type: array, items: { $ref: '#/components/schemas/SupplementStashResponse' } }
        # P6 (mezo-bka): recent import feed + deterministic swap suggestions — always present, honest-empty arrays
        imports: { type: array, items: { $ref: '#/components/schemas/PantryImportEntryResponse' } }
        suggestions: { type: array, items: { $ref: '#/components/schemas/PantrySuggestionResponse' } }
    PantryMacros:
      type: object
      required: [kcal, p, c, f]
      properties:
        kcal: { type: number }
        p: { type: number }
        c: { type: number }
        f: { type: number }
    PantryMicro:
      type: object
      required: [name, pct]
      properties:
        name: { type: string }
        pct: { type: integer }
    PantryStock:
      type: object
      required: [qty, unit]
      properties:
        qty: { type: number }
        unit: { type: string }
        expires: { type: string, nullable: true }
        lowExpiry: { type: boolean, nullable: true }
    IngredientResponse:
      type: object
      # nova left OUT of required since mezo-32ko: an unclassified item is an honest null,
      # not a fabricated NOVA 1 (the old mapper default masked the data gap on the Kamra UI).
      required: [id, name, brand, source, category, per, unit, macros, price, priceUnit, pkg, micros, lastUsed, usedInRecipes]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        brand: { type: string }
        source: { type: string, enum: [kifli.hu, myprotein.hu, tesco.hu, auchan.hu, manual, lidl, nutriversum, herbahaz, nutrifit, decathlon, openfoodfacts] }
        category: { type: string }
        per: { type: number }
        unit: { type: string }
        macros: { $ref: '#/components/schemas/PantryMacros' }
        price: { type: number }
        priceUnit: { type: string }
        pkg: { type: string }
        micros: { type: array, items: { $ref: '#/components/schemas/PantryMicro' } }
        nova: { type: integer, minimum: 1, maximum: 4, nullable: true }
        stock: { allOf: [ { $ref: '#/components/schemas/PantryStock' } ], nullable: true }
        # extended nutrition facts (per serving) — preserved from the imported catalog
        fiberG: { type: number, nullable: true }
        sugarG: { type: number, nullable: true }
        saltG: { type: number, nullable: true }
        saturatedFatG: { type: number, nullable: true }
        lastUsed: { type: string }
        usedInRecipes: { type: integer }
    SupplementStashResponse:
      type: object
      required: [id, name, brand, type, category, dose, form, protocol, timing, taken]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        brand: { type: string }
        type: { type: string, enum: [supplement, stimulant, medication] }
        category: { type: string }
        dose: { type: string }
        form: { type: string }
        stock: { type: number, nullable: true }
        stockUnit: { type: string, nullable: true }
        protocol: { type: string }
        timing: { type: string }
        taken: { type: boolean }
        caffeine: { type: boolean, nullable: true }
        # Nutrition + commerce facts — mirror IngredientResponse so supplement detail/cards
        # show macros/nutrients/price too (mezo-1za9). Nullable: pure dose/protocol items
        # (many stim/med) carry no nutrition; macros is null when kcal is unset.
        source: { type: string, enum: [kifli.hu, myprotein.hu, tesco.hu, auchan.hu, manual, lidl, nutriversum, herbahaz, nutrifit, decathlon, openfoodfacts], nullable: true }
        per: { type: number, nullable: true }
        unit: { type: string, nullable: true }
        macros: { allOf: [ { $ref: '#/components/schemas/PantryMacros' } ], nullable: true }
        price: { type: number, nullable: true }
        priceUnit: { type: string, nullable: true }
        pkg: { type: string, nullable: true }
        micros: { type: array, nullable: true, items: { $ref: '#/components/schemas/PantryMicro' } }
        nova: { type: integer, minimum: 1, maximum: 4, nullable: true }
        fiberG: { type: number, nullable: true }
        sugarG: { type: number, nullable: true }
        saltG: { type: number, nullable: true }
        saturatedFatG: { type: number, nullable: true }
    PantryItemRequest:
      type: object
      required: [kind, name]
      properties:
        kind: { type: string, enum: [food, supplement, stim, med] }
        name: { type: string }
        brand: { type: string, nullable: true }
        source: { type: string, enum: [kifli.hu, myprotein.hu, tesco.hu, auchan.hu, manual, lidl, nutriversum, herbahaz, nutrifit, decathlon, openfoodfacts], nullable: true }
        category: { type: string, nullable: true, enum: [vegetables, fruits, meat, fish, eggs, dairy, cheese, legumes, grains, pasta, bakery, nuts_seeds, oils_fats, condiments, snacks, beverages, supplement, other] }
        notes: { type: string, nullable: true }
        per: { type: number, nullable: true }
        unit: { type: string, nullable: true }
        kcal: { type: number, nullable: true }
        proteinG: { type: number, nullable: true }
        carbsG: { type: number, nullable: true }
        fatG: { type: number, nullable: true }
        fiberG: { type: number, nullable: true }
        sugarG: { type: number, nullable: true }
        saltG: { type: number, nullable: true }
        saturatedFatG: { type: number, nullable: true }
        price: { type: integer, nullable: true }
        priceUnit: { type: string, nullable: true }
        pkg: { type: string, nullable: true }
        micros: { type: array, nullable: true, items: { $ref: '#/components/schemas/PantryMicro' } }
        nova: { type: integer, minimum: 1, maximum: 4, nullable: true }
        stockQty: { type: number, nullable: true }
        stockUnit: { type: string, nullable: true }
        stockExpires: { type: string, format: date, nullable: true }
        dose: { type: string, nullable: true }
        form: { type: string, nullable: true }
        protocol: { type: string, nullable: true }
        timing: { type: string, nullable: true }
        caffeine: { type: boolean, nullable: true }
    PantryItemResponse:
      type: object
      required: [id, kind, name]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [food, supplement, stim, med] }
        name: { type: string }
        brand: { type: string, nullable: true }
        source: { type: string, nullable: true }
        category: { type: string, nullable: true }
    PantryLookupResponse:
      type: object
      required: [results]
      properties:
        results: { type: array, items: { $ref: '#/components/schemas/PantryLookupResult' } }
    PantryLookupResult:
      type: object
      required: [name, per, unit]
      properties:
        name: { type: string }
        brand: { type: string, nullable: true }
        barcode: { type: string, nullable: true }
        # OFF nutriments are per-100 basis; unit g or ml
        per: { type: number }
        unit: { type: string }
        kcal: { type: number, nullable: true }
        proteinG: { type: number, nullable: true }
        carbsG: { type: number, nullable: true }
        fatG: { type: number, nullable: true }
        fiberG: { type: number, nullable: true }
        sugarG: { type: number, nullable: true }
        saltG: { type: number, nullable: true }
        saturatedFatG: { type: number, nullable: true }
        # OFF nova_group passthrough (deterministic — no AI)
        nova: { type: integer, minimum: 1, maximum: 4, nullable: true }
    PantryImportRequest:
      type: object
      required: [name, per, unit]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        brand: { type: string, nullable: true, maxLength: 200 }
        barcode: { type: string, nullable: true, maxLength: 32 }
        category: { type: string, nullable: true, enum: [vegetables, fruits, meat, fish, eggs, dairy, cheese, legumes, grains, pasta, bakery, nuts_seeds, oils_fats, condiments, snacks, beverages, supplement, other] }
        per: { type: number, minimum: 0, exclusiveMinimum: true }
        unit: { type: string, minLength: 1, maxLength: 16 }
        kcal: { type: number, nullable: true }
        proteinG: { type: number, nullable: true }
        carbsG: { type: number, nullable: true }
        fatG: { type: number, nullable: true }
        fiberG: { type: number, nullable: true }
        sugarG: { type: number, nullable: true }
        saltG: { type: number, nullable: true }
        saturatedFatG: { type: number, nullable: true }
        nova: { type: integer, minimum: 1, maximum: 4, nullable: true }
    PantryImportEntryResponse:
      type: object
      required: [id, source, when, items, status, ofWhat]
      properties:
        id: { type: string, format: uuid }
        source: { type: string, enum: [kifli.hu, myprotein.hu, tesco.hu, auchan.hu, manual, lidl, nutriversum, herbahaz, nutrifit, decathlon, openfoodfacts] }
        when: { type: string, format: date-time }
        items: { type: integer }
        status: { type: string, enum: [synced, manual-review] }
        ofWhat: { type: string }
    PantrySuggestionResponse:
      type: object
      required: [name, source, price, reason]
      properties:
        name: { type: string }
        source: { type: string, enum: [kifli.hu, myprotein.hu, tesco.hu, auchan.hu, manual, lidl, nutriversum, herbahaz, nutrifit, decathlon, openfoodfacts] }
        price: { type: string }
        reason: { type: string }
