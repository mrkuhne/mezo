openapi: 3.0.3
info: { title: '', version: '' }
tags:
  - name: Proactive
    description: >-
      Proactive layer — surfaces the companion speaks first on (mezo-h4wp). B1.1 ships the
      morning briefing read; cron + staleness arrive in B1.2, weekly/heartbeat/prediction
      surfaces in later slices.
paths:
  /api/proactive/briefing:
    get:
      tags: [Proactive]
      operationId: getBriefing
      summary: The generated morning briefing for one day (lazily generated when the dawn cron has not produced it yet)
      parameters:
        - name: date
          in: query
          required: false
          description: >-
            The briefed day — the FE sends its LOCAL date (the check-in read precedent);
            defaults to the server's today.
          schema: { type: string, format: date }
      responses:
        '200':
          description: The persisted (or just-generated) briefing
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BriefingResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: >-
            No briefing possible — no narrative memory (daily_summary) in the configured
            past-days window. The FE renders its honest state (B1.2).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/proactive/weekly-suggestion:
    get:
      tags: [Proactive]
      operationId: getWeeklySuggestion
      summary: The companion's generated plan suggestion for the week containing the given day (lazily generated when the Monday cron has not produced it yet)
      parameters:
        - name: date
          in: query
          required: false
          description: Any day of the wanted week (the FE sends its LOCAL date); defaults to the server's today. The week identity is the ISO Monday.
          schema: { type: string, format: date }
      responses:
        '200':
          description: The persisted (or just-generated) weekly suggestion
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WeeklySuggestionResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: No suggestion possible — no narrative memory (daily_summary) in the prior week. The FE keeps its honest placeholder.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/proactive/memoir:
    get:
      tags: [Proactive]
      operationId: getMemoir
      summary: The latest weekly memoir (lazily generated for the last completed week when none exists yet)
      responses:
        '200':
          description: The latest persisted (or just-generated) memoir
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MemoirResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: No memoir possible — no narrative memory in the last completed week. The FE renders its honest "készül" state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/proactive/heartbeat:
    get:
      tags: [Proactive]
      operationId: getHeartbeat
      summary: The day's latest heartbeat note (napközbeni jelenlét, H1)
      description: >-
        Returns the latest persisted heartbeat note for the given day (evening closing beats
        midday nudge by generation time). For TODAY the latest already-elapsed window
        lazy-generates when missing (the miss-recovery); past dates never generate. 404 =
        honest absence (no elapsed window yet, no narrative memory, or generation failed).
      parameters:
        - name: date
          in: query
          required: false
          description: >-
            The noted day — the FE sends its LOCAL date (the briefing precedent); defaults to
            the server's today.
          schema: { type: string, format: date }
      responses:
        '200':
          description: The day's latest heartbeat note
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HeartbeatNoteResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: No note for the day (honest absence). The Today card simply stays absent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/proactive/prediction:
    get:
      tags: [Proactive]
      operationId: getPredictions
      summary: Pattern-grounded weekly predictions with validation state (P1)
      description: >-
        All live predictions, newest window first. Lazily generates the CURRENT week's batch when
        that week has no rows yet (needs CONFIRMED patterns — the grounding gate). An empty array
        is the honest empty state (never fabricated forecasts).
      responses:
        '200':
          description: All live predictions (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PredictionResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/proactive/experiment:
    get:
      tags: [Proactive]
      operationId: getExperiments
      summary: All live N=1 experiments (proposed/active/completed), newest first (P2)
      description: >-
        Returns the user's live experiments (dismissed excluded). An empty array is the honest
        empty state (never a 404). Lazily proposes when the user has none and has confirmed patterns.
      responses:
        '200':
          description: All live experiments (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ExperimentResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/proactive/experiment/propose:
    post:
      tags: [Proactive]
      operationId: proposeExperiments
      summary: On-demand experiment proposal ("+ Új kísérlet javasol Mezo") (P2)
      description: >-
        Generates up to the open-cap of experiment proposals from confirmed patterns. A no-op
        (empty array) when the cap is already met or there are no confirmed patterns.
      responses:
        '200':
          description: The freshly proposed experiments (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ExperimentResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/proactive/experiment/{id}/decision:
    post:
      tags: [Proactive]
      operationId: decideExperiment
      summary: L2 accept/dismiss a proposed experiment (P2)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExperimentDecisionRequest' }
      responses:
        '200':
          description: The experiment with its new status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExperimentResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: Experiment not found (or owned by someone else)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '409':
          description: The experiment is not in the proposed state (already decided)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/proactive/challenge:
    get:
      tags: [Proactive]
      operationId: getChallenges
      summary: Live workout challenges for a planned session on a day (proposed/accepted/hit/miss/inconclusive) (Challenges)
      description: >-
        Returns the session/day's live challenges (dismissed excluded). Lazily generates when none
        exist and date == today; lazily evaluates accepted ones once the instance is done. An empty
        array is the honest empty state (never a 404).
      parameters:
        - name: templateSessionId
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: date
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: The session/day's live challenges (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ChallengeResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
  /api/proactive/challenge/{id}/decision:
    post:
      tags: [Proactive]
      operationId: decideChallenge
      summary: L2 accept/dismiss a proposed workout challenge (Challenges)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChallengeDecisionRequest' }
      responses:
        '200':
          description: The challenge with its new status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChallengeResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '404':
          description: Challenge not found (or owned by someone else)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
        '409':
          description: The challenge is not in the proposed state (already decided)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemMessageList' }
components:
  schemas:
    BriefingRef:
      type: object
      required: [kind, label]
      properties:
        kind:
          type: string
          description: FE RefTag kind (WeightTrend/Goal/Workout/FuelDay/Medication/Sleep/Memory)
        label:
          type: string
    BriefingResponse:
      type: object
      required: [date, eyebrow, body, refs, generatedAt]
      properties:
        date: { type: string, format: date }
        eyebrow:
          type: string
          description: One-line header above the briefing prose
        body:
          type: array
          items: { type: string }
          description: Briefing paragraphs — the FE maps each to a BriefingPara
        refs:
          type: array
          items: { $ref: '#/components/schemas/BriefingRef' }
          description: Code-collected, model-SELECTED source references (never model-invented)
        generatedAt: { type: string, format: date-time }
    WeeklySuggestionResponse:
      type: object
      required: [weekStart, prose, generatedAt]
      properties:
        weekStart: { type: string, format: date }
        prose:
          type: string
          description: Plain Hungarian plan-suggestion prose (smart tier; no markdown structure)
        generatedAt: { type: string, format: date-time }
    MemoirAnchor:
      type: object
      required: [kind, label]
      properties:
        kind:
          type: string
          description: FE RefTag kind (Memory/Pattern/…) — code-collected, model-SELECTED, never invented
        label:
          type: string
    MemoirResponse:
      type: object
      required: [weekStart, title, body, anchors, generatedAt]
      properties:
        weekStart: { type: string, format: date }
        title:
          type: string
          description: Display title of the week's narrative
        body:
          type: string
          description: The memoir prose (single narrative paragraph block)
        anchors:
          type: array
          items: { $ref: '#/components/schemas/MemoirAnchor' }
        generatedAt: { type: string, format: date-time }
    HeartbeatNoteResponse:
      type: object
      required: [date, window, kind, content, generatedAt]
      properties:
        date: { type: string, format: date }
        window:
          type: string
          description: Window key (midday | evening) — the config window the note was written for
        kind:
          type: string
          description: nudge (midday) | closing (evening)
        content:
          type: string
          description: The generated HU note (plain prose, cheap tier)
        generatedAt: { type: string, format: date-time }
    PredictionResponse:
      type: object
      required: [id, title, basis, metricKey, expectedDirection, validFrom, validTo, status, generatedAt]
      properties:
        id: { type: string, format: uuid }
        title:
          type: string
          description: The forecast statement (HU prose, model-written)
        basis:
          type: string
          description: Why — grounded in the selected pattern + context (model-written prose)
        confidence:
          type: number
          format: double
          nullable: true
          description: COPIED from the grounding pattern's stats; null = the FE renders „tanulom" (never model-invented)
        metricKey:
          type: string
          description: weight_trend | sleep_avg | training_volume (the deterministic v1 catalog)
        expectedDirection:
          type: string
          description: up | down | stable (model-SELECTED from the enum)
        validFrom: { type: string, format: date }
        validTo: { type: string, format: date }
        status:
          type: string
          description: pending | validated | missed
        actual:
          type: string
          nullable: true
          description: Code-formatted outcome text once the validation job closed the window
        generatedAt: { type: string, format: date-time }
    ExperimentDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision: { type: string, pattern: '^(accept|dismiss)$' }
    ExperimentResponse:
      type: object
      required: [id, title, hypothesis, status, metricKey, expectedDirection, totalDays, generatedAt]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        hypothesis: { type: string }
        status:
          type: string
          description: proposed | active | completed | dismissed
        metricKey: { type: string }
        expectedDirection:
          type: string
          description: up | down | stable
        startDate:
          type: string
          format: date
          nullable: true
          description: Null until accepted (proposed rows have no start)
        totalDays:
          type: integer
          description: The experiment window length in days
        outcome:
          type: string
          nullable: true
          description: Code-formatted outcome once the window closed
        outcomeGood:
          type: boolean
          nullable: true
          description: true/false once evaluated; null = completed but inconclusive (no data)
        generatedAt: { type: string, format: date-time }
    ChallengeDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision: { type: string, pattern: '^(accept|dismiss)$' }
    ChallengeRef:
      type: object
      required: [kind, label]
      properties:
        kind: { type: string }
        label: { type: string }
    ChallengeResponse:
      type: object
      required: [id, exerciseId, exercise, type, typeLabel, status, target, risk, why, glory, refs, generatedAt]
      properties:
        id: { type: string, format: uuid }
        exerciseId: { type: string, format: uuid }
        exercise: { type: string, description: The target exercise's name }
        type: { type: string, description: 'PR | Depth | Volume' }
        typeLabel: { type: string, description: HU display label derived from type }
        status: { type: string, description: 'proposed | accepted | dismissed | hit | miss | inconclusive' }
        target: { type: string, description: Code-derived display string of the structured target }
        confidence:
          type: number
          nullable: true
          description: Pattern-copied; null = "tanulom" (never fabricated)
        risk: { type: string, description: 'low | mid' }
        why: { type: string }
        glory: { type: string }
        refs:
          type: array
          items: { $ref: '#/components/schemas/ChallengeRef' }
        outcome:
          type: string
          nullable: true
          description: Code-formatted outcome once the workout is evaluated
        outcomeGood:
          type: boolean
          nullable: true
          description: true/false once evaluated; null = inconclusive (no logged sets)
        generatedAt: { type: string, format: date-time }
