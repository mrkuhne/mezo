openapi: 3.0.3
info:
  title: ''
  version: ''
tags:
  - name: Goal
    description: Goal domain — goal-rooted timeline (trajectory + quality guards + window)
paths:
  /api/goals:
    get:
      tags: [Goal]
      operationId: listGoals
      summary: List the owner's goals (active first)
      responses:
        '200':
          description: Goals
          content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/GoalResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
    post:
      tags: [Goal]
      operationId: createGoal
      summary: Create a goal (status = planned)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/GoalUpsertRequest' } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/GoalResponse' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/goals/{id}:
    get:
      tags: [Goal]
      operationId: getGoal
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: Goal, content: { application/json: { schema: { $ref: '#/components/schemas/GoalResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
    put:
      tags: [Goal]
      operationId: updateGoal
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/GoalUpsertRequest' } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/GoalResponse' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
    delete:
      tags: [Goal]
      operationId: deleteGoal
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '204': { description: Deleted }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/goals/{id}/activate:
    post:
      tags: [Goal]
      operationId: activateGoal
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: Activated, content: { application/json: { schema: { $ref: '#/components/schemas/GoalResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/goals/{id}/archive:
    post:
      tags: [Goal]
      operationId: archiveGoal
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: Archived, content: { application/json: { schema: { $ref: '#/components/schemas/GoalResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/goals/{id}/timeline:
    get:
      tags: [Goal]
      operationId: listGoalTimeline
      summary: The goal's positioned plan links + uncovered gym-lane gaps
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: Timeline, content: { application/json: { schema: { $ref: '#/components/schemas/GoalTimelineResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/goals/{id}/evaluate:
    post:
      tags: [Goal]
      operationId: evaluateGoal
      summary: Run the TDEE/recept engine — computes + persists tdeeBootstrap + prescription, returns the goal
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: Evaluated, content: { application/json: { schema: { $ref: '#/components/schemas/GoalResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/goals/{id}/plans:
    post:
      tags: [Goal]
      operationId: attachGoalPlan
      summary: Attach an owned mesocycle or running block at a week position
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/GoalPlanAttachRequest' } } }
      responses:
        '201': { description: Linked, content: { application/json: { schema: { $ref: '#/components/schemas/GoalPlanLinkResponse' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Goal or plan not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/goals/{id}/plans/{linkId}:
    delete:
      tags: [Goal]
      operationId: detachGoalPlan
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: linkId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Detached }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
components:
  schemas:
    GoalResponse:
      type: object
      required: [id, title, trajectory, guards, status, startDate, targetDate, startWeightKg, rateTargetPctPerWeek]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        trajectory: { type: string, enum: [cut, bulk, maintain] }
        guards: { type: array, items: { type: string, enum: [strength, muscle] } }
        status: { type: string, enum: [planned, active, archived] }
        startDate: { type: string, format: date }
        targetDate: { type: string, format: date }
        startWeightKg: { type: number }
        targetWeightKg: { type: number, nullable: true }
        rateTargetPctPerWeek: { type: number }
        identityFrame: { type: string, nullable: true }
        # Engine outputs — null until the goal is evaluated (POST /api/goals/{id}/evaluate).
        tdeeBootstrap: { allOf: [ { $ref: '#/components/schemas/TdeeBootstrap' } ], nullable: true }
        prescription: { allOf: [ { $ref: '#/components/schemas/GoalPrescription' } ], nullable: true }
    TdeeBootstrap:
      type: object
      description: Formula-TDEE bootstrap snapshot computed at first evaluation.
      required: [bmr, tdee, pal, formula, computedAt]
      properties:
        bmr: { type: number, description: Basal metabolic rate (kcal/day) }
        tdee: { type: number, description: Total daily energy expenditure (kcal/day) }
        pal: { type: number, description: Physical-activity-level multiplier }
        formula: { type: string, enum: [MSJ, KATCH], description: 'MSJ = Mifflin-St Jeor, KATCH = Katch-McArdle' }
        computedAt: { type: string, format: date-time }
    GoalPrescription:
      type: object
      description: Segmented recept produced by the engine — kcal/protein/sleep/rest per timeline segment, plus guard + feasibility status.
      required: [generatedAt, basis, segments, guardStatus, feasibility]
      properties:
        generatedAt: { type: string, format: date-time }
        basis: { type: string, enum: [formula, adaptive] }
        segments: { type: array, items: { $ref: '#/components/schemas/GoalPrescriptionSegment' } }
        guardStatus: { $ref: '#/components/schemas/GoalGuardStatus' }
        feasibility: { $ref: '#/components/schemas/GoalFeasibility' }
    GoalPrescriptionSegment:
      type: object
      required: [fromWeek, toWeek, label, kcal, proteinG, sleepTargetH, restDays, projectedRateKgPerWk, rationale]
      properties:
        fromWeek: { type: integer }
        toWeek: { type: integer }
        label: { type: string }
        kcal: { type: integer }
        proteinG: { type: integer }
        sleepTargetH: { type: number }
        restDays: { type: array, items: { type: integer } }
        projectedRateKgPerWk: { type: number }
        rationale: { type: string }
    GoalGuardStatus:
      type: object
      required: [strength, muscle]
      properties:
        strength: { $ref: '#/components/schemas/GoalStrengthGuardStatus' }
        muscle: { $ref: '#/components/schemas/GoalMuscleGuardStatus' }
    GoalStrengthGuardStatus:
      type: object
      required: [active, e1rmTrendPct, breached, notes]
      properties:
        active: { type: boolean }
        e1rmTrendPct: { type: number }
        breached: { type: boolean }
        notes: { type: array, items: { type: string } }
    GoalMuscleGuardStatus:
      type: object
      required: [active, minWeeklySetsPerMuscle, belowMaintenanceMuscles, rateWithinCap, proteinMonitored, notes]
      properties:
        active: { type: boolean }
        minWeeklySetsPerMuscle: { type: integer }
        belowMaintenanceMuscles: { type: array, items: { type: string } }
        rateWithinCap: { type: boolean }
        proteinMonitored: { type: boolean }
        notes: { type: array, items: { type: string } }
    GoalFeasibility:
      type: object
      required: [verdict, notes]
      properties:
        verdict: { type: string, enum: [feasible, feasible-with-warnings, aggressive] }
        notes: { type: array, items: { type: string } }
    GoalUpsertRequest:
      type: object
      # rateTargetPctPerWeek is NOT an input — it is server-derived from
      # |startWeightKg − targetWeightKg| / startWeightKg / weeks (see GoalService.applyUpsert).
      required: [title, trajectory, startDate, targetDate, startWeightKg]
      properties:
        title: { type: string, minLength: 1 }
        trajectory: { type: string, pattern: '^(cut|bulk|maintain)$' }
        guards: { type: array, items: { type: string, pattern: '^(strength|muscle)$' } }
        startDate: { type: string, format: date }
        targetDate: { type: string, format: date }
        startWeightKg: { type: number, minimum: 0 }
        targetWeightKg: { type: number, nullable: true, minimum: 0 }
        identityFrame: { type: string, nullable: true }
    GoalPlanRef:
      type: object
      required: [title, status, startDate, endDate, weeks]
      properties:
        title: { type: string }
        status: { type: string, enum: [planned, active, archived] }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        weeks: { type: integer }
    GoalPlanLinkResponse:
      type: object
      required: [id, planType, planId, startWeek, endWeek, plan]
      properties:
        id: { type: string, format: uuid }
        planType: { type: string, enum: [mesocycle, running_block] }
        planId: { type: string, format: uuid }
        startWeek: { type: integer }
        endWeek: { type: integer }
        plan: { $ref: '#/components/schemas/GoalPlanRef' }
    GoalPlanAttachRequest:
      type: object
      required: [planType, planId, startWeek]
      properties:
        planType: { type: string, pattern: '^(mesocycle|running_block)$' }
        planId: { type: string, format: uuid }
        startWeek: { type: integer, minimum: 1 }
    GoalGap:
      type: object
      required: [fromWeek, toWeek]
      properties:
        fromWeek: { type: integer }
        toWeek: { type: integer }
    GoalTimelineResponse:
      type: object
      required: [goalId, weeks, links, gaps]
      properties:
        goalId: { type: string, format: uuid }
        weeks: { type: integer }
        links: { type: array, items: { $ref: '#/components/schemas/GoalPlanLinkResponse' } }
        gaps: { type: array, items: { $ref: '#/components/schemas/GoalGap' } }
