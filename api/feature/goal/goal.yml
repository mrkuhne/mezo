openapi: 3.0.3
info:
  title: ''
  version: ''
tags:
  - name: Goal
    description: Goal domain — goal-rooted timeline (trajectory + quality guards + window)
paths:
  /api/goals:
    get:
      tags: [Goal]
      operationId: listGoals
      summary: List the owner's goals (active first)
      responses:
        '200':
          description: Goals
          content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/GoalResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
    post:
      tags: [Goal]
      operationId: createGoal
      summary: Create a goal (status = planned)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/GoalUpsertRequest' } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/GoalResponse' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/goals/{id}:
    get:
      tags: [Goal]
      operationId: getGoal
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: Goal, content: { application/json: { schema: { $ref: '#/components/schemas/GoalResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
    put:
      tags: [Goal]
      operationId: updateGoal
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/GoalUpsertRequest' } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/GoalResponse' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
    delete:
      tags: [Goal]
      operationId: deleteGoal
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '204': { description: Deleted }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/goals/{id}/activate:
    post:
      tags: [Goal]
      operationId: activateGoal
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: Activated, content: { application/json: { schema: { $ref: '#/components/schemas/GoalResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/goals/{id}/archive:
    post:
      tags: [Goal]
      operationId: archiveGoal
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: Archived, content: { application/json: { schema: { $ref: '#/components/schemas/GoalResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/goals/{id}/timeline:
    get:
      tags: [Goal]
      operationId: listGoalTimeline
      summary: The goal's positioned plan links + uncovered gym-lane gaps
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: Timeline, content: { application/json: { schema: { $ref: '#/components/schemas/GoalTimelineResponse' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/goals/{id}/plans:
    post:
      tags: [Goal]
      operationId: attachGoalPlan
      summary: Attach an owned mesocycle or running block at a week position
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/GoalPlanAttachRequest' } } }
      responses:
        '201': { description: Linked, content: { application/json: { schema: { $ref: '#/components/schemas/GoalPlanLinkResponse' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Goal or plan not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
  /api/goals/{id}/plans/{linkId}:
    delete:
      tags: [Goal]
      operationId: detachGoalPlan
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: linkId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Detached }
        '401': { description: Missing/invalid token, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/SystemMessageList' } } } }
components:
  schemas:
    GoalResponse:
      type: object
      required: [id, title, trajectory, guards, status, startDate, targetDate, startWeightKg, rateTargetPctPerWeek]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        trajectory: { type: string, enum: [cut, bulk, maintain] }
        guards: { type: array, items: { type: string, enum: [strength, muscle] } }
        status: { type: string, enum: [planned, active, archived] }
        startDate: { type: string, format: date }
        targetDate: { type: string, format: date }
        startWeightKg: { type: number }
        targetWeightKg: { type: number, nullable: true }
        rateTargetPctPerWeek: { type: number }
        identityFrame: { type: string, nullable: true }
    GoalUpsertRequest:
      type: object
      required: [title, trajectory, startDate, targetDate, startWeightKg, rateTargetPctPerWeek]
      properties:
        title: { type: string, minLength: 1 }
        trajectory: { type: string, pattern: '^(cut|bulk|maintain)$' }
        guards: { type: array, items: { type: string, pattern: '^(strength|muscle)$' } }
        startDate: { type: string, format: date }
        targetDate: { type: string, format: date }
        startWeightKg: { type: number, minimum: 0 }
        targetWeightKg: { type: number, nullable: true, minimum: 0 }
        rateTargetPctPerWeek: { type: number, minimum: 0 }
        identityFrame: { type: string, nullable: true }
    GoalPlanRef:
      type: object
      required: [title, status, startDate, endDate, weeks]
      properties:
        title: { type: string }
        status: { type: string, enum: [planned, active, archived] }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        weeks: { type: integer }
    GoalPlanLinkResponse:
      type: object
      required: [id, planType, planId, startWeek, endWeek, plan]
      properties:
        id: { type: string, format: uuid }
        planType: { type: string, enum: [mesocycle, running_block] }
        planId: { type: string, format: uuid }
        startWeek: { type: integer }
        endWeek: { type: integer }
        plan: { $ref: '#/components/schemas/GoalPlanRef' }
    GoalPlanAttachRequest:
      type: object
      required: [planType, planId, startWeek]
      properties:
        planType: { type: string, pattern: '^(mesocycle|running_block)$' }
        planId: { type: string, format: uuid }
        startWeek: { type: integer, minimum: 1 }
    GoalGap:
      type: object
      required: [fromWeek, toWeek]
      properties:
        fromWeek: { type: integer }
        toWeek: { type: integer }
    GoalTimelineResponse:
      type: object
      required: [goalId, weeks, links, gaps]
      properties:
        goalId: { type: string, format: uuid }
        weeks: { type: integer }
        links: { type: array, items: { $ref: '#/components/schemas/GoalPlanLinkResponse' } }
        gaps: { type: array, items: { $ref: '#/components/schemas/GoalGap' } }
