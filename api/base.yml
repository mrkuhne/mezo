openapi: 3.0.3
info:
  title: mezo API
  description: >
    Contract-first API definition for the mezo backend — the single source of truth
    for generated backend DTOs / controller interfaces and frontend types.
    See docs/references/api_contract_conventions.md.
  version: 0.3.0
servers:
  - url: http://localhost:8090
    description: Local dev backend (MEZO_PORT)
security:
  - bearerAuth: []
paths: {}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
