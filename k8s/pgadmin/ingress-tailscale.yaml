# Exposes pgAdmin on the PRIVATE tailnet (not the public internet) via the
# Tailscale operator. Reachable at https://pgadmin.<tailnet>.ts.net from any of
# your Tailscale devices, always on, no port-forward. The operator provisions a
# real *.ts.net HTTPS cert.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pgadmin-ts
  namespace: mezo
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: pgadmin
      port:
        number: 80
  tls:
    - hosts:
        - pgadmin        # → pgadmin.<tailnet>.ts.net
