# TEMPLATE ONLY — real values created out-of-band (see k8s/README.md). Never commit secrets.
# Login credentials for the pgAdmin web UI.
apiVersion: v1
kind: Secret
metadata:
  name: pgadmin-auth
  namespace: mezo
type: Opaque
stringData:
  # NOTE: pgAdmin rejects special-use domains (.local, example.com). Use a real-ish domain.
  PGADMIN_DEFAULT_EMAIL: admin@yourdomain.com
  PGADMIN_DEFAULT_PASSWORD: "CHANGE_ME"
