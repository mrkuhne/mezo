# TEMPLATE ONLY — real values created out-of-band (see k8s/README.md). Never commit secrets.
# Two secrets back the backend:
#   - mezo-app   : JWT signing key + owner seed credentials + Gemini API key (below)
#   - ghcr-pull  : docker-registry secret to pull the private GHCR image
#                  (created with `kubectl create secret docker-registry ghcr-pull ...`)
apiVersion: v1
kind: Secret
metadata:
  name: mezo-app
  namespace: mezo
type: Opaque
stringData:
  MEZO_JWT_SECRET: "CHANGE_ME_min_32_bytes"   # HS256 needs >= 32 bytes
  MEZO_OWNER_EMAIL: owner@mezo.local
  MEZO_OWNER_PASSWORD: "CHANGE_ME"
  MEZO_OWNER_NAME: Owner
  GEMINI_API_KEY: "CHANGE_ME"                 # Phase-3 companion (chat + embeddings, ADR 0008)
