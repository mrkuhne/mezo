# TEMPLATE ONLY — do NOT put real passwords here, and do NOT `kubectl apply` this file.
# The real `mezo-db` Secret is created out-of-band (see k8s/README.md), so no
# plaintext secret ever lands in git. In step 4 (ArgoCD/GitOps) we replace this
# with Sealed Secrets so an *encrypted* secret can live in git safely.
apiVersion: v1
kind: Secret
metadata:
  name: mezo-db
  namespace: mezo
type: Opaque
stringData:
  POSTGRES_DB: mezo
  POSTGRES_USER: mezo
  POSTGRES_PASSWORD: "CHANGE_ME"   # real value injected via `kubectl create secret`, never committed
