# A ClusterIssuer tells cert-manager HOW to obtain certificates. This one uses
# Let's Encrypt's production ACME server with the HTTP-01 challenge, solved
# through the Traefik ingress. cert-manager will request, install, and auto-renew
# certs for any Ingress that references this issuer.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: dkmusicscore@gmail.com          # expiry/renewal notices go here
    privateKeySecretRef:
      name: letsencrypt-prod-account-key    # ACME account key (cert-manager creates it)
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
