# The frontend: nginx serving the static PWA build. Stateless → Deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mezo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: frontend
          image: ghcr.io/mrkuhne/mezo-frontend:0.4.0
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              memory: "128Mi"
